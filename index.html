<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Project Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== DARK THEME (default) ===== */
:root, [data-theme="dark"] {
  --bg:         #0b0e18;
  --s1:         #13172a;
  --s2:         #1a1f36;
  --s3:         #222844;
  --border:     #2c3354;
  --border2:    #3a4468;
  --text:       #dde1f5;
  --muted:      #6a74a0;
  --dim:        #3d4568;
  --accent:     #7b79f7;
  --accent2:    #a5a3ff;
  --green:      #3ec97a;
  --amber:      #f5c542;
  --red:        #f06f6f;
  --topbar-bg:  #13172a;
  --gantt-alt:  rgba(255,255,255,.015);
  --overdue-bg: rgba(240,111,111,.1);
  --modal-bg:   #1a1f36;
}

/* ===== LIGHT THEME ===== */
[data-theme="light"] {
  --bg:         #eef0f8;
  --s1:         #ffffff;
  --s2:         #f3f4fc;
  --s3:         #e8eaf5;
  --border:     #ced2ea;
  --border2:    #b4b9d8;
  --text:       #1a1f3a;
  --muted:      #5e6890;
  --dim:        #9ba3c8;
  --accent:     #5452d6;
  --accent2:    #3d3bb8;
  --green:      #16a34a;
  --amber:      #b45309;
  --red:        #dc2626;
  --topbar-bg:  #ffffff;
  --gantt-alt:  rgba(0,0,0,.018);
  --overdue-bg: rgba(220,38,38,.06);
  --modal-bg:   #ffffff;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; line-height: 1.5; transition: background .2s, color .2s; }
button { font-family: 'Outfit', sans-serif; cursor: pointer; border: none; outline: none; }
input, textarea, select { font-family: 'Outfit', sans-serif; font-size: 14px; outline: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.hidden { display: none !important; }
#root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* =================== PROJECTS PAGE =================== */
.page-projects { flex: 1; overflow-y: auto; padding: 44px 48px 60px; display: flex; flex-direction: column; gap: 36px; }
.projects-topbar { display: flex; align-items: flex-start; justify-content: space-between; }
.brand-logo { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: -1px; }
.brand-logo span { color: var(--accent); }
.brand-tagline { font-size: 12px; color: var(--muted); margin-top: 1px; }
.projects-top-actions { display: flex; align-items: center; gap: 10px; }
.gear-btn {
  width: 38px; height: 38px; border-radius: 50%; background: var(--s1);
  border: 1px solid var(--border); color: var(--muted); display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  transition: color .15s, border-color .15s, background .15s, transform .25s;
}
.gear-btn:hover { color: var(--accent); border-color: var(--accent); transform: rotate(45deg); }
.gear-btn svg { width: 17px; height: 17px; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(272px, 1fr)); gap: 15px; }
.project-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px 20px 16px; cursor: pointer; position: relative; overflow: hidden;
  transition: border-color .2s, transform .15s, box-shadow .2s;
}
.project-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: var(--card-color, var(--accent)); }
.project-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.18); }
.card-emoji { font-size: 26px; margin-bottom: 10px; }
.card-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.card-desc { color: var(--muted); font-size: 13px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 36px; }
.card-meta { margin-top: 14px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.card-badge { background: var(--s3); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; font-size: 11px; color: var(--muted); }
.card-badge.hi { background: rgba(123,121,247,.1); border-color: var(--accent); color: var(--accent); }
.card-badge.warn { border-color: var(--red); color: var(--red); }
.card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 5px; opacity: 0; transition: opacity .15s; }
.project-card:hover .card-actions { opacity: 1; }
.icon-btn-sm { width: 26px; height: 26px; border-radius: 6px; background: var(--s2); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; transition: color .15s, background .15s; }
.icon-btn-sm:hover { color: var(--text); background: var(--s3); }
.new-project-card {
  background: transparent; border: 2px dashed var(--border2); border-radius: 12px;
  padding: 20px; cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px; color: var(--muted);
  min-height: 138px; transition: border-color .2s, color .2s;
}
.new-project-card:hover { border-color: var(--accent); color: var(--accent); }
.new-project-card svg { width: 26px; height: 26px; }
.new-project-card span { font-size: 13px; font-weight: 500; }

/* =================== PLANNER PAGE =================== */
.page-planner { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.planner-topbar {
  padding: 0 18px; height: 52px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  background: var(--topbar-bg); transition: background .2s;
}
/* Back button — prominent */
.back-btn {
  display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px 6px 10px;
  background: var(--s3); border: 1.5px solid var(--border2); border-radius: 8px;
  color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0;
  white-space: nowrap; transition: background .15s, border-color .15s;
}
.back-btn:hover { background: var(--s2); border-color: var(--accent); color: var(--accent); }
.back-btn svg { width: 15px; height: 15px; }
.tb-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.planner-project-name { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.topbar-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.btn { padding: 6px 13px; border-radius: 7px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: #fff; border: 1px solid transparent; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-ghost { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--s2); border-color: var(--border2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: var(--red); color: #fff; border: 1px solid transparent; }
.btn-danger:hover { filter: brightness(1.1); }
.view-toggle { display: flex; background: var(--s3); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
.view-btn { padding: 5px 10px; font-size: 12px; font-weight: 500; color: var(--muted); background: transparent; border: none; cursor: pointer; transition: background .15s, color .15s; }
.view-btn.active { background: var(--s2); color: var(--text); }
.date-nav { display: flex; align-items: center; gap: 3px; }
.date-nav-label { font-size: 12px; font-weight: 600; min-width: 148px; text-align: center; }
.nav-arrow { width: 26px; height: 26px; border-radius: 6px; background: var(--s3); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: color .15s, background .15s; }
.nav-arrow:hover { color: var(--text); background: var(--s2); }

/* =================== FILTER BAR =================== */
.filter-bar {
  display: flex; align-items: center; gap: 7px; padding: 6px 18px;
  border-bottom: 1px solid var(--border); background: var(--s2);
  flex-shrink: 0; flex-wrap: wrap; transition: background .2s;
}
.filter-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-right: 3px; }
.filter-pill {
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--s3); color: var(--muted);
  cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.filter-pill:hover { border-color: var(--border2); color: var(--text); }
.filter-pill .pd { width: 7px; height: 7px; border-radius: 50%; }
.filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 1px; }

/* =================== GANTT =================== */
.gantt-wrap { flex: 1; overflow: auto; position: relative; }
.gantt-inner { min-width: max-content; }

.gantt-header-row { display: flex; position: sticky; top: 0; z-index: 30; background: var(--topbar-bg); border-bottom: 2px solid var(--border); transition: background .2s; }
.gantt-corner { width: var(--left-w, 260px); min-width: var(--left-w, 260px); flex-shrink: 0; padding: 8px 16px; display: flex; align-items: center; border-right: 1px solid var(--border); background: var(--topbar-bg); }
.gantt-corner-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.gantt-dates-hdr { display: flex; }
.gantt-date-col { width: var(--cell-w, 60px); min-width: var(--cell-w, 60px); flex-shrink: 0; padding: 5px 2px 4px; text-align: center; border-right: 1px solid var(--border); cursor: pointer; transition: background .15s; user-select: none; }
.gantt-date-col:hover { background: var(--s3); }
.gantt-date-col.today-hdr { background: rgba(123,121,247,.07); }
.gantt-date-col.today-hdr .d-num { background: var(--accent); color: #fff !important; }
.gantt-date-col.today-hdr .d-name { color: var(--accent); }
.d-name { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.d-num { width: 24px; height: 24px; margin: 2px auto 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border-radius: 50%; }
.d-mon { font-size: 9px; color: var(--dim); margin-top: 1px; font-weight: 600; }

/* Category groups */
.category-section {}
.cat-header { display: flex; background: var(--s2); border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); margin-top: 2px; transition: background .2s; }
.cat-left { width: var(--left-w, 260px); min-width: var(--left-w, 260px); flex-shrink: 0; padding: 7px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; border-right: 1px solid var(--border); user-select: none; }
.cat-chev { font-size: 9px; color: var(--dim); transition: transform .2s; }
.cat-chev.open { transform: rotate(90deg); }
.cat-name-txt { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text); text-transform: uppercase; }
.cat-count-badge { font-size: 10px; color: var(--muted); background: var(--s3); padding: 1px 7px; border-radius: 10px; border: 1px solid var(--border); }
.cat-right { flex: 1; }

/* Goal rows */
.goal-row { display: flex; border-bottom: 1px solid var(--border); min-height: var(--row-h, 44px); transition: background .1s; }
.goal-row:hover { background: var(--gantt-alt); }
.goal-row.overdue-row { background: var(--overdue-bg); }
.goal-row.overdue-row:hover { filter: brightness(1.04); }
.goal-left { width: var(--left-w, 260px); min-width: var(--left-w, 260px); flex-shrink: 0; padding: 0 14px; display: flex; align-items: center; gap: 8px; border-right: 1px solid var(--border); min-height: var(--row-h, 44px); overflow: hidden; cursor: pointer; }
.goal-left:hover .goal-ttl { color: var(--accent); }
.goal-clr { width: 3px; height: 22px; border-radius: 2px; flex-shrink: 0; }
.goal-ttl { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color .15s; }
.goal-st-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.overdue-warn { font-size: 12px; flex-shrink: 0; color: var(--red); line-height: 1; }
.goal-cells { display: flex; height: var(--row-h, 44px); }

/* Gantt cells */
.g-cell { width: var(--cell-w, 60px); min-width: var(--cell-w, 60px); flex-shrink: 0; border-right: 1px solid rgba(44,51,84,.4); position: relative; display: flex; align-items: center; }
[data-theme="light"] .g-cell { border-right-color: rgba(186,192,218,.45); }
.g-cell.t-col { background: rgba(123,121,247,.05); }
[data-theme="light"] .g-cell.t-col { background: rgba(84,82,214,.04); }
.g-cell.in-range { cursor: pointer; }
.g-cell.in-range:hover .g-bar { filter: brightness(1.15); }
.g-bar { position: absolute; top: 9px; bottom: 9px; left: 0; right: 0; border-radius: 0; transition: filter .15s; }
.g-cell.rs .g-bar { left: 5px; border-radius: 6px 0 0 6px; }
.g-cell.re .g-bar { right: 5px; border-radius: 0 6px 6px 0; }
.g-cell.rs.re .g-bar { left: 5px; right: 5px; border-radius: 6px; }
.note-pip { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.9); z-index: 2; pointer-events: none; display: none; }
.g-cell.has-note .note-pip { display: block; }

/* Overdue today pip */
.overdue-today-cell {
  position: absolute; inset: 9px 5px; border-radius: 5px;
  background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(240,111,111,.2) 3px, rgba(240,111,111,.2) 6px);
  border: 1.5px dashed rgba(240,111,111,.55);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; pointer-events: none;
}
[data-theme="light"] .overdue-today-cell { background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(220,38,38,.13) 3px, rgba(220,38,38,.13) 6px); border-color: rgba(220,38,38,.4); }

/* Empty state */
.gantt-empty { padding: 70px 24px; text-align: center; color: var(--muted); }
.gantt-empty-ico { font-size: 36px; margin-bottom: 14px; }
.gantt-empty h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }

/* =================== MODAL =================== */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.58); z-index: 100; backdrop-filter: blur(3px); display: none; }
#modal-overlay.show { display: block; }
#modal-wrap { position: fixed; inset: 0; z-index: 101; display: flex; align-items: center; justify-content: center; padding: 20px; pointer-events: none; }
.modal { background: var(--modal-bg); border: 1px solid var(--border2); border-radius: 14px; padding: 26px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; pointer-events: all; animation: modal-in .16s ease; transition: background .2s; }
.modal.wide { max-width: 600px; }
.modal.narrow { max-width: 400px; }
@keyframes modal-in { from { opacity:0; transform:scale(.95) translateY(10px); } to { opacity:1; transform:none; } }
.modal-hdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 22px; }
.modal-title { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; }
.modal-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.close-btn { width: 28px; height: 28px; border-radius: 7px; background: var(--s3); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; flex-shrink: 0; border: 1px solid var(--border); transition: color .15s; }
.close-btn:hover { color: var(--text); }
.modal-foot { margin-top: 22px; display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
.form-group { margin-bottom: 15px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-lbl { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .4px; margin-bottom: 6px; display: block; text-transform: uppercase; }
.form-inp { width: 100%; background: var(--s3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; transition: border-color .15s, box-shadow .15s; }
.form-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123,121,247,.1); }
.form-inp::placeholder { color: var(--dim); }
textarea.form-inp { resize: vertical; min-height: 78px; }
.form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
.color-picker { display: flex; flex-wrap: wrap; gap: 7px; }
.cswatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .15s, border-color .15s, outline .15s; outline: 2px solid transparent; }
.cswatch:hover { transform: scale(1.2); }
.cswatch.sel { border-color: #fff; outline-color: rgba(255,255,255,.35); transform: scale(1.1); }
[data-theme="light"] .cswatch.sel { border-color: #1a1f3a; outline-color: rgba(26,31,58,.2); }
.status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.status-opt { padding: 7px 8px; border-radius: 7px; border: 1px solid var(--border); background: var(--s3); cursor: pointer; text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); transition: all .15s; }
.status-opt.sel { border-color: var(--oc); background: color-mix(in srgb, var(--oc) 14%, transparent); color: var(--text); }
.st-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.emoji-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.emoji-opt { width: 34px; height: 34px; font-size: 18px; border-radius: 7px; background: var(--s3); border: 1.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
.emoji-opt.sel, .emoji-opt:hover { background: var(--s2); border-color: var(--accent); }

/* =================== SETTINGS =================== */
.ss-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.ss-section { margin-bottom: 24px; }
.ss-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
.ss-lbl { font-size: 13px; font-weight: 500; }
.ss-hint { font-size: 11px; color: var(--muted); margin-top: 1px; }
.theme-toggle { display: flex; background: var(--s3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.theme-btn { padding: 7px 15px; font-size: 13px; font-weight: 500; color: var(--muted); background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s, color .15s; }
.theme-btn.active { background: var(--s2); color: var(--text); }
.folder-box { background: var(--s3); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.folder-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.folder-name.empty { color: var(--muted); font-style: italic; }
.data-stats { display: flex; gap: 24px; }
.stat-val { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; color: var(--accent); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.info-box { background: var(--s3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; font-size: 12px; color: var(--muted); line-height: 1.7; }
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>

<script>
// =====================================================
// CONSTANTS
// =====================================================
const STATUSES = [
  { val:'not_started', label:'Not Started', color:'#6a74a0' },
  { val:'in_progress', label:'In Progress', color:'#7b79f7' },
  { val:'completed',   label:'Completed',   color:'#3ec97a' },
  { val:'on_hold',     label:'On Hold',      color:'#f5c542' },
  { val:'cancelled',   label:'Cancelled',    color:'#f06f6f' },
];
const COLORS = ['#7b79f7','#60a5fa','#f06f6f','#f5c542','#3ec97a','#34d399','#f472b6','#a78bfa','#fb923c','#2dd4bf','#e879f9','#818cf8','#4ade80','#fbbf24','#94a3b8'];
const PROJ_COLORS = ['#7b79f7','#60a5fa','#3ec97a','#f5c542','#f06f6f','#f472b6','#a78bfa','#fb923c','#2dd4bf','#e879f9'];
const EMOJIS = ['📁','🚀','⭐','💡','🎯','🔥','📊','🌱','💎','🏆','🛠️','🎨','📝','⚡','🌟','🔬','🎵','🏗️','🌍','💼'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// =====================================================
// UTILITIES
// =====================================================
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $  = id => document.getElementById(id);
const dateStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseD  = s => new Date(s+'T00:00:00');
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const soWeek  = d => { const r=new Date(d); r.setDate(d.getDate()-d.getDay()); return r; };
const soMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const dimth   = d => new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
const isToday = d => dateStr(d) === dateStr(new Date());
const fmtD    = d => `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
const fmtDs   = d => `${MONTHS[d.getMonth()]} ${d.getDate()}`;
const stInfo  = val => STATUSES.find(s=>s.val===val) || STATUSES[0];
const isOverdue = g => !['completed','cancelled'].includes(g.status) && g.dateTo < dateStr(new Date());

// =====================================================
// INDEXEDDB (for file handle persistence)
// =====================================================
const IDB = (() => {
  let db = null;
  async function open() {
    if (db) return db;
    return new Promise((res,rej) => {
      const r = indexedDB.open('arcus_v1',1);
      r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
      r.onsuccess = e => { db=e.target.result; res(db); };
      r.onerror = rej;
    });
  }
  return {
    async get(k) { try { const d=await open(); return new Promise((res,rej)=>{ const r=d.transaction('kv','readonly').objectStore('kv').get(k); r.onsuccess=()=>res(r.result); r.onerror=rej; }); } catch{return null;} },
    async set(k,v) { try { const d=await open(); return new Promise((res,rej)=>{ const tx=d.transaction('kv','readwrite'); tx.objectStore('kv').put(v,k); tx.oncomplete=res; tx.onerror=rej; }); } catch{} },
    async del(k) { try { const d=await open(); return new Promise((res,rej)=>{ const tx=d.transaction('kv','readwrite'); tx.objectStore('kv').delete(k); tx.oncomplete=res; tx.onerror=rej; }); } catch{} },
  };
})();

// =====================================================
// SETTINGS
// =====================================================
const SETTINGS = {
  _d: null,
  load() { try { this._d = JSON.parse(localStorage.getItem('arc_cfg')) || {}; } catch { this._d={}; } return this; },
  save() { localStorage.setItem('arc_cfg', JSON.stringify(this._d)); },
  get(k,def) { return this._d[k] ?? def; },
  set(k,v)   { this._d[k]=v; this.save(); },
};

function applyTheme(t) { document.documentElement.setAttribute('data-theme',t); SETTINGS.set('theme',t); }

// =====================================================
// FILE SYSTEM (Folder-based auto-save)
// =====================================================
const FS = {
  sup: typeof window!=='undefined' && !!window.showDirectoryPicker,
  dir: null,

  getAllData() {
    return { version:1, exportedAt:new Date().toISOString(), projects:S.projects, goals:S.goals, notes:S.notes, journals:S.journals };
  },

  async tryLoadHandle() {
    if (!this.sup) return false;
    try {
      const h = await IDB.get('dirHandle'); if(!h) return false;
      const p = await h.queryPermission({mode:'readwrite'});
      if (p==='granted') { this.dir=h; return true; }
      return false;
    } catch { return false; }
  },

  async pickFolder() {
    if (!this.sup) return null;
    try {
      const h = await window.showDirectoryPicker({mode:'readwrite'});
      this.dir = h; await IDB.set('dirHandle',h);
      SETTINGS.set('folderName', h.name); SETTINGS.set('autoSave',true);
      await this.write(); return h.name;
    } catch(e) { if(e.name!=='AbortError') console.error(e); return null; }
  },

  async clearFolder() { this.dir=null; await IDB.del('dirHandle'); SETTINGS.set('folderName',null); SETTINGS.set('autoSave',false); },

  async write() {
    if (!this.dir) return;
    try {
      const p=await this.dir.queryPermission({mode:'readwrite'});
      if (p!=='granted') { const g=await this.dir.requestPermission({mode:'readwrite'}); if(g!=='granted') return; }
      const fh=await this.dir.getFileHandle('arcus-data.json',{create:true});
      const w=await fh.createWritable(); await w.write(JSON.stringify(this.getAllData(),null,2)); await w.close();
    } catch(e) { console.warn('Save failed:',e); }
  },

  async readFromFolder() {
    if (!this.dir) return false;
    try {
      const fh=await this.dir.getFileHandle('arcus-data.json');
      const f=await fh.getFile(), txt=await f.text(), d=JSON.parse(txt);
      if(d.projects) S.sp(d.projects,true); if(d.goals) S.sg(d.goals,true);
      if(d.notes) S.sn(d.notes,true); if(d.journals) S.sj(d.journals,true);
      return true;
    } catch { return false; }
  },

  exportJSON() {
    const blob=new Blob([JSON.stringify(this.getAllData(),null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`arcus-backup-${dateStr(new Date())}.json`; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },

  importJSON() {
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
    inp.onchange=async e=>{
      const f=e.target.files[0]; if(!f) return;
      try {
        const d=JSON.parse(await f.text());
        if(!d.projects&&!d.goals){alert('Invalid Arcus backup file.');return;}
        if(!confirm(`Import from "${f.name}"? This replaces ALL current data.`)) return;
        if(d.projects) S.sp(d.projects,true); if(d.goals) S.sg(d.goals,true);
        if(d.notes) S.sn(d.notes,true); if(d.journals) S.sj(d.journals,true);
        closeModal(); render();
      } catch { alert('Could not parse file. Please select a valid Arcus JSON backup.'); }
    };
    inp.click();
  },
};

async function autoSave() { if(SETTINGS.get('autoSave')&&FS.dir) await FS.write(); }

// =====================================================
// STORAGE & STATE
// =====================================================
const DB = {
  get: k => { try{return JSON.parse(localStorage.getItem(k));}catch{return null;} },
  set: (k,v) => localStorage.setItem(k,JSON.stringify(v)),
};

const S = {
  view:'projects', projectId:null, mode:'twoweek',
  anchor:new Date(), collapsedCats:new Set(),
  statusFilter:new Set(), showOverdueOnly:false,

  get projects()   { return DB.get('arc_p')||[]; },
  sp(v,skip) { DB.set('arc_p',v); if(!skip) autoSave(); },
  get goals()     { return DB.get('arc_g')||[]; },
  sg(v,skip) { DB.set('arc_g',v); if(!skip) autoSave(); },
  get notes()     { return DB.get('arc_n')||{}; },
  sn(v,skip) { DB.set('arc_n',v); if(!skip) autoSave(); },
  get journals()  { return DB.get('arc_j')||{}; },
  sj(v,skip) { DB.set('arc_j',v); if(!skip) autoSave(); },

  get project()   { return this.projects.find(p=>p.id===this.projectId)||null; },
  get pGoals()    { return this.goals.filter(g=>g.projectId===this.projectId); },
  get filteredGoals() {
    let gs=this.pGoals;
    if (this.showOverdueOnly) return gs.filter(g=>isOverdue(g));
    if (this.statusFilter.size>0) gs=gs.filter(g=>this.statusFilter.has(g.status));
    return gs;
  },

  addProject(p)    { const ps=this.projects; ps.push(p); this.sp(ps); },
  updateProject(p) { this.sp(this.projects.map(x=>x.id===p.id?p:x)); },
  deleteProject(id){ this.sp(this.projects.filter(p=>p.id!==id),true); this.sg(this.goals.filter(g=>g.projectId!==id),true); autoSave(); },
  addGoal(g)       { const gs=this.goals; gs.push(g); this.sg(gs); },
  updateGoal(g)    { this.sg(this.goals.map(x=>x.id===g.id?g:x)); },
  deleteGoal(id)   { this.sg(this.goals.filter(g=>g.id!==id)); },
  setNote(gid,ds,txt) { const n=this.notes; txt.trim()?n[`${gid}_${ds}`]=txt.trim():delete n[`${gid}_${ds}`]; this.sn(n); },
  getNote(gid,ds) { return (this.notes[`${gid}_${ds}`])||''; },
  setJournal(ds,txt) { const j=this.journals; txt.trim()?j[ds]=txt.trim():delete j[ds]; this.sj(j); },
  getJournal(ds)  { return (this.journals[ds])||''; },
};

// =====================================================
// VIEW RANGE
// =====================================================
function getViewDates() {
  const a=S.anchor; let start,count;
  if(S.mode==='week')    { start=soWeek(a); count=7; }
  else if(S.mode==='twoweek') { start=soWeek(a); count=14; }
  else { start=soMonth(a); count=dimth(a); }
  return Array.from({length:count},(_,i)=>addDays(start,i));
}

function getViewLabel() {
  const d=getViewDates(), f=d[0], l=d[d.length-1];
  if(S.mode==='month') return `${MONTHS[f.getMonth()]} ${f.getFullYear()}`;
  if(f.getMonth()===l.getMonth()) return `${MONTHS[f.getMonth()]} ${f.getDate()}–${l.getDate()}, ${f.getFullYear()}`;
  return `${fmtDs(f)} – ${fmtDs(l)}`;
}

function navigate(dir) {
  const d=new Date(S.anchor);
  if(S.mode==='week') d.setDate(d.getDate()+dir*7);
  else if(S.mode==='twoweek') d.setDate(d.getDate()+dir*14);
  else d.setMonth(d.getMonth()+dir);
  S.anchor=d; renderPlanner();
}
function goToday() { S.anchor=new Date(); renderPlanner(); }

function openProject(id) { S.projectId=id; S.view='planner'; S.anchor=new Date(); S.statusFilter=new Set(); S.showOverdueOnly=false; renderPlanner(); }
function backToProjects() { S.view='projects'; render(); }

// =====================================================
// PLANNER PAGE
// =====================================================
function renderPlanner() {
  const project=S.project; if(!project){S.view='projects';renderProjects();return;}
  const dates=getViewDates();
  const cellW = S.mode==='month'?38:S.mode==='week'?84:60;
  document.documentElement.style.setProperty('--cell-w', cellW+'px');
  document.documentElement.style.setProperty('--left-w', '260px');

  const todayStr=dateStr(new Date());
  const overdueCount=S.pGoals.filter(g=>isOverdue(g)).length;

  // Filter pills
  const pills=STATUSES.map(st=>{
    const on=S.statusFilter.has(st.val);
    const sty=on?`background:${st.color}20;border-color:${st.color};color:${st.color}`:'';
    return `<div class="filter-pill ${on?'active':''}" style="${sty}" onclick="toggleFilter('${st.val}')">
      <span class="pd" style="background:${st.color}"></span>${st.label}
    </div>`;
  }).join('');

  const allActive=S.statusFilter.size===0&&!S.showOverdueOnly;
  const overduePill=overdueCount>0?`
    <div class="filter-sep"></div>
    <div class="filter-pill ${S.showOverdueOnly?'active':''}" 
         style="${S.showOverdueOnly?'background:rgba(240,111,111,.15);border-color:var(--red);color:var(--red)':'color:var(--red);border-color:var(--red)'}" 
         onclick="toggleOverdueF()">⚠ Overdue (${overdueCount})</div>`:'' ;

  $('root').innerHTML=`<div class="page-planner">
    <div class="planner-topbar">
      <button class="back-btn" onclick="backToProjects()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        All Projects
      </button>
      <div class="tb-divider"></div>
      <div class="planner-project-name">${esc(project.emoji||'📁')} ${esc(project.name)}</div>
      <div class="topbar-right">
        <div class="date-nav">
          <button class="nav-arrow" onclick="navigate(-1)">&#8249;</button>
          <span class="date-nav-label">${getViewLabel()}</span>
          <button class="nav-arrow" onclick="navigate(1)">&#8250;</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
        <div class="view-toggle">
          <button class="view-btn ${S.mode==='week'?'active':''}" onclick="setMode('week')">Week</button>
          <button class="view-btn ${S.mode==='twoweek'?'active':''}" onclick="setMode('twoweek')">2 Wk</button>
          <button class="view-btn ${S.mode==='month'?'active':''}" onclick="setMode('month')">Month</button>
        </div>
        <button class="btn btn-primary btn-sm" onclick="newGoalModal()">+ Add Goal</button>
      </div>
    </div>
    <div class="filter-bar">
      <span class="filter-label">Filter:</span>
      <div class="filter-pill ${allActive?'active':''}" 
           style="${allActive?'background:var(--s3);border-color:var(--accent);color:var(--accent)':''}"
           onclick="clearFilter()">All</div>
      ${pills}${overduePill}
    </div>
    <div class="gantt-wrap">
      <div class="gantt-inner">
        ${renderGanttHeader(dates)}
        ${renderGanttBody(dates)}
      </div>
    </div>
  </div>`;
}

function toggleFilter(val) { S.showOverdueOnly=false; S.statusFilter.has(val)?S.statusFilter.delete(val):S.statusFilter.add(val); renderPlanner(); }
function clearFilter() { S.statusFilter=new Set(); S.showOverdueOnly=false; renderPlanner(); }
function toggleOverdueF() { S.showOverdueOnly=!S.showOverdueOnly; if(S.showOverdueOnly) S.statusFilter=new Set(); renderPlanner(); }
function setMode(m) { S.mode=m; renderPlanner(); }
function toggleCat(c) { S.collapsedCats.has(c)?S.collapsedCats.delete(c):S.collapsedCats.add(c); renderPlanner(); }

// =====================================================
// GANTT HEADER
// =====================================================
function renderGanttHeader(dates) {
  let pm=-1;
  const cols=dates.map(d=>{
    const sm=d.getMonth()!==pm; pm=d.getMonth();
    return `<div class="gantt-date-col ${isToday(d)?'today-hdr':''}" onclick="openJournal('${dateStr(d)}')" title="Journal · ${fmtD(d)}">
      <div class="d-name">${DAYS[d.getDay()]}</div>
      <div class="d-num">${d.getDate()}</div>
      <div class="d-mon">${sm?MONTHS[d.getMonth()]:''}</div>
    </div>`;
  }).join('');
  return `<div class="gantt-header-row">
    <div class="gantt-corner"><span class="gantt-corner-lbl">Goals</span></div>
    <div class="gantt-dates-hdr">${cols}</div>
  </div>`;
}

// =====================================================
// GANTT BODY
// =====================================================
function renderGanttBody(dates) {
  const goals=S.filteredGoals;
  if(goals.length===0){
    const msg=S.statusFilter.size>0||S.showOverdueOnly?'No goals match this filter — try adjusting the filter above.':'No goals yet — click "+ Add Goal" to create your first goal.';
    return `<div class="gantt-empty"><div class="gantt-empty-ico">🎯</div><h3>${msg}</h3></div>`;
  }
  const cats={};
  goals.forEach(g=>{ const c=g.category||'Uncategorized'; if(!cats[c]) cats[c]=[]; cats[c].push(g); });
  return Object.entries(cats).map(([cat,cg])=>{
    const coll=S.collapsedCats.has(cat);
    return `<div class="category-section">
      <div class="cat-header">
        <div class="cat-left" onclick="toggleCat('${esc(cat)}')">
          <span class="cat-chev ${coll?'':'open'}">▶</span>
          <span class="cat-name-txt">${esc(cat)}</span>
          <span class="cat-count-badge">${cg.length}</span>
        </div>
        <div class="cat-right"></div>
      </div>
      ${coll?'':cg.map(g=>renderGoalRow(g,dates)).join('')}
    </div>`;
  }).join('');
}

// =====================================================
// GOAL ROW
// =====================================================
function renderGoalRow(goal, dates) {
  const from=parseD(goal.dateFrom), to=parseD(goal.dateTo);
  const color=goal.labelColor||'#7b79f7', st=stInfo(goal.status), od=isOverdue(goal);

  const cells=dates.map(d=>{
    const ds=dateStr(d), inR=d>=from&&d<=to, tc=isToday(d);
    const isF=ds===goal.dateFrom, isL=ds===goal.dateTo;
    const hasN=!!S.getNote(goal.id,ds);

    // Overdue indicator in today's column (today > end date)
    if(tc && od && !inR){
      return `<div class="g-cell t-col" onclick="openDayNote('${goal.id}','${ds}')" title="Overdue — click to add note">
        <div class="overdue-today-cell">⚠</div>
      </div>`;
    }
    if(inR){
      const cls=['g-cell','in-range',tc?'t-col':'',isF?'rs':'',isL?'re':'',hasN?'has-note':''].filter(Boolean).join(' ');
      return `<div class="${cls}" onclick="openDayNote('${goal.id}','${ds}')" title="${fmtD(d)}">
        <div class="g-bar" style="background:${color};opacity:.83"></div>
        <div class="note-pip"></div>
      </div>`;
    }
    return `<div class="g-cell ${tc?'t-col':''}"></div>`;
  }).join('');

  return `<div class="goal-row ${od?'overdue-row':''}">
    <div class="goal-left" onclick="editGoalModal('${goal.id}')">
      <div class="goal-clr" style="background:${color}"></div>
      <span class="goal-ttl" title="${esc(goal.title)}">${esc(goal.title)}</span>
      ${od?`<span class="overdue-warn" title="Overdue — was due ${goal.dateTo}">⚠</span>`:''}
      <div class="goal-st-dot" style="background:${st.color}" title="${st.label}"></div>
    </div>
    <div class="goal-cells">${cells}</div>
  </div>`;
}

function showModal(html) {
  $('modal-overlay').classList.add('show');
  $('modal-wrap').innerHTML=html;
  document.addEventListener('keydown',onEsc);
  setTimeout(()=>{ const f=$('modal-wrap').querySelector('input:not([type=hidden]),textarea'); if(f) f.focus(); },80);
}
function closeModal() { $('modal-overlay').classList.remove('show'); $('modal-wrap').innerHTML=''; document.removeEventListener('keydown',onEsc); }
function onEsc(e) { if(e.key==='Escape') closeModal(); }
function overlayClick(e) { if(e.target===$('modal-overlay')) closeModal(); }

// PROJECT MODAL
// =====================================================
function newProjectModal() { projectModal(null); }
function editProjectModal(id) { projectModal(S.projects.find(p=>p.id===id)); }

function projectModal(project) {

  const eOpts=EMOJIS.map(e=>`<div class="emoji-opt ${e===p.emoji?'sel':''}" onclick="pickE(this,'${esc(e)}')">${e}</div>`).join('');
  showModal(`<div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title">${ie?'Edit':'New'} Project</div><div class="modal-sub">${ie?'Update project details':'Create a new project to organise your goals'}</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-lbl">Project Name</label><input class="form-inp" id="pm-n" placeholder="e.g. Product Launch" value="${esc(p.name)}" maxlength="60"></div>
    <div class="form-group"><label class="form-lbl">Description</label><textarea class="form-inp" id="pm-d" rows="2" placeholder="What is this project about?">${esc(p.description||'')}</textarea></div>
    <div class="form-group"><label class="form-lbl">Icon</label><div class="emoji-grid" id="pm-eg">${eOpts}</div><input type="hidden" id="pm-e" value="${esc(p.emoji||'📁')}"></div>
    <div class="form-group"><label class="form-lbl">Color</label><div class="color-picker" id="pm-cp">${cSwatches}</div><input type="hidden" id="pm-c" value="${p.color}"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject(${ie?`'${p.id}'`:'null'})">${ie?'Save Changes':'Create Project'}</button>
    </div>
  </div>`);
}

function pickPC(el,c){ el.closest('#pm-cp').querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); $('pm-c').value=c; }
function pickE(el,e){ el.closest('#pm-eg').querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); $('pm-e').value=e; }

function saveProject(id) {
  const name=$('pm-n').value.trim(); if(!name){$('pm-n').style.borderColor='var(--red)';$('pm-n').focus();return;}
  const ex=id?S.projects.find(x=>x.id===id):null;
  const p={id:id||uid(),name,description:$('pm-d').value.trim(),emoji:$('pm-e').value||'📁',color:$('pm-c').value||PROJ_COLORS[0],createdAt:ex?.createdAt||new Date().toISOString()};
  id?S.updateProject(p):S.addProject(p);
  closeModal(); S.view==='projects'?renderProjects():renderPlanner();
}

function confirmDeleteProject(id) {
  const p=S.projects.find(x=>x.id===id);
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Delete Project?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete <strong style="color:var(--text)">${esc(p?.name)}</strong> and all its goals?<br>This cannot be undone.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDelProject('${id}')">Delete</button></div>
  </div>`);
}
function doDelProject(id){ if(S.projectId===id){S.projectId=null;S.view='projects';} S.deleteProject(id); closeModal(); render(); }

// =====================================================
// GOAL MODAL
// =====================================================
function newGoalModal(dc) { goalModal(null,dc); }
function editGoalModal(id) { goalModal(S.goals.find(g=>g.id===id)); }

function goalModal(goal,dc) {
  const ie=!!goal, today=dateStr(new Date());
  const g=goal||{title:'',description:'',category:dc||'',label:'',labelColor:COLORS[0],dateFrom:today,dateTo:today,status:'not_started'};
  const eCats=[...new Set(S.pGoals.map(x=>x.category).filter(Boolean))];
  const cOpts=eCats.map(c=>`<option value="${esc(c)}">`).join('');
  const cSw=COLORS.map(c=>`<div class="cswatch ${c===g.labelColor?'sel':''}" style="background:${c}" onclick="pickGC(this,'${c}')"></div>`).join('');
  const stOpts=STATUSES.map(s=>`<div class="status-opt ${g.status===s.val?'sel':''}" style="--oc:${s.color}" onclick="pickSt(this,'${s.val}')"><span class="st-dot" style="background:${s.color}"></span>${s.label}</div>`).join('');

  showModal(`<div class="modal wide">
    <div class="modal-hdr">
      <div><div class="modal-title">${ie?'Edit Goal':'New Goal'}</div><div class="modal-sub">${ie?'Update this goal\'s details':'Add a goal to your planner timeline'}</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-lbl">Goal Title *</label><input class="form-inp" id="gm-t" placeholder="e.g. Launch marketing campaign" value="${esc(g.title)}" maxlength="80"></div>
    <div class="form-group"><label class="form-lbl">Description</label><textarea class="form-inp" id="gm-d" rows="2" placeholder="What does success look like? What's involved?">${esc(g.description||'')}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Category</label><datalist id="cat-dl">${cOpts}</datalist><input class="form-inp" id="gm-cat" list="cat-dl" placeholder="e.g. Marketing, Design…" value="${esc(g.category||'')}"></div>
      <div class="form-group"><label class="form-lbl">Label</label><input class="form-inp" id="gm-lbl" placeholder="e.g. High Priority, MVP…" value="${esc(g.label||'')}"></div>
    </div>
    <div class="form-group"><label class="form-lbl">Bar Color</label><div class="color-picker" id="gm-cp">${cSw}</div><input type="hidden" id="gm-c" value="${g.labelColor||COLORS[0]}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Start Date *</label><input type="date" class="form-inp" id="gm-from" value="${g.dateFrom}"></div>
      <div class="form-group"><label class="form-lbl">End Date *</label><input type="date" class="form-inp" id="gm-to" value="${g.dateTo}"></div>
    </div>
    <div class="form-group"><label class="form-lbl">Status</label><div class="status-grid" id="gm-sw">${stOpts}</div><input type="hidden" id="gm-st" value="${g.status}"></div>
    <div class="modal-foot">
      ${ie?`<button class="btn btn-ghost" style="margin-right:auto;color:var(--red)" onclick="confirmDelGoal('${g.id}')">Delete Goal</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveGoal(${ie?`'${g.id}'`:'null'})">${ie?'Save Changes':'Add Goal'}</button>
    </div>
  </div>`);
}

function pickGC(el,c){ el.closest('#gm-cp').querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); $('gm-c').value=c; }
function pickSt(el,v){ el.closest('#gm-sw').querySelectorAll('.status-opt').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); $('gm-st').value=v; }

function saveGoal(id) {
  const title=$('gm-t').value.trim(), from=$('gm-from').value, to=$('gm-to').value;
  if(!title){$('gm-t').style.borderColor='var(--red)';$('gm-t').focus();return;}
  if(!from||!to){alert('Please set start and end dates.');return;}
  if(from>to){alert('End date must be on or after start date.');return;}
  const ex=id?S.goals.find(x=>x.id===id):null;
  const g={id:id||uid(),projectId:S.projectId,title,description:$('gm-d').value.trim(),
    category:$('gm-cat').value.trim()||'Uncategorized',label:$('gm-lbl').value.trim(),
    labelColor:$('gm-c').value||COLORS[0],dateFrom:from,dateTo:to,
    status:$('gm-st').value||'not_started',createdAt:ex?.createdAt||new Date().toISOString()};
  id?S.updateGoal(g):S.addGoal(g);
  closeModal(); renderPlanner();
}

function confirmDelGoal(id){
  const g=S.goals.find(x=>x.id===id);
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Delete Goal?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete <strong style="color:var(--text)">${esc(g?.title)}</strong>? This cannot be undone.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDelGoal('${id}')">Delete</button></div>
  </div>`);
}
function doDelGoal(id){ S.deleteGoal(id); closeModal(); renderPlanner(); }

// =====================================================
// DAY NOTE MODAL
// =====================================================
function openDayNote(gid,ds) {
  const goal=S.goals.find(g=>g.id===gid); if(!goal) return;
  const d=parseD(ds), ex=S.getNote(gid,ds), color=goal.labelColor||'#7b79f7', st=stInfo(goal.status), od=isOverdue(goal);
  showModal(`<div class="modal">
    <div class="modal-hdr">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">${fmtD(d)}</div>
        <div style="font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px">
          <span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>${esc(goal.title)}
        </div>
        <div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap">
          <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${st.color}20;color:${st.color};font-weight:600">${st.label}</span>
          ${goal.label?`<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${color}20;color:${color};font-weight:600">${esc(goal.label)}</span>`:''}
          ${od?`<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(240,111,111,.15);color:var(--red);font-weight:600">⚠ Overdue since ${goal.dateTo}</span>`:''}
        </div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-lbl">Notes / Progress</label><textarea class="form-inp" id="dn-txt" rows="6" placeholder="What did you work on today? Any progress, blockers, or reflections…">${esc(ex)}</textarea></div>
    <div class="modal-foot">
      ${ex?`<button class="btn btn-ghost" style="color:var(--red);margin-right:auto" onclick="clearDayNote('${gid}','${ds}')">Clear</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDayNote('${gid}','${ds}')">Save Note</button>
    </div>
  </div>`);
}
function saveDayNote(gid,ds){ S.setNote(gid,ds,$('dn-txt').value); closeModal(); renderPlanner(); }
function clearDayNote(gid,ds){ S.setNote(gid,ds,''); closeModal(); renderPlanner(); }

// =====================================================
// JOURNAL MODAL
// =====================================================
function openJournal(ds){
  const d=parseD(ds), ex=S.getJournal(ds), td=isToday(d);
  showModal(`<div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title">Daily Journal</div>
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-top:4px;color:${td?'var(--accent)':'var(--text)'}">
          ${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}${td?' · Today':''}
        </div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-lbl">Journal Entry</label><textarea class="form-inp" id="jn-txt" rows="8" placeholder="Thoughts, reflections, what happened today, what you're grateful for, what you're planning…">${esc(ex)}</textarea></div>
    <div class="modal-foot">
      ${ex?`<button class="btn btn-ghost" style="color:var(--red);margin-right:auto" onclick="clearJournal('${ds}')">Clear Entry</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveJournal('${ds}')">Save Entry</button>
    </div>
  </div>`);
}
function saveJournal(ds){ S.setJournal(ds,$('jn-txt').value); closeModal(); }
function clearJournal(ds){ S.setJournal(ds,''); closeModal(); }

// =====================================================
// SETTINGS MODAL
// =====================================================
function openSettings(){
  const theme=SETTINGS.get('theme','dark'), fn=SETTINGS.get('folderName',null), as=SETTINGS.get('autoSave',false);
  const ps=S.projects.length, gs=S.goals.length, ns=Object.keys(S.notes).length, js=Object.keys(S.journals).length;
  showModal(`<div class="modal wide">
    <div class="modal-hdr">
      <div><div class="modal-title">Settings</div><div class="modal-sub">Preferences, theme, and data management</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>

    <div class="ss-section">
      <div class="ss-title">Appearance</div>
      <div class="ss-row">
        <div><div class="ss-lbl">Theme</div><div class="ss-hint">Choose your preferred display mode</div></div>
        <div class="theme-toggle">
          <button class="theme-btn ${theme==='dark'?'active':''}" onclick="setTheme('dark')">🌙 Dark</button>
          <button class="theme-btn ${theme==='light'?'active':''}" onclick="setTheme('light')">☀️ Light</button>
        </div>
      </div>
    </div>

    <div class="ss-section">
      <div class="ss-title">Data</div>
      <div style="margin-bottom:16px">
        <div class="data-stats">
          <div><div class="stat-val">${ps}</div><div class="stat-lbl">Projects</div></div>
          <div><div class="stat-val">${gs}</div><div class="stat-lbl">Goals</div></div>
          <div><div class="stat-val">${ns}</div><div class="stat-lbl">Notes</div></div>
          <div><div class="stat-val">${js}</div><div class="stat-lbl">Journals</div></div>
        </div>
      </div>

      ${FS.sup?`
      <label class="form-lbl">Auto-save Folder</label>
      <div class="folder-box" style="margin-bottom:10px">
        <div>
          <div class="folder-name ${fn?'':'empty'}">${fn?'📂 '+esc(fn):'No folder selected'}</div>
          <div class="form-hint">${fn&&as?'✓ Auto-saving to this folder after each change':'Select a folder to auto-save arcus-data.json there'}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-ghost btn-sm" onclick="pickF()">${fn?'Change':'Choose Folder'}</button>
          ${fn?`<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="clearF()">✕</button>`:''}
        </div>
      </div>` : `
      <div class="info-box" style="margin-bottom:12px">📌 <strong>Folder auto-save</strong> requires Chrome or Edge. Your data is automatically stored in the browser's localStorage.</div>`}

      <label class="form-lbl">Backup &amp; Restore</label>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="FS.exportJSON()">⬇ Export JSON</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="FS.importJSON()">⬆ Import JSON</button>
      </div>
      <div class="form-hint">Export downloads a full backup. Import replaces all data from a backup file.</div>
    </div>

    <div class="ss-section">
      <div class="ss-title">About</div>
      <div class="info-box">
        <strong>Arcus Planner</strong> — Gantt-style project &amp; goal planner.<br>
        Works as a single HTML file — host on GitHub Pages, Netlify, or anywhere. No server required. All data stored locally.
      </div>
    </div>

    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
  </div>`);
}

function setTheme(t){
  applyTheme(t);
  document.querySelectorAll('.theme-btn').forEach(b=>{
    b.classList.toggle('active', (t==='dark'&&b.textContent.includes('Dark'))||(t==='light'&&b.textContent.includes('Light')));
  });
}

async function pickF(){ const n=await FS.pickFolder(); if(n){closeModal();openSettings();} }
async function clearF(){ await FS.clearFolder(); closeModal(); openSettings(); }

// =====================================================
// INIT
// =====================================================
async function init(){
  SETTINGS.load();
  applyTheme(SETTINGS.get('theme','dark'));
  if(FS.sup && SETTINGS.get('autoSave',false)){
    const ok=await FS.tryLoadHandle();
    if(!ok){ SETTINGS.set('autoSave',false); SETTINGS.set('folderName',null); }
  }
  render();
}

init();
</script>
</body>
</html>
