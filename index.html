<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Home</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.page-body { flex: 1; overflow-y: auto; padding: 32px 40px 60px; }

/* Greeting */
.greeting-row { margin-bottom: 28px; }
.greeting-row h1 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; letter-spacing: -.5px; margin-bottom: 3px; }
.greeting-date { font-size: 13px; color: var(--muted); }
.greeting-role { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
.stat-card { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: border-color .15s; }
.stat-card:hover { border-color: var(--border2); }
.stat-card.accent-card { border-color: var(--accent); background: rgba(123,121,247,.07); }
.stat-card.warn-card { border-color: var(--red); background: rgba(240,111,111,.07); }
.stat-num { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 12px; color: var(--muted); font-weight: 500; }

/* Section title */
.section-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.section-title-action { margin-left: auto; font-size: 12px; color: var(--accent); cursor: pointer; letter-spacing: 0; text-transform: none; font-weight: 600; }

/* Main grid */
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

/* Focus panels */
.focus-panel { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.focus-panel-hdr { padding: 14px 16px 0; }
.focus-items { padding: 8px 16px 14px; display: flex; flex-direction: column; gap: 1px; }
.focus-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.focus-item:last-child { border-bottom: none; }
.focus-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.focus-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
.focus-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.focus-badge { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.focus-empty { padding: 20px 16px; text-align: center; color: var(--muted); font-size: 12px; }
.focus-link { font-size: 11px; color: var(--accent); font-weight: 600; cursor: pointer; }
.focus-link:hover { opacity: .8; }

/* Quick task add */
.quick-add { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); }
.quick-add input { flex: 1; background: var(--s3); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; color: var(--text); font-size: 12px; }
.quick-add input:focus { border-color: var(--accent); outline: none; }
.quick-add input::placeholder { color: var(--dim); }

/* Journal strip */
.journal-strip { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 16px; align-items: flex-start; }
.journal-strip-icon { font-size: 22px; flex-shrink: 0; }
.journal-strip-content { flex: 1; min-width: 0; }
.journal-strip-date { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.journal-strip-text { font-size: 13px; color: var(--muted); line-height: 1.5; white-space: pre-wrap; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.journal-strip-empty { font-size: 13px; color: var(--dim); font-style: italic; }

@media(max-width:900px) {
  .main-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .page-body { padding: 20px 20px 40px; }
}
/* Status grid (goal modal from home) */
.status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.status-opt { padding:7px 8px; border-radius:7px; border:1px solid var(--border); background:var(--s3); cursor:pointer; text-align:center; font-size:12px; font-weight:500; color:var(--muted); transition:all .15s; }
.status-opt.sel { border-color:var(--oc); background:color-mix(in srgb,var(--oc) 14%,transparent); color:var(--text); }
.st-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="page-body">

  <div class="greeting-row">
    <h1 id="greeting-h1">Welcome back!</h1>
    <div class="greeting-date" id="greeting-date"></div>
    <div class="greeting-role" id="greeting-role"></div>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="main-grid">
    <!-- Active Goals Today -->
    <div class="focus-panel">
      <div class="focus-panel-hdr">
        <div class="section-title">
          Active Goals Today
          <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="newGoalModal()">＋ Goal</button>
            <span class="section-title-action" style="margin-left:0" onclick="location.href='projects.html'">View Projects →</span>
          </span>
        </div>
      </div>
      <div class="focus-items" id="goals-today"></div>
    </div>

    <!-- Tasks & Due -->
    <div class="focus-panel">
      <div class="focus-panel-hdr">
        <div class="section-title">
          Tasks Due
          <span class="section-title-action" onclick="location.href='tasks.html'">Open Board →</span>
        </div>
      </div>
      <div class="focus-items" id="tasks-today"></div>
      <div class="quick-add">
        <input id="quick-task-inp" placeholder="Quick add task… (press Enter)" maxlength="80"
               onkeydown="if(event.key==='Enter')quickAddTask()">
        <button class="btn btn-primary btn-sm" onclick="quickAddTask()">Add</button>
      </div>
    </div>
  </div>

  <!-- Today's Journal -->
  <div class="focus-panel">
    <div class="focus-panel-hdr">
      <div class="section-title">
        Today's Journal
        <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="newJournalEntry()">＋ New Entry</button>
          <span class="section-title-action" style="margin-left:0" onclick="location.href='journal.html'">Open Journal →</span>
        </span>
      </div>
    </div>
    <div class="focus-items" id="journal-items-today"></div>
  </div>

</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="data.js"></script>
<script>
const DAYS_LONG   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme','dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('home');
  renderGreeting();
  renderStats();
  renderGoalsToday();
  renderTasksToday();
  renderJournalToday();
}

function renderGreeting() {
  const p = Arc.Profile.get();
  const now = new Date();
  const name = p.firstName ? `, ${p.firstName}!` : '!';
  document.getElementById('greeting-h1').textContent = `${Arc.Profile.greeting()}${name}`;
  document.getElementById('greeting-date').textContent =
    `${DAYS_LONG[now.getDay()]}, ${MONTHS_LONG[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('greeting-role').textContent = p.role || '';
}

function renderStats() {
  const ps = Arc.Projects.getAll();
  const gs = Arc.Goals.getAll();
  const active = gs.filter(g => g.status === 'in_progress').length;
  const overdue = Arc.Goals.overdue().length;
  const tasks = Arc.Tasks.pending().length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card" onclick="location.href='projects.html'">
      <div class="stat-num">${ps.length}</div>
      <div class="stat-lbl">Projects</div>
    </div>
    <div class="stat-card ${active>0?'accent-card':''}" onclick="location.href='projects.html'">
      <div class="stat-num" style="color:var(--accent)">${active}</div>
      <div class="stat-lbl">Active Goals</div>
    </div>
    <div class="stat-card ${overdue>0?'warn-card':''}" onclick="location.href='projects.html'">
      <div class="stat-num" style="color:${overdue>0?'var(--red)':'var(--text)'}">${overdue}</div>
      <div class="stat-lbl">Overdue Goals</div>
    </div>
    <div class="stat-card" onclick="location.href='tasks.html'">
      <div class="stat-num">${tasks}</div>
      <div class="stat-lbl">Pending Tasks</div>
    </div>`;
}

function renderGoalsToday() {
  const todayGoals = Arc.Goals.activeToday();
  const overdueGoals = Arc.Goals.overdue().filter(g => !Arc.Goals.activeToday().find(x=>x.id===g.id));
  const all = [...todayGoals, ...overdueGoals].slice(0, 8);
  const el = document.getElementById('goals-today');
  if (all.length === 0) {
    el.innerHTML = `<div class="focus-empty">No goals active today — <span class="focus-link" onclick="location.href='projects.html'">view projects</span></div>`;
    return;
  }
  el.innerHTML = all.map(g => {
    const proj = Arc.Projects.getById(g.projectId);
    const st   = Arc.Goals.statusInfo(g.status);
    const od   = Arc.Goals.isOverdue(g);
    const clr  = g.labelColor || st.color;
    return `<div class="focus-item">
      <div class="focus-dot" style="background:${clr}"></div>
      <div style="flex:1;min-width:0">
        <div class="focus-title">${Arc.esc(g.title)}${od?' <span style="color:var(--red);font-size:10px">⚠ overdue</span>':''}</div>
        <div class="focus-meta">
          ${proj?`<span>${Arc.esc(proj.name)}</span>`:''}
          <span class="focus-badge" style="background:${st.color}20;color:${st.color}">${st.label}</span>
          <span class="focus-link" onclick="location.href='planner.html?pid=${g.projectId}'">Open →</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderTasksToday() {
  const overdue  = Arc.Tasks.overdue();
  const dueToday = Arc.Tasks.dueToday();
  const all = [...new Map([...overdue,...dueToday].map(t=>[t.id,t])).values()].slice(0, 8);
  const pending  = Arc.Tasks.pending();
  const el = document.getElementById('tasks-today');

  if (all.length === 0 && pending.length === 0) {
    el.innerHTML = `<div class="focus-empty">Nothing due today 🎉</div>`;
    return;
  }
  if (all.length === 0) {
    el.innerHTML = `<div class="focus-empty">No tasks due today — ${pending.length} task${pending.length!==1?'s':''} pending</div>`;
    return;
  }

  el.innerHTML = all.map(t => {
    const pri  = Arc.PRIORITIES.find(p=>p.val===t.priority)||Arc.PRIORITIES[1];
    const isOd = t.dueDate && t.dueDate < Arc.today();
    const proj = t.projectId ? Arc.Projects.getById(t.projectId) : null;
    return `<div class="focus-item">
      <div class="focus-dot" style="background:${pri.color}"></div>
      <div style="flex:1;min-width:0">
        <div class="focus-title">${Arc.esc(t.title)}${isOd?' <span style="color:var(--red);font-size:10px">⚠ overdue</span>':''}</div>
        <div class="focus-meta">
          ${proj?`<span>${Arc.esc(proj.name)}</span>`:''}
          ${t.dueDate?`<span>${t.dueDate}</span>`:''}
          <span class="focus-badge" style="background:${pri.color}20;color:${pri.color}">${pri.label}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function fmtTime(iso) {
  const d = new Date(iso);
  const h = d.getHours(), m = d.getMinutes();
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
}

function renderJournalToday() {
  const today = Arc.today();
  const j2 = JSON.parse(localStorage.getItem('arc_j2') || 'null');
  let todayEntries = [];
  if (j2) {
    todayEntries = j2.filter(e => e.date === today).sort((a,b) => a.createdAt.localeCompare(b.createdAt));
  }
  const el = document.getElementById('journal-items-today');
  if (!el) return;
  if (todayEntries.length === 0) {
    el.innerHTML = `<div class="focus-empty">No journal entries today — <span class="focus-link" onclick="newJournalEntry()">write one now</span></div>`;
    return;
  }
  el.innerHTML = todayEntries.map(e => {
    const plain   = e.content.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    const title   = (e.title && e.title !== 'Journal Entry') ? e.title : 'Journal Entry';
    const preview = plain.slice(0,90) + (plain.length>90?'…':'');
    return `<div class="focus-item" onclick="location.href='journal.html'" style="cursor:pointer">
      <div class="focus-dot" style="background:var(--accent)"></div>
      <div style="flex:1;min-width:0">
        <div class="focus-title">${Arc.esc(title)}</div>
        <div class="focus-meta" style="flex-wrap:nowrap;overflow:hidden">
          <span style="flex-shrink:0">${fmtTime(e.createdAt)}</span>
          ${preview?`<span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${Arc.esc(preview)}</span>`:''}
        </div>
      </div>
      <div style="color:var(--muted);font-size:16px;flex-shrink:0;margin-left:6px">›</div>
    </div>`;
  }).join('');
}

function newJournalEntry() { location.href = 'journal.html?new=1'; }

function newGoalModal() {
  const ps = Arc.Projects.getAll();
  if (ps.length === 0) {
    if (confirm('No projects yet. Create one first?')) location.href = 'projects.html';
    return;
  }
  const today  = Arc.today();
  const cSw    = Arc.COLORS.map(c => `<div class="cswatch ${c===Arc.COLORS[0]?'sel':''}" style="background:${c}" onclick="pgcH(this,'${c}')"></div>`).join('');
  const stOpts = Arc.STATUSES.map(s => `<div class="status-opt ${s.val==='not_started'?'sel':''}" style="--oc:${s.color}" onclick="pstH(this,'${s.val}')"><span class="st-dot" style="background:${s.color}"></span>${s.label}</div>`).join('');
  const projOpts = ps.map(p => `<option value="${Arc.esc(p.id)}">${Arc.esc(p.name)}</option>`).join('');
  showModal(`<div class="modal wide">
    <div class="modal-hdr">
      <div><div class="modal-title">New Goal</div><div class="modal-sub">Add a goal to your project timeline</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-lbl">Project *</label>
      <select class="form-inp" id="gm-proj">${projOpts}</select>
    </div>
    <div class="form-group"><label class="form-lbl">Goal Title *</label><input class="form-inp" id="gm-title" placeholder="e.g. Launch marketing campaign" maxlength="80"></div>
    <div class="form-group"><label class="form-lbl">Description</label><textarea class="form-inp" id="gm-desc" rows="2" placeholder="What does success look like?"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Category</label><input class="form-inp" id="gm-cat" placeholder="e.g. Marketing, Design…"></div>
      <div class="form-group"><label class="form-lbl">Label</label><input class="form-inp" id="gm-lbl" placeholder="e.g. High Priority, MVP…"></div>
    </div>
    <div class="form-group"><label class="form-lbl">Bar Color</label><div class="color-picker" id="gm-cp">${cSw}</div><input type="hidden" id="gm-color" value="${Arc.COLORS[0]}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Start Date *</label><input type="date" class="form-inp" id="gm-from" value="${today}"></div>
      <div class="form-group"><label class="form-lbl">End Date *</label><input type="date" class="form-inp" id="gm-to" value="${today}"></div>
    </div>
    <div class="form-group"><label class="form-lbl">Status</label><div class="status-grid" id="gm-sw">${stOpts}</div><input type="hidden" id="gm-status" value="not_started"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveGoalFromHome()">Add Goal</button>
    </div>
  </div>`);
}

function pgcH(el,c) { el.closest('#gm-cp').querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); document.getElementById('gm-color').value=c; }
function pstH(el,v) { el.closest('#gm-sw').querySelectorAll('.status-opt').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); document.getElementById('gm-status').value=v; }

function saveGoalFromHome() {
  const title = document.getElementById('gm-title').value.trim();
  const pid   = document.getElementById('gm-proj').value;
  const from  = document.getElementById('gm-from').value;
  const to    = document.getElementById('gm-to').value;
  if (!title) { document.getElementById('gm-title').style.borderColor='var(--red)'; document.getElementById('gm-title').focus(); return; }
  if (!from || !to) { alert('Please set start and end dates.'); return; }
  if (from > to) { alert('End date must be on or after start date.'); return; }
  const g = {
    id: Arc.uid(), projectId: pid, title,
    description: document.getElementById('gm-desc').value.trim(),
    category:    document.getElementById('gm-cat').value.trim() || 'Uncategorized',
    label:       document.getElementById('gm-lbl').value.trim(),
    labelColor:  document.getElementById('gm-color').value || Arc.COLORS[0],
    dateFrom: from, dateTo: to,
    status:      document.getElementById('gm-status').value || 'not_started',
    createdAt:   new Date().toISOString(),
  };
  const gs = Arc.Goals.getAll(); gs.push(g); Arc.Goals.save(gs);
  closeModal(); renderStats(); renderGoalsToday();
}

function quickAddTask() {
  const inp = document.getElementById('quick-task-inp');
  const title = inp.value.trim();
  if (!title) return;
  Arc.Tasks.add({
    id: Arc.uid(), title,
    priority: 'medium', dueDate: Arc.today(),
    bucketId: 'b_todo', projectId: '',
    createdAt: new Date().toISOString(),
  });
  inp.value = '';
  renderStats();
  renderTasksToday();
}

function onProfileSaved() { renderGreeting(); }
function onDataImported() { window.location.reload(); }

init();
</script>
</body>
</html>
