<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Task Board</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Toolbar ── */
.tasks-toolbar {
  padding: 0 18px; min-height: 50px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--s1); flex-wrap: wrap; padding-top: 4px; padding-bottom: 4px;
}
.toolbar-title { font-family:'Fraunces',serif; font-size:16px; font-weight:600; }
.filter-set { display:flex; gap:6px; align-items:center; }
.filter-lbl { font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted); }
.tb-sep { width:1px;height:22px;background:var(--border);margin:0 2px; flex-shrink:0; }
.fpill { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; border:1px solid var(--border); background:var(--s3); color:var(--muted); cursor:pointer; transition:all .15s; }
.fpill:hover { color:var(--text); border-color:var(--border2); }
.fpill.on { background:rgba(123,121,247,.1); color:var(--accent); border-color:var(--accent); }
/* Person filter: bare overlapping avatars (click = filter) + a round filter button (click = dropdown) */
.pf-btn { border:none; background:transparent; padding:0; display:flex; align-items:center; }
.pf-ava { display:inline-flex; border-radius:50%; position:relative; margin-left:-9px; box-shadow:0 0 0 2px var(--s1); cursor:pointer; transition:transform .12s; }
.pf-ava:hover { transform:scale(1.12); z-index:5 !important; }
.pf-ava:first-child { margin-left:0; }
.pf-ava.active { box-shadow:0 0 0 2px var(--accent); z-index:4 !important; }
.pf-filter-circle { width:27px; height:27px; border-radius:50%; border:1px solid var(--border); background:var(--s1); color:var(--muted); display:flex; align-items:center; justify-content:center; margin-left:7px; transition:all .15s; flex-shrink:0; cursor:pointer; }
.pf-filter-circle:hover { border-color:var(--border2); color:var(--text); }
.pf-filter-circle.on { border-color:var(--accent); color:var(--accent); background:rgba(123,121,247,.08); }
.pmd-item.on { background:rgba(123,121,247,.1); color:var(--accent); }

/* ── Multi-select project dropdown ── */
.proj-multi-wrap { position:relative; }
.proj-multi-btn {
  background:var(--s3); border:1px solid var(--border); border-radius:7px;
  padding:5px 24px 5px 10px; color:var(--text); font-size:12px; font-weight:500;
  cursor:pointer; min-width:110px; max-width:220px; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; position:relative; text-align:left;
  line-height:1.4;
}
.pmb-arr { position:absolute; right:7px; top:50%; transform:translateY(-50%); color:var(--muted); display:flex; align-items:center; }
.proj-multi-btn.has-sel { border-color:var(--accent); color:var(--accent); background:rgba(123,121,247,.08); }
.proj-multi-dropdown {
  position:absolute; top:calc(100% + 4px); left:0; z-index:200; min-width:200px;
  background:var(--s2); border:1px solid var(--border2); border-radius:10px;
  padding:6px; box-shadow:0 8px 28px rgba(0,0,0,.35); display:none;
}
.proj-multi-dropdown.open { display:block; }
.pmd-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:7px;
  cursor:pointer; font-size:12px; font-weight:500; color:var(--text); transition:background .12s; }
.pmd-item:hover { background:var(--s3); }
.pmd-item input[type=checkbox] { width:14px;height:14px;accent-color:var(--accent);flex-shrink:0; }
.pmd-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
.pmd-divider { height:1px; background:var(--border); margin:4px 0; }

/* ── Label filter pills ── */
.label-filter-wrap { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.lf-pill { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
  border:1px solid var(--border); background:var(--s3); color:var(--muted);
  cursor:pointer; transition:all .15s; }
.lf-pill:hover { border-color:var(--border2); color:var(--text); }
.lf-pill.on { color:#fff; }

/* ── Kanban ── */
.kanban-wrap { flex:1; overflow-x:auto; overflow-y:hidden; padding:16px 18px; }
.kanban-board { display:flex; gap:12px; height:100%; min-width:max-content; }
.bucket-col { width:290px; flex-shrink:0; display:flex; flex-direction:column; background:var(--s2); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.bucket-col.new-col { background:transparent; border:2px dashed var(--border2); cursor:pointer; align-items:center; justify-content:center; color:var(--muted); font-size:13px;font-weight:500;gap:6px; transition:border-color .2s,color .2s; }
.bucket-col.new-col:hover { border-color:var(--accent);color:var(--accent); }
.bucket-header { padding:12px 14px 10px; display:flex; align-items:center; gap:8px; border-bottom:none; flex-shrink:0; }
.bucket-name { font-size:11px;font-weight:700;flex:1;letter-spacing:.6px;text-transform:uppercase;color:var(--muted); }
.bucket-count { font-size:12px;font-weight:600;color:var(--muted); }
.bucket-menu { position:relative; }
.bucket-menu-btn { width:24px;height:24px;border-radius:6px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s; }
.bucket-menu-btn:hover { background:var(--s3);color:var(--text); }
.bucket-dropdown { position:absolute;top:28px;right:0;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:4px;z-index:20;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.3); }
.bucket-dropdown.hidden { display:none; }
.dd-item { display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text);transition:background .15s; }
.dd-item:hover { background:var(--s3); }
.dd-item.danger { color:var(--red); }

/* ── Cards area ── */
.bucket-cards { flex:1; overflow-y:auto; padding:4px 10px 10px; display:flex; flex-direction:column; gap:8px; }
.bucket-cards.drag-over { background:rgba(123,121,247,.06); outline:2px dashed var(--accent); outline-offset:-4px; border-radius:8px; }

/* ── Task Cards ── */
.task-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 13px 14px 12px; cursor: pointer; position: relative;
  transition: box-shadow .2s, transform .15s, border-color .2s;
}
.task-card:hover { border-color: var(--border2); box-shadow: 0 4px 16px rgba(0,0,0,.14); transform: translateY(-2px); }

/* ── Kanban light-theme ── */
[data-theme="light"] body { background: #ffffff; }
[data-theme="light"] .bucket-col { background: #ebebec; border-color: #d8d8da; }
[data-theme="light"] .task-card { background: #ffffff; border-color: #e0e0e2; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
[data-theme="light"] .task-card:hover { border-color: var(--border2); box-shadow: 0 4px 16px rgba(0,0,0,.1); }

/* ── Kanban dark-theme ── */
[data-theme="dark"] .bucket-col { background: #1e1e21; border-color: #2e2e31; }
[data-theme="dark"] .task-card { background: #222225; border-color: #363639; }
[data-theme="dark"] .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.32); }
.task-card.dragging { opacity:.35; transform:scale(.97); box-shadow:none; }
.task-card.done-card { opacity:.45; }
.task-card-title { font-size:13px; font-weight:600; margin-bottom:9px; line-height:1.45; padding-right:54px; color:var(--text); }
.task-card.done-card .task-card-title { text-decoration:line-through; color:var(--muted); }
.task-card-meta { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.tc-date { font-size:11px; color:var(--muted); }
.tc-overdue { color:var(--red); font-weight:600; }
.tc-high { font-size:10px; font-weight:700; padding:1px 7px; border-radius:6px; background:rgba(240,111,111,.12); color:var(--red); border:1px solid rgba(240,111,111,.25); letter-spacing:.3px; }
.tc-proj { font-size:11px; color:var(--dim); }
.card-pill { font-size:10px; font-weight:600; padding:2px 8px; border-radius:8px; }
.tc-label-pill { font-size:10px; font-weight:400; padding:1px 7px; border-radius:8px; letter-spacing:.15px; }
.task-card-actions { position:absolute; top:9px; right:9px; display:flex; gap:3px; opacity:0; transition:opacity .15s; }
.task-card:hover .task-card-actions { opacity:1; }
.card-action-btn { width:23px; height:23px; border-radius:6px; background:var(--s3); border:1px solid var(--border); color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; transition:color .15s,background .15s; }
.card-action-btn:hover { color:var(--text); background:var(--s2); }
.card-action-btn.pinned { color:var(--accent); border-color:var(--accent); background:rgba(123,121,247,.1); }
.tc-pin-dot { position:absolute; top:10px; right:10px; line-height:1; color:var(--accent); pointer-events:none; transition:opacity .15s; }
.task-card:hover .tc-pin-dot { opacity:0; }

/* ── Empty ── */
.bucket-empty { color:var(--dim);font-size:12px;text-align:center;padding:20px 12px; }

/* ── Bucket modal color pick ── */
.bucket-colors { display:flex;gap:7px;flex-wrap:wrap; }
.bucket-add-btn { width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.8);border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-size:17px;font-weight:300;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1;padding:0; }
.bucket-add-btn:hover { background:var(--accent);border-color:var(--accent);color:#fff; }

/* ── Split modal ── */
.modal.modal-split { max-width:1020px; padding:0; overflow:hidden; display:flex; flex-direction:column; }
.modal.modal-split .modal-hdr { padding:22px 26px 0; flex-shrink:0; margin-bottom:0; }
.split-body { display:flex; flex:1; min-height:0; }
.split-form { flex:1; min-width:0; overflow-y:auto; padding:18px 26px 22px; }
.split-sidebar { width:460px; flex-shrink:0; border-left:1px solid var(--border); display:flex; flex-direction:column; }
.split-sidebar-hdr { padding:14px 14px 8px; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); flex-shrink:0; }
.split-sidebar .comments-list { flex:1; max-height:none; border:none; border-radius:0; background:transparent; overflow-y:auto; }
.split-sidebar .cm-input-area { padding:8px 10px 10px; border-top:1px solid var(--border); flex-shrink:0; }
.modal.modal-split .modal-foot { padding:13px 26px; border-top:1px solid var(--border); flex-shrink:0; margin-top:0; }

/* ── Comments / Updates ── */
.comments-list { border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;background:var(--s1); }
.comment-item { padding:9px 12px;border-bottom:1px solid var(--border); }
.comment-item:last-child { border-bottom:none; }
.comment-meta { display:flex;align-items:center;justify-content:space-between;margin-bottom:4px; }
.comment-time { font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.2px; }
.comment-del  { background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:10px;padding:0;line-height:1;transition:color .15s; }
.comment-del:hover { color:var(--red); }
.comment-body { font-size:13px;color:var(--text);line-height:1.6;word-break:break-word; }
.comment-body p { margin:0 0 4px; }
.comment-body p:last-child { margin-bottom:0; }
.comment-empty { padding:16px 14px;font-size:11px;color:var(--dim);text-align:center; }

/* ── Rich text editor ── */
.rte-wrap { border:1px solid var(--border); border-radius:8px; background:var(--s1); overflow:hidden; }
.rte-toolbar { display:flex; gap:3px; padding:5px 7px; background:var(--s2); border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
.rte-btn { width:26px;height:26px;border-radius:5px;border:1px solid transparent;background:transparent;
  color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
  transition:all .12s; line-height:1; }
.rte-btn:hover { background:var(--s3); color:var(--text); border-color:var(--border); }
.rte-btn.active { background:rgba(123,121,247,.2); color:var(--accent); border-color:rgba(123,121,247,.4); }
.rte-sep { width:1px; height:16px; background:var(--border); margin:0 3px; }
.rte-select { background:var(--s3); border:1px solid var(--border); border-radius:5px; padding:3px 5px;
  color:var(--text); font-size:11px; font-weight:500; cursor:pointer; }
.rte-color-btn { width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid var(--border);flex-shrink:0; }
.rte-body { min-height:72px; max-height:180px; overflow-y:auto; padding:9px 11px; font-size:13px;
  color:var(--text); line-height:1.6; outline:none; }
.rte-body:empty::before { content:attr(data-placeholder); color:var(--dim); pointer-events:none; }
.rte-footer { display:flex; justify-content:flex-end; padding:5px 8px; border-top:1px solid var(--border); background:var(--s2); }
.rte-color-input { opacity:0; position:absolute; pointer-events:none; width:1px; height:1px; }

/* ── Label picker in modal ── */
.label-chips { display:flex; gap:6px; flex-wrap:wrap; }
.label-chip { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; cursor:pointer;
  border:2px solid transparent; transition:all .15s; }
.label-chip:hover { filter:brightness(1.15); }
.label-chip.sel { border-color:#fff8; }
.lbl-manage-link { font-size:11px; color:var(--accent); cursor:pointer; font-weight:600; }
.lbl-manage-link:hover { opacity:.75; }

/* ── Sub-tasks ── */
.st-list { display:flex; flex-direction:column; }
.st-item { display:flex; align-items:center; gap:8px; padding:4px 2px; position:relative; }
.st-item input[type="checkbox"] { width:14px; height:14px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
.st-item-text { flex:1; font-size:13px; color:var(--text); }
.st-item.done .st-item-text { text-decoration:line-through; color:var(--muted); }
.st-item-del { width:16px; height:16px; background:transparent; border:none; color:var(--muted); cursor:pointer; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; opacity:0; transition:opacity .15s,color .15s; padding:0; }
.st-item:hover .st-item-del { opacity:1; }
.st-item-del:hover { color:var(--red); }
.st-new-row { padding:4px 2px; }
.st-new-cb { opacity:.3; flex-shrink:0; width:14px; height:14px; }
.st-new-inp { flex:1; background:transparent; border:none; outline:none; font-size:13px; color:var(--text); font-family:'Outfit',sans-serif; padding:0; }
.st-new-inp::placeholder { color:var(--dim); }
/* Sub-task progress badge on card */
.tc-st-prog { font-size:10px; font-weight:600; padding:1px 6px; border-radius:6px; background:var(--s3); color:var(--muted); border:1px solid var(--border); }
.tc-st-prog.complete { background:rgba(62,201,122,.12); color:var(--green); border-color:rgba(62,201,122,.3); }

/* ── Shared task indicators (people avatars, bottom-right of card) ── */
.tc-people { position:absolute; bottom:9px; right:11px; display:flex; align-items:center; pointer-events:auto; }
.tc-people > * { margin-left:-6px; box-shadow:0 0 0 2px var(--s1); border-radius:50%; }
.tc-people > *:first-child { margin-left:0; }
.tc-people-more { font-size:9px; color:var(--muted); font-weight:700; margin-left:3px !important; box-shadow:none !important; }
[data-theme="light"] .tc-people > * { box-shadow:0 0 0 2px #ffffff; }
[data-theme="dark"] .tc-people > * { box-shadow:0 0 0 2px #222225; }
.task-card.has-people .task-card-meta { padding-right:52px; }
.ts-share-row { display:flex; align-items:center; gap:5px; flex-shrink:0; }
.ts-ava-wrap { cursor:pointer; border-radius:50%; display:inline-flex; transition:transform .12s, opacity .12s; }
.ts-ava-wrap:hover { transform:scale(1.12); opacity:.85; }
.ts-shared-by { font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; }
.ts-add-btn { height:28px; padding:0 13px; border-radius:14px; border:1px solid var(--border); background:var(--s3); color:var(--muted); cursor:pointer; font-size:11px; font-weight:600; line-height:1; display:flex; align-items:center; gap:6px; transition:all .15s; white-space:nowrap; }
.ts-add-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(123,121,247,.08); }
.ts-share-dd { position:absolute; top:36px; left:0; z-index:300; min-width:235px; background:var(--s2); border:1px solid var(--border2); border-radius:10px; padding:5px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
.ts-share-dd.hidden { display:none; }
.ts-dd-person { display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:7px; cursor:pointer; transition:background .12s; }
.ts-dd-person:hover { background:var(--s3); }
.ts-dd-name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ts-dd-mail { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ts-dd-empty { font-size:11px; color:var(--dim); padding:10px 8px; text-align:center; line-height:1.6; }
.ts-dd-sep { height:1px; background:var(--border); margin:4px 2px; }
.ts-dd-inp { font-size:11px; padding:5px 9px; margin:2px; width:calc(100% - 4px); }

/* ── Quick share modal (from card hover) ── */
.csm-lbl { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin:14px 0 7px; }
.csm-lbl:first-child { margin-top:0; }
.csm-row { display:flex; align-items:center; gap:10px; padding:7px 11px; border:1px solid var(--border); border-radius:9px; margin-bottom:6px; }
.csm-row.csm-add { cursor:pointer; transition:border-color .15s, background .15s; }
.csm-row.csm-add:hover { border-color:var(--accent); background:rgba(123,121,247,.05); }
.csm-info { flex:1; min-width:0; }
.csm-name { font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.csm-mail { font-size:10.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.csm-x { width:22px; height:22px; border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:11px; border-radius:5px; flex-shrink:0; padding:0; }
.csm-x:hover { color:var(--red); }
.csm-plus { color:var(--accent); font-weight:700; font-size:15px; flex-shrink:0; }
</style>
</head>
<body>
<div id="nav-container"></div>

<div class="tasks-toolbar">
  <div class="toolbar-title">Task Board</div>
  <div class="filter-set">
    <span class="filter-lbl">Project:</span>
    <div class="proj-multi-wrap" id="proj-multi-wrap">
      <button class="proj-multi-btn" id="proj-multi-btn" onclick="toggleProjDropdown(event)">All Projects</button>
      <div class="proj-multi-dropdown" id="proj-multi-dd"></div>
    </div>
  </div>
  <div class="tb-sep"></div>
  <div class="filter-set">
    <span class="filter-lbl">Label:</span>
    <div class="label-filter-wrap" id="label-filter-wrap"></div>
  </div>
  <div class="tb-sep"></div>
  <div class="filter-set">
    <span class="filter-lbl">Shared:</span>
    <div class="fpill" id="f-shared" onclick="toggleSharedOnly()">Shared only</div>
    <div class="proj-multi-wrap" id="pf-wrap">
      <div class="pf-btn" id="pf-btn" title="Filter by person"></div>
      <div class="proj-multi-dropdown" id="pf-dd"></div>
    </div>
  </div>
  <div class="tb-sep"></div>
  <button class="btn btn-ghost btn-sm" onclick="manageBuckets()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;vertical-align:-2px"><path d="M12 3h7a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-7m0-18H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7m0-18v18"/></svg> Columns</button>
</div>

<div class="kanban-wrap">
  <div class="kanban-board" id="kanban-board"></div>
</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="data.js?v=9"></script>
<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ======================================================
// STATE
// ======================================================
let selectedProjects = []; // array of project IDs; empty = all
let selectedLabels   = []; // array of label IDs;   empty = all
let sharedOnly   = false;  // show only shared items
let personFilter = null;   // email — show only items involving this person
let openDropdown = null;
let projDropdownOpen = false;

// ======================================================
// DRAG AND DROP
// ======================================================
let draggedTaskId = null;
let dragEnterCount = 0;

function onDragStart(e, taskId) {
  draggedTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
  setTimeout(() => {
    const el = document.querySelector(`[ondragstart*="${taskId}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd() {
  draggedTaskId = null;
  document.querySelectorAll('.task-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.bucket-cards.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragEnter(e) { e.preventDefault(); dragEnterCount++; e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { dragEnterCount--; if (dragEnterCount <= 0) { dragEnterCount = 0; e.currentTarget.classList.remove('drag-over'); } }
function onDrop(e, bucketId) {
  e.preventDefault(); dragEnterCount = 0; e.currentTarget.classList.remove('drag-over');
  const taskId = draggedTaskId || e.dataTransfer.getData('text/plain');
  if (!taskId) return;
  // Task shared with me — update the shared doc, not my own store
  if (Arc.Shared.isWithMe(taskId)) {
    const s = Arc.Shared.get(taskId);
    if (s && s.data.bucketId !== bucketId) {
      Arc.Shared.updateAsMember(taskId, { ...s.data, bucketId }).catch(err => console.warn(err));
      renderBoard();
    }
    draggedTaskId = null;
    return;
  }
  const task = Arc.Tasks.getAll().find(t => t.id === taskId);
  if (task && task.bucketId !== bucketId) {
    Arc.Tasks.update({ ...task, bucketId });
    if (bucketId === 'b_done') Arc.PinnedTasks.unpin(task.id);
    renderBoard();
  }
  draggedTaskId = null;
}

function fmtDate(s) { if (!s) return ''; const d = new Date(s+'T00:00:00'); return `${MONTHS[d.getMonth()]} ${d.getDate()}`; }

// ======================================================
// INIT
// ======================================================
function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme','dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('tasks');

  // Restore saved filter state
  try {
    const saved = JSON.parse(localStorage.getItem('arc_tasks_filter') || '{}');
    if (Array.isArray(saved.projects)) selectedProjects = saved.projects;
    if (Array.isArray(saved.labels))   selectedLabels   = saved.labels;
    if (typeof saved.sharedOnly === 'boolean') sharedOnly = saved.sharedOnly;
    if (saved.person) personFilter = saved.person;
  } catch {}

  updateSharedPill();
  updatePersonBtn();
  buildProjDropdown();
  buildLabelFilterPills();
  renderBoard();

  document.addEventListener('click', e => {
    if (openDropdown && !openDropdown.contains(e.target)) {
      openDropdown.querySelector('.bucket-dropdown').classList.add('hidden');
      openDropdown = null;
    }
    // Close project multi-dropdown
    const wrap = document.getElementById('proj-multi-wrap');
    if (projDropdownOpen && wrap && !wrap.contains(e.target)) {
      closeProjDropdown();
    }
    // Close share people-picker
    const sdd = document.getElementById('ts-share-dd');
    if (sdd && !sdd.classList.contains('hidden') && !sdd.contains(e.target)) {
      sdd.classList.add('hidden');
    }
    // Close person filter dropdown
    const pfWrap = document.getElementById('pf-wrap');
    if (pfWrap && !pfWrap.contains(e.target)) {
      document.getElementById('pf-dd')?.classList.remove('open');
    }
  });

  const params = new URLSearchParams(location.search);
  const tid = params.get('tid');
  if (tid) setTimeout(() => editTaskModal(tid), 200);
  else if (params.get('new')) { setUrlParam('new', null); setTimeout(() => newTaskModal('b_todo'), 200); }
}

window.closeModal = (orig => () => { orig(); setUrlParam('tid', null); })(window.closeModal);

// ======================================================
// FILTER
// ======================================================
function saveTasksFilter() {
  localStorage.setItem('arc_tasks_filter', JSON.stringify({
    projects: selectedProjects, labels: selectedLabels,
    sharedOnly, person: personFilter,
  }));
}

// ── Shared / person filters ──────────────────────────────────────────
function toggleSharedOnly() {
  sharedOnly = !sharedOnly;
  updateSharedPill();
  saveTasksFilter(); renderBoard();
}

function updateSharedPill() {
  document.getElementById('f-shared')?.classList.toggle('on', sharedOnly);
}

// Everyone I could be collaborating with: connected people + owners of items shared with me
function personFilterList() {
  const map = {};
  Arc.People.connected().forEach(p => {
    map[p.email] = { email: p.email, name: Arc.People.nameFor(p.email), photo: p.photo };
  });
  Arc.Shared._withMe.forEach(s => {
    const e = (s.ownerEmail || '').toLowerCase();
    if (e && !map[e]) map[e] = { email: e, name: s.ownerName || e, photo: s.ownerPhoto || null };
  });
  return Object.values(map);
}

function togglePersonDd(e) {
  e.stopPropagation();
  const dd = document.getElementById('pf-dd');
  if (!dd) return;
  if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
  const people = personFilterList();
  dd.innerHTML = `
    <div class="pmd-item" onclick="setPersonFilter(null)"><span style="width:22px;display:flex;justify-content:center">${Arc.icon('users', 14)}</span><span>Everyone</span></div>
    ${people.length ? `<div class="pmd-divider"></div>` : ''}
    ${people.map(p => `<div class="pmd-item ${personFilter === p.email ? 'on' : ''}" onclick="setPersonFilter('${Arc.esc(p.email)}')">
      ${arcPersonAva(p, 22)}<span>${Arc.esc(p.name)}</span>
    </div>`).join('')}
    ${!people.length ? `<div style="font-size:11px;color:var(--dim);padding:8px 10px;line-height:1.6">No people yet — connect with someone on the People &amp; Sharing page.</div>` : ''}`;
  dd.classList.add('open');
}

function setPersonFilter(email) {
  personFilter = email || null;
  document.getElementById('pf-dd')?.classList.remove('open');
  updatePersonBtn();
  saveTasksFilter(); renderBoard();
}

function updatePersonBtn() {
  const btn = document.getElementById('pf-btn');
  if (!btn) return;
  const people = personFilterList();
  const filterCircle = `<span class="pf-filter-circle ${personFilter ? 'on' : ''}" onclick="togglePersonDd(event)" title="Filter by person">${Arc.icon('filter', 12)}</span>`;
  if (!people.length) {
    btn.innerHTML = filterCircle;
    return;
  }
  // Bare overlapping profile circles — clicking one filters straight to that
  // person (click again to clear); the filter circle opens the full dropdown
  let list = [...people];
  if (personFilter) {
    list.sort((a, b) => (a.email === personFilter ? -1 : 0) - (b.email === personFilter ? -1 : 0));
  }
  const shown = list.slice(0, 3);
  btn.innerHTML = shown.map((p, i) =>
    `<span class="pf-ava ${p.email === personFilter ? 'active' : ''}" style="z-index:${3 - i}"
       title="${Arc.esc(p.name)} — click to ${p.email === personFilter ? 'clear the filter' : 'show only their tasks'}"
       onclick="event.stopPropagation();pfAvaClick('${Arc.esc(p.email)}')">${arcPersonAva(p, 26)}</span>`
  ).join('') + filterCircle;
}

function pfAvaClick(email) {
  setPersonFilter(personFilter === email ? null : email);
}

// ── Project multi-select ─────────────────────────────────────────────
function buildProjDropdown() {
  const dd = document.getElementById('proj-multi-dd');
  const projects = Arc.Projects.getAll();
  let html = `<div class="pmd-item" onclick="toggleAllProjects()">
    <input type="checkbox" id="pmd-all" ${selectedProjects.length===0?'checked':''}>
    <span>All Projects</span>
  </div>`;
  if (projects.length) {
    html += `<div class="pmd-divider"></div>`;
    html += projects.map(p => `<div class="pmd-item" onclick="toggleProject('${p.id}',event)">
      <input type="checkbox" ${selectedProjects.includes(p.id)?'checked':''} id="pmd-${p.id}">
      <div class="pmd-dot" style="background:${p.color||'#7b79f7'}"></div>
      <span>${Arc.esc(p.name)}</span>
    </div>`).join('');
  }
  dd.innerHTML = html;
  updateProjBtn();
}

function toggleProjDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('proj-multi-dd');
  projDropdownOpen = !projDropdownOpen;
  dd.classList.toggle('open', projDropdownOpen);
}

function closeProjDropdown() {
  projDropdownOpen = false;
  document.getElementById('proj-multi-dd').classList.remove('open');
}

function toggleAllProjects() {
  selectedProjects = [];
  buildProjDropdown();
  saveTasksFilter(); renderBoard();
}

function toggleProject(id, e) {
  if (e) e.stopPropagation();
  const idx = selectedProjects.indexOf(id);
  if (idx >= 0) selectedProjects.splice(idx, 1);
  else selectedProjects.push(id);
  buildProjDropdown();
  saveTasksFilter(); renderBoard();
}

function updateProjBtn() {
  const btn = document.getElementById('proj-multi-btn');
  let label;
  if (selectedProjects.length === 0) {
    label = 'All Projects'; btn.classList.remove('has-sel');
  } else if (selectedProjects.length === 1) {
    const p = Arc.Projects.getById(selectedProjects[0]);
    label = p ? p.name : '1 selected'; btn.classList.add('has-sel');
  } else {
    label = `${selectedProjects.length} projects`; btn.classList.add('has-sel');
  }
  btn.innerHTML = `${Arc.esc(label)}<span class="pmb-arr">${Arc.icon('chevron-down', 12)}</span>`;
}

// ── Label filter pills ───────────────────────────────────────────────
function buildLabelFilterPills() {
  const wrap = document.getElementById('label-filter-wrap');
  const labels = Arc.Labels.getAll();
  if (!labels.length) { wrap.innerHTML = `<span style="font-size:11px;color:var(--dim)">None</span>`; return; }
  wrap.innerHTML = labels.map(l => {
    const on = selectedLabels.includes(l.id);
    return `<div class="lf-pill ${on?'on':''}" id="lfp-${l.id}"
      style="${on?`background:${l.color};border-color:${l.color};color:#fff`:''}"
      onclick="toggleLabelFilter('${l.id}')">${Arc.esc(l.name)}</div>`;
  }).join('');
}

function toggleLabelFilter(id) {
  const idx = selectedLabels.indexOf(id);
  if (idx >= 0) selectedLabels.splice(idx, 1);
  else selectedLabels.push(id);
  buildLabelFilterPills();
  saveTasksFilter(); renderBoard();
}

// ======================================================
// BOARD RENDER
// ======================================================
function renderBoard() {
  const board   = document.getElementById('kanban-board');
  const buckets = Arc.Buckets.getAll();
  const allTasks = Arc.Tasks.getAll();

  // Tasks other people shared with me — mapped into my columns by bucketId,
  // falling back to the first column when the id doesn't exist on my board
  const bucketIds = buckets.map(b => b.id);
  const fallbackBucket = bucketIds[0];
  const sharedWithMe = Arc.Shared.withMeOfType('task');

  board.innerHTML = '';

  buckets.forEach(bucket => {
    let tasks = allTasks.filter(t => t.bucketId === bucket.id);
    if (selectedProjects.length) tasks = tasks.filter(t => selectedProjects.includes(t.projectId));
    if (selectedLabels.length)   tasks = tasks.filter(t => (t.labels||[]).some(lid => selectedLabels.includes(lid)));
    if (sharedOnly)   tasks = tasks.filter(t => Arc.Shared.isSharedByMe(t.id));
    if (personFilter) tasks = tasks.filter(t => Arc.Shared.membersOf(t.id).includes(personFilter));

    let shared = sharedWithMe.filter(s =>
      (bucketIds.includes(s.data.bucketId) ? s.data.bucketId : fallbackBucket) === bucket.id);
    if (personFilter) shared = shared.filter(s =>
      (s.ownerEmail || '').toLowerCase() === personFilter || (s.members || []).includes(personFilter));

    const col = document.createElement('div');
    col.className = 'bucket-col';
    col.dataset.bucketId = bucket.id;

    col.innerHTML = `
      <div class="bucket-header">
        <div class="bucket-name">${Arc.esc(bucket.name)}</div>
        <div class="bucket-count">${tasks.length + shared.length}</div>
        <button class="bucket-add-btn" onclick="newTaskModal('${bucket.id}')" title="Add task">${Arc.icon('plus', 13)}</button>
      </div>
      <div class="bucket-cards" id="bc-${bucket.id}"
           ondragover="onDragOver(event)" ondragenter="onDragEnter(event)"
           ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${bucket.id}')">
        ${tasks.map(t => renderTaskCard(t, bucket.id)).join('')}
        ${shared.map(s => renderTaskCard(s.data, bucket.id, s)).join('')}
      </div>`;
    board.appendChild(col);
  });

  const addCol = document.createElement('div');
  addCol.className = 'bucket-col new-col';
  addCol.onclick = () => newBucketModal();
  addCol.innerHTML = `${Arc.icon('plus', 16)} Add Column`;
  board.appendChild(addCol);
}

// ======================================================
// TASK CARD
// ======================================================
function renderTaskCard(task, bucketId, shared) {
  const proj   = (!shared && task.projectId) ? Arc.Projects.getById(task.projectId) : null;
  const isDone = bucketId === 'b_done';
  const isOd   = task.dueDate && task.dueDate < Arc.today() && !isDone;
  const isPinned = !shared && Arc.PinnedTasks.isPinned(task.id);
  const sharedByMe = !shared && Arc.Shared.isSharedByMe(task.id);

  const metaParts = [];
  if (task.dueDate) metaParts.push(`<span class="tc-date ${isOd?'tc-overdue':''}">${isOd?'⚠ ':''}${fmtDate(task.dueDate)}</span>`);
  if (task.priority === 'high') metaParts.push(`<span class="tc-high">High</span>`);
  if (proj) metaParts.push(`<span class="tc-proj">${Arc.esc(proj.name)}</span>`);

  // Shared indicator: people avatars in the card's bottom-right corner —
  // the owner's photo on tasks shared WITH me, member photos on tasks I shared
  let peopleCluster = '';
  if (shared) {
    peopleCluster = `<div class="tc-people" title="Shared by ${Arc.esc(shared.ownerName)}">
      ${arcPersonAva({ name: shared.ownerName, email: shared.ownerEmail, photo: shared.ownerPhoto }, 20)}</div>`;
  } else if (sharedByMe) {
    const ms = Arc.Shared.membersOf(task.id);
    const names = ms.map(m => Arc.People.nameFor(m)).join(', ');
    peopleCluster = `<div class="tc-people" title="Shared with ${Arc.esc(names)}">
      ${ms.slice(0, 3).map(m => {
        const p = Arc.People.byEmail(m) || { name: m, email: m, photo: null };
        return arcPersonAva(p, 20);
      }).join('')}${ms.length > 3 ? `<span class="tc-people-more">+${ms.length - 3}</span>` : ''}</div>`;
  }

  // Label pills (labels are personal — hidden on tasks shared with me)
  const labelPills = shared ? '' : (task.labels||[]).map(lid => {
    const l = Arc.Labels.getById(lid); if (!l) return '';
    return `<span class="tc-label-pill" style="background:${l.color};color:#fff">${Arc.esc(l.name)}</span>`;
  }).join('');

  // Subtask progress badge
  const sts = task.subtasks || [];
  const stDone = sts.filter(s => s.done).length;
  const stBadge = sts.length
    ? `<span class="tc-st-prog ${stDone === sts.length ? 'complete' : ''}">✓ ${stDone}/${sts.length}</span>`
    : '';

  const canShare = !!(window._arcUser && window._arcDb);
  const actions = shared
    ? `<div class="card-action-btn" onclick="confirmLeaveShared('${task.id}')" title="Remove from my board" style="color:var(--red)">${Arc.icon('x', 12)}</div>`
    : `${canShare ? `<div class="card-action-btn" onclick="cardShareModal('${task.id}')" title="Share">${Arc.icon('share', 11)}</div>` : ''}
       <div class="card-action-btn ${isPinned?'pinned':''}" onclick="togglePin('${task.id}')" title="${isPinned?'Unpin from Focus':'Pin to Focus'}">${Arc.icon('pin', 12)}</div>
       <div class="card-action-btn" onclick="confirmDelTask('${task.id}')" title="Delete" style="color:var(--red)">${Arc.icon('trash', 11)}</div>`;

  return `<div class="task-card ${isDone?'done-card':''} ${peopleCluster?'has-people':''}"
    draggable="true" ondragstart="onDragStart(event,'${task.id}')" ondragend="onDragEnd(event)"
    onclick="editTaskModal('${task.id}')">
    ${isPinned ? `<div class="tc-pin-dot" title="Pinned to Focus">${Arc.icon('pin-fill', 13, 1.5)}</div>` : ''}
    <div class="task-card-actions" onclick="event.stopPropagation()">${actions}</div>
    <div class="task-card-title">${Arc.esc(task.title)}</div>
    ${metaParts.length || labelPills || stBadge ? `<div class="task-card-meta">${metaParts.join('')}${stBadge}${labelPills}</div>` : ''}
    ${peopleCluster}
  </div>`;
}

// ── Pin toggle ────────────────────────────────────────────────────────
function togglePin(taskId) {
  if (Arc.PinnedTasks.isPinned(taskId)) Arc.PinnedTasks.unpin(taskId);
  else Arc.PinnedTasks.pin(taskId);
  renderBoard();
}

// ======================================================
// BUCKET MENU
// ======================================================
function toggleBucketMenu(bucketId, e) {
  e.stopPropagation();
  const menu = document.getElementById(`bm-${bucketId}`);
  const dd   = menu.querySelector('.bucket-dropdown');
  const isHidden = dd.classList.contains('hidden');
  if (openDropdown && openDropdown !== menu) openDropdown.querySelector('.bucket-dropdown').classList.add('hidden');
  dd.classList.toggle('hidden', !isHidden);
  openDropdown = isHidden ? menu : null;
}

function editBucketModal(id, colorOnly = false) {
  closeAllDropdowns();
  const bucket = Arc.Buckets.getAll().find(b => b.id === id); if (!bucket) return;
  const colorOpts = ['#71717a','#7b79f7','#60a5fa','#f5c542','#3ec97a','#f06f6f','#fb923c','#f472b6','#2dd4bf','#a78bfa'].map(c =>
    `<div class="cswatch ${c===bucket.color?'sel':''}" style="background:${c}" onclick="pickBC(this,'${c}')"></div>`
  ).join('');
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div><div class="modal-title">Edit Column</div></div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label class="form-lbl">Column Name</label><input class="form-inp" id="bc-name" value="${Arc.esc(bucket.name)}" maxlength="30"></div>
    <div class="form-group"><label class="form-lbl">Color</label><div class="color-picker" id="bc-cp">${colorOpts}</div><input type="hidden" id="bc-color" value="${bucket.color}"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveBucket('${id}')">Save</button></div>
  </div>`);
}

function pickBC(el, c) { el.closest('#bc-cp').querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); document.getElementById('bc-color').value=c; }

function saveBucket(id) {
  const bucket = Arc.Buckets.getAll().find(b=>b.id===id); if(!bucket) return;
  const name  = document.getElementById('bc-name').value.trim();
  const color = document.getElementById('bc-color').value;
  if (!name) return;
  Arc.Buckets.update({ ...bucket, name, color });
  closeModal(); renderBoard();
}

function newBucketModal() {
  const colorOpts = ['#71717a','#7b79f7','#60a5fa','#f5c542','#3ec97a','#f06f6f','#fb923c','#f472b6','#2dd4bf','#a78bfa'].map((c,i) =>
    `<div class="cswatch ${i===0?'sel':''}" style="background:${c}" onclick="pickBC(this,'${c}')"></div>`
  ).join('');
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div><div class="modal-title">New Column</div></div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label class="form-lbl">Column Name</label><input class="form-inp" id="bc-name" placeholder="e.g. Blocked, Review…" maxlength="30"></div>
    <div class="form-group"><label class="form-lbl">Color</label><div class="color-picker" id="bc-cp">${colorOpts}</div><input type="hidden" id="bc-color" value="#71717a"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createBucket()">Add Column</button></div>
  </div>`);
}

function createBucket() {
  const name  = document.getElementById('bc-name').value.trim();
  const color = document.getElementById('bc-color').value;
  if (!name) { document.getElementById('bc-name').style.borderColor='var(--red)'; return; }
  Arc.Buckets.add({ id: Arc.uid(), name, color, statuses: [], isDefault: false });
  closeModal(); renderBoard();
}

function confirmDelBucket(id) {
  const b = Arc.Buckets.getAll().find(x=>x.id===id); closeAllDropdowns();
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Delete Column?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete <strong>${Arc.esc(b?.name)}</strong>? Tasks will move to <strong>To Do</strong>.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDelBucket('${id}')">Delete</button></div>
  </div>`);
}

function doDelBucket(id) { Arc.Buckets.delete(id, 'b_todo'); closeModal(); renderBoard(); }

function manageBuckets() {
  const buckets = Arc.Buckets.getAll();
  const rows = buckets.map(b => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:12px;height:12px;border-radius:50%;background:${b.color};flex-shrink:0"></div>
      <span style="flex:1;font-size:13px;font-weight:500">${Arc.esc(b.name)}</span>
      ${b.isDefault ? `<span style="font-size:10px;color:var(--muted);padding:1px 7px;border-radius:10px;border:1px solid var(--border)">Default</span>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="editBucketModal('${b.id}')">Edit</button>
      ${!b.isDefault ? `<button class="btn btn-sm" style="background:rgba(240,111,111,.15);color:var(--red);border:1px solid rgba(240,111,111,.3)" onclick="confirmDelBucket('${b.id}')">✕</button>` : ''}
    </div>`).join('');
  showModal(`<div class="modal">
    <div class="modal-hdr"><div><div class="modal-title">Manage Columns</div><div class="modal-sub">Customise your kanban board</div></div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:16px">${rows}</div>
    <div style="margin-bottom:16px"><button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="closeModal();newBucketModal()">＋ Add New Column</button></div>
    <div><button class="btn btn-ghost btn-sm" style="color:var(--muted)" onclick="if(confirm('Reset to default columns?'))doResetBuckets()">${Arc.icon('rotate-ccw', 12)} Reset to defaults</button></div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
  </div>`);
}

function doResetBuckets() { Arc.Buckets.reset(); closeModal(); renderBoard(); }
function clearDoneGoals() { closeAllDropdowns(); alert('Goal cards follow goal status. Update status in the Planner.'); }
function closeAllDropdowns() { document.querySelectorAll('.bucket-dropdown').forEach(d=>d.classList.add('hidden')); openDropdown=null; }

// ======================================================
// LABELS — Manage (delegates to global Arc.openLabelManager)
// ======================================================
function manageLabelsModal(returnToTaskId) {
  Arc.openLabelManager(() => {
    buildLabelFilterPills();
    if (returnToTaskId) editTaskModal(returnToTaskId);
  });
}

// ======================================================
// TASK MODAL — New / Edit
// ======================================================
function newTaskModal(bucketId) { taskModal(null, bucketId); }
function editTaskModal(id) {
  const task = Arc.Tasks.getAll().find(t => t.id === id);
  if (task) { setUrlParam('tid', id); taskModal(task, task.bucketId); return; }
  // Task shared with me — edit the shared copy
  const s = Arc.Shared.get(id);
  if (s && Arc.Shared.isWithMe(id)) { setUrlParam('tid', id); taskModal(s.data, s.data.bucketId, s); }
}

function taskModal(task, defaultBucketId, shared) {
  const isEdit = !!task;
  const t = task || { title:'', description:'', priority:'medium', dueDate:'', projectId:'', bucketId: defaultBucketId||'b_backlog', labels:[] };
  const buckets  = Arc.Buckets.getAll();
  const projects = Arc.Projects.getAll();
  const allLabels = Arc.Labels.getAll();
  const bucketOpts = buckets.map(b => `<option value="${b.id}" ${b.id===t.bucketId?'selected':''}>${Arc.esc(b.name)}</option>`).join('');
  const projOpts   = `<option value="">No project</option>` + projects.map(p => `<option value="${p.id}" ${p.id===t.projectId?'selected':''}>${Arc.esc(p.name)}</option>`).join('');
  const prioOpts   = Arc.PRIORITIES.map(p => `<option value="${p.val}" ${p.val===t.priority?'selected':''}>${p.label}</option>`).join('');

  const taskLabels = t.labels || [];
  const labelChips = allLabels.length
    ? allLabels.map(l => `<div class="label-chip ${taskLabels.includes(l.id)?'sel':''}"
        id="lchip-${l.id}"
        style="background:${l.color}${taskLabels.includes(l.id)?'':'33'};color:${taskLabels.includes(l.id)?'#fff':l.color}"
        onclick="toggleTaskLabel('${l.id}')">${Arc.esc(l.name)}</div>`).join('')
    : `<span style="font-size:12px;color:var(--dim)">No labels yet —</span>`;

  // Populate subtask buffer from existing task
  window._stBuf = (t.subtasks || []).map(s => ({ ...s }));

  const formHtml = `
    <div class="form-group"><label class="form-lbl">Task Title *</label><input class="form-inp" id="tm-title" placeholder="What needs to be done?" value="${Arc.esc(t.title)}" maxlength="80"></div>
    <div class="form-group"><label class="form-lbl">Description</label><textarea class="form-inp" id="tm-desc" rows="2" placeholder="Additional details…">${Arc.esc(t.description||'')}</textarea></div>
    <div class="form-group">
      <label class="form-lbl">Sub-tasks</label>
      <div class="st-list" id="tm-st-list"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Priority</label><select class="form-inp" id="tm-pri">${prioOpts}</select></div>
      <div class="form-group"><label class="form-lbl">Due Date</label><input type="date" class="form-inp" id="tm-due" value="${t.dueDate||''}"></div>
    </div>
    ${shared ? `
    <div class="form-group"><label class="form-lbl">Column</label><select class="form-inp" id="tm-bucket">${bucketOpts}</select></div>
    ` : `
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Column</label><select class="form-inp" id="tm-bucket">${bucketOpts}</select></div>
      <div class="form-group"><label class="form-lbl">Project (optional)</label><select class="form-inp" id="tm-proj">${projOpts}</select></div>
    </div>
    <div class="form-group">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <label class="form-lbl" style="margin-bottom:0">Labels</label>
        <span class="lbl-manage-link" onclick="manageLabelsModal('${t.id||''}')">＋ Manage Labels</span>
      </div>
      <div class="label-chips" id="task-label-chips">${labelChips}</div>
    </div>`}`;

  showModal(`<div class="modal ${isEdit?'modal-split':''}">
    <div class="modal-hdr">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:16px">
          <div class="modal-title">${isEdit?'Edit Task':'New Task'}</div>
          ${isEdit ? `<div class="ts-share-row" id="ts-share-row"></div>` : ''}
        </div>
        <div class="modal-sub">${isEdit?'Update this task':'Add a standalone task to your board'}</div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    ${isEdit ? `<div class="split-body">
      <div class="split-form">${formHtml}</div>
      <div class="split-sidebar">
        <div class="split-sidebar-hdr">Updates</div>
        <div class="comments-list" id="cm-list">${renderCommentsList(t.id)}</div>
        <div class="cm-input-area">
          ${renderRTE('cm-rte','Add a note…')}
          <div style="display:flex;justify-content:flex-end;margin-top:6px">
            <button type="button" class="btn btn-primary btn-sm" onclick="postComment('${t.id}')">Post</button>
          </div>
        </div>
      </div>
    </div>` : formHtml}
    <div class="modal-foot">
      ${isEdit ? (shared
        ? `<button class="btn btn-ghost" style="margin-right:auto;color:var(--red)" onclick="confirmLeaveShared('${t.id}')">Remove from my board</button>`
        : `<button class="btn btn-ghost" style="margin-right:auto;color:var(--red)" onclick="confirmDelTask('${t.id}')">Delete</button>`) : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask(${isEdit?`'${t.id}'`:'null'})">${isEdit?'Save':'Add Task'}</button>
    </div>
  </div>`);

  if (isEdit) { initRTE('cm-rte', t.id); }
  if (isEdit) tsRenderShareRow(t.id, shared || null);
  // Render initial subtask list
  stRender();
}

// ── Task sharing — header avatar row + people picker ─────────────────
function tsRenderShareRow(taskId, shared) {
  const row = document.getElementById('ts-share-row');
  if (!row) return;
  // Task shared WITH me: just show who it came from
  if (shared) {
    row.innerHTML = `${arcPersonAva({ name: shared.ownerName, email: shared.ownerEmail, photo: shared.ownerPhoto }, 28)}
      <span class="ts-shared-by">Shared by ${Arc.esc(shared.ownerName)}</span>`;
    return;
  }
  if (!window._arcUser || !window._arcDb) { row.innerHTML = ''; return; }
  const ms = Arc.Shared.membersOf(taskId);
  row.innerHTML = ms.map(m => {
    const p = Arc.People.byEmail(m) || { name: m, email: m, photo: null };
    return `<span class="ts-ava-wrap" title="${Arc.esc(p.name)} — click to remove" onclick="arcTaskShareRemove('${taskId}','${Arc.esc(m)}')">${arcPersonAva(p, 28)}</span>`;
  }).join('') + `
    <div style="position:relative;display:inline-flex">
      <button class="ts-add-btn" title="Share this task" onclick="tsToggleShareDd(event,'${taskId}')">${Arc.icon('share', 12)} Share</button>
      <div class="ts-share-dd hidden" id="ts-share-dd"></div>
    </div>`;
}

function tsToggleShareDd(e, taskId) {
  e.stopPropagation();
  const dd = document.getElementById('ts-share-dd');
  if (!dd) return;
  if (!dd.classList.contains('hidden')) { dd.classList.add('hidden'); return; }
  const ms = Arc.Shared.membersOf(taskId);
  const candidates = Arc.People.connected().filter(p => !ms.includes(p.email));
  dd.innerHTML = `
    ${candidates.length
      ? candidates.map(p => `
        <div class="ts-dd-person" onclick="tsShareWith('${taskId}','${Arc.esc(p.email)}')">
          ${arcPersonAva(p, 24)}
          <div style="min-width:0;flex:1">
            <div class="ts-dd-name">${Arc.esc(p.name)}</div>
            <div class="ts-dd-mail">${Arc.esc(p.email)}</div>
          </div>
        </div>`).join('')
      : `<div class="ts-dd-empty">No connected people yet.<br>Add them on the <strong>People &amp; Sharing</strong> page in your profile menu.</div>`}
    <div class="ts-dd-sep"></div>
    <input class="form-inp ts-dd-inp" id="ts-dd-email" type="email" placeholder="or type an email…"
      onclick="event.stopPropagation()"
      onkeydown="if(event.key==='Enter'&&this.value.trim()){tsShareWith('${taskId}',this.value);event.preventDefault()}">`;
  dd.classList.remove('hidden');
}

async function tsShareWith(taskId, email) {
  const task = Arc.Tasks.getAll().find(t => t.id === taskId);
  if (!task || !email || !String(email).trim()) return;
  try { await Arc.Shared.share('task', task, email); }
  catch (e) { alert(e.message || 'Could not share.'); return; }
  tsRenderShareRow(taskId, null);  // also closes the dropdown
  renderBoard();
}

async function arcTaskShareRemove(taskId, email) {
  const p = Arc.People.byEmail(email);
  if (!confirm(`Remove ${p ? p.name : email} from this task?`)) return;
  try { await Arc.Shared.unshare(taskId, email); }
  catch (e) { alert('Could not remove: ' + (e.message || e)); }
  tsRenderShareRow(taskId, null);
  renderBoard();
}

// ── Quick share from the card (hover action) ─────────────────────────
function cardShareModal(taskId) {
  const task = Arc.Tasks.getAll().find(t => t.id === taskId);
  if (!task) return;
  showModal(`<div class="modal narrow">
    <div class="modal-hdr">
      <div><div class="modal-title">Share Task</div><div class="modal-sub">${Arc.esc(task.title)}</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="csm-body"></div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
  </div>`);
  csmRender(taskId);
}

function csmRender(taskId) {
  const body = document.getElementById('csm-body');
  if (!body) return;
  const ms = Arc.Shared.membersOf(taskId);
  const candidates = Arc.People.connected().filter(p => !ms.includes(p.email));
  body.innerHTML = `
    ${ms.length ? `<div class="csm-lbl">Shared with</div>` + ms.map(m => {
      const p = Arc.People.byEmail(m) || { name: m, email: m, photo: null };
      return `<div class="csm-row">
        ${arcPersonAva(p, 28)}
        <div class="csm-info"><div class="csm-name">${Arc.esc(Arc.People.nameFor(m))}</div><div class="csm-mail">${Arc.esc(m)}</div></div>
        <button class="csm-x" onclick="csmRemove('${taskId}','${Arc.esc(m)}')" title="Remove access">✕</button>
      </div>`;
    }).join('') : ''}
    ${candidates.length ? `<div class="csm-lbl">Add people</div>` + candidates.map(p => `
      <div class="csm-row csm-add" onclick="csmAdd('${taskId}','${Arc.esc(p.email)}')">
        ${arcPersonAva(p, 28)}
        <div class="csm-info"><div class="csm-name">${Arc.esc(p.name)}</div><div class="csm-mail">${Arc.esc(p.email)}</div></div>
        <span class="csm-plus">${Arc.icon('plus', 14)}</span>
      </div>`).join('') : ''}
    ${!ms.length && !candidates.length ? `<div style="font-size:12px;color:var(--dim);padding:4px 0 10px;line-height:1.7">No connected people yet — add them on the <strong>People &amp; Sharing</strong> page, or share by email below.</div>` : ''}
    <div class="csm-lbl">Or by email</div>
    <input class="form-inp" id="csm-email" type="email" placeholder="their-email@gmail.com"
      onkeydown="if(event.key==='Enter'&&this.value.trim()){csmAdd('${taskId}',this.value);event.preventDefault()}">
    <div id="csm-err" style="font-size:11px;color:var(--red);min-height:14px;margin-top:4px"></div>`;
}

async function csmAdd(taskId, email) {
  const task = Arc.Tasks.getAll().find(t => t.id === taskId);
  if (!task || !email || !String(email).trim()) return;
  const err = document.getElementById('csm-err');
  if (err) err.textContent = '';
  try { await Arc.Shared.share('task', task, email); }
  catch (e) { if (err) err.textContent = e.message || 'Could not share.'; return; }
  csmRender(taskId);
  renderBoard();
}

async function csmRemove(taskId, email) {
  try { await Arc.Shared.unshare(taskId, email); }
  catch (e) { alert('Could not remove: ' + (e.message || e)); }
  csmRender(taskId);
  renderBoard();
}

// ── Leave a task shared with me ───────────────────────────────────────
function confirmLeaveShared(id) {
  const s = Arc.Shared.get(id);
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Remove Shared Task?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Remove <strong>${Arc.esc(s?.data?.title || 'this task')}</strong> from your board? ${Arc.esc(s?.ownerName || 'The owner')} keeps the task — you just stop collaborating on it.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doLeaveShared('${id}')">Remove</button></div>
  </div>`);
}

async function doLeaveShared(id) {
  try { await Arc.Shared.leave(id); }
  catch (e) { alert('Could not remove: ' + (e.message || e)); }
  closeModal();
  renderBoard();
}

// ── Subtask helpers ────────────────────────────────────────────────────
function stRender() {
  const list = document.getElementById('tm-st-list');
  if (!list) return;
  const items = (window._stBuf || []).map((s, i) => `
    <div class="st-item ${s.done ? 'done' : ''}">
      <input type="checkbox" ${s.done ? 'checked' : ''} onchange="stToggle(${i},this.checked)">
      <span class="st-item-text">${Arc.esc(s.text)}</span>
      <button class="st-item-del" onclick="stRemove(${i})" title="Remove">✕</button>
    </div>`).join('');
  const ghost = `<div class="st-item st-new-row" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" class="st-new-cb" disabled>
      <input class="st-new-inp" id="tm-st-inp" placeholder="Add a sub-task…"
        onkeydown="if(event.key==='Enter'&&this.value.trim()){stAdd();event.preventDefault()}">
    </div>`;
  list.innerHTML = items + ghost;
}
function stAdd() {
  const inp = document.getElementById('tm-st-inp');
  const text = inp?.value?.trim();
  if (!text) return;
  window._stBuf = [...(window._stBuf || []), { id: Arc.uid(), text, done: false }];
  stRender();
  document.getElementById('tm-st-inp')?.focus();
}
function stToggle(idx, done) {
  if (window._stBuf?.[idx]) window._stBuf[idx].done = done;
  stRender();
}
function stRemove(idx) {
  window._stBuf = (window._stBuf || []).filter((_, i) => i !== idx);
  stRender();
}

function toggleTaskLabel(labelId) {
  const chip = document.getElementById(`lchip-${labelId}`);
  const l = Arc.Labels.getById(labelId); if (!chip || !l) return;
  const isSel = chip.classList.contains('sel');
  if (isSel) {
    chip.classList.remove('sel');
    chip.style.background = l.color + '33';
    chip.style.color = l.color;
  } else {
    chip.classList.add('sel');
    chip.style.background = l.color;
    chip.style.color = '#fff';
  }
}

// ======================================================
// RICH TEXT EDITOR
// ======================================================
function renderRTE(id, placeholder) {
  return `<div class="rte-wrap" id="${id}-wrap">
    <div class="rte-toolbar">
      <button type="button" class="rte-btn" id="${id}-bold"   title="Bold"   onclick="rteCmd('${id}','bold')"><b>B</b></button>
      <button type="button" class="rte-btn" id="${id}-italic" title="Italic" onclick="rteCmd('${id}','italic')"><i>I</i></button>
      <button type="button" class="rte-btn" id="${id}-ul"     title="Bullet list" onclick="rteCmd('${id}','insertUnorderedList')">☰</button>
      <div class="rte-sep"></div>
      <select class="rte-select" id="${id}-size" onchange="rteFontSize('${id}',this.value)" title="Font size">
        <option value="1">Small</option>
        <option value="3" selected>Normal</option>
        <option value="4">Large</option>
        <option value="5">X-Large</option>
      </select>
      <select class="rte-select" id="${id}-font" onchange="rteFontFamily('${id}',this.value)" title="Font family">
        <option value="Outfit">Outfit</option>
        <option value="Fraunces">Fraunces</option>
        <option value="Georgia">Georgia</option>
        <option value="Arial">Arial</option>
        <option value="Courier New">Mono</option>
      </select>
      <div class="rte-sep"></div>
      <div class="rte-color-btn" id="${id}-clrbtn" style="background:#fff" title="Text color"
        onclick="document.getElementById('${id}-clrinp').click()"></div>
      <input type="color" class="rte-color-input" id="${id}-clrinp" value="#ffffff"
        oninput="rteTextColor('${id}',this.value)">
    </div>
    <div class="rte-body" id="${id}-body" contenteditable="true"
      data-placeholder="${placeholder}"
      onkeydown="rteKeyDown(event,'${id}')"></div>
  </div>`;
}

function initRTE(id, entityId) {
  // Store entityId on wrap so Ctrl+Enter can retrieve it
  const wrap = document.getElementById(`${id}-wrap`);
  if (wrap && entityId) wrap.dataset.entityId = entityId;
  // Update color preview when user picks
  const clrBtn = document.getElementById(`${id}-clrbtn`);
  const clrInp = document.getElementById(`${id}-clrinp`);
  if (clrInp && clrBtn) {
    clrInp.addEventListener('input', () => { clrBtn.style.background = clrInp.value; });
  }
}

function rteCmd(id, cmd) {
  document.getElementById(`${id}-body`).focus();
  document.execCommand(cmd, false, null);
  // Toggle active state for bold/italic
  if (cmd === 'bold')   document.getElementById(`${id}-bold`).classList.toggle('active', document.queryCommandState('bold'));
  if (cmd === 'italic') document.getElementById(`${id}-italic`).classList.toggle('active', document.queryCommandState('italic'));
}

function rteFontSize(id, size) {
  document.getElementById(`${id}-body`).focus();
  document.execCommand('fontSize', false, size);
}

function rteFontFamily(id, font) {
  document.getElementById(`${id}-body`).focus();
  document.execCommand('fontName', false, font);
}

function rteTextColor(id, color) {
  document.getElementById(`${id}-clrbtn`).style.background = color;
  document.getElementById(`${id}-body`).focus();
  document.execCommand('foreColor', false, color);
}

function rteKeyDown(e, id) {
  if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
    // Ctrl+Enter to submit, plain Enter creates new line — natural behaviour
  }
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    const entityId = id.replace('cm-rte','').replace('cm-rte-','') || '';
    // We stored entityId in a data attr on the rte-wrap
    const wrap = document.getElementById(`${id}-wrap`);
    const eid  = wrap?.dataset.entityId;
    if (eid) postComment(eid);
  }
}

function getRteHtml(id) {
  const body = document.getElementById(`${id}-body`);
  return body ? body.innerHTML.trim() : '';
}

function clearRte(id) {
  const body = document.getElementById(`${id}-body`);
  if (body) body.innerHTML = '';
}

// ======================================================
// COMMENTS / UPDATES
// ======================================================
function fmtCommentTime(iso) {
  const d = new Date(iso), ds = Arc.dateStr(d);
  const h = d.getHours(), m = d.getMinutes();
  const t = `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
  if (ds === Arc.today()) return `Today at ${t}`;
  const yesterday = Arc.dateStr(new Date(Date.now()-86400000));
  if (ds === yesterday) return `Yesterday at ${t}`;
  return `${MONTHS[d.getMonth()]} ${d.getDate()} at ${t}`;
}

function renderCommentsList(entityId) {
  // Comments on shared tasks live in the shared doc so everyone sees them
  const sharedItem = Arc.Shared.get(entityId);
  const comments = sharedItem
    ? [...(sharedItem.comments || [])].sort((a, b) => a.createdAt.localeCompare(b.createdAt))
    : ((Arc.Comments && Arc.Comments.forEntity(entityId)) || []);
  if (!comments.length) return `<div class="comment-empty">No updates yet — add the first one below.</div>`;
  return comments.map(c => `<div class="comment-item">
    <div class="comment-meta">
      <span class="comment-time">${c.by ? `<span style="color:var(--accent)">${Arc.esc(c.by)}</span> · ` : ''}${fmtCommentTime(c.createdAt)}</span>
      <button class="comment-del" onclick="deleteComment('${entityId}','${c.id}')" title="Delete">✕</button>
    </div>
    <div class="comment-body">${c.html || Arc.esc(c.text || '')}</div>
  </div>`).join('');
}

function refreshCommentsList(entityId, scrollToEnd) {
  const list = document.getElementById('cm-list');
  if (list) { list.innerHTML = renderCommentsList(entityId); if (scrollToEnd) list.scrollTop = list.scrollHeight; }
}

function postComment(entityId) {
  if (!Arc.Comments) return;
  const html = getRteHtml('cm-rte');
  // Strip only if truly empty (just <br> or empty)
  const stripped = html.replace(/<br\s*\/?>/gi,'').replace(/&nbsp;/g,'').trim();
  if (!stripped) return;
  // Store both html (for rich display) and text (for fallback)
  const div = document.createElement('div'); div.innerHTML = html;
  const text = div.textContent || div.innerText || '';
  const sharedItem = Arc.Shared.get(entityId);
  if (sharedItem) {
    const by = (window._arcUser?.displayName || '').split(' ')[0] || null;
    const c = { id: Arc.uid(), text, html, by, createdAt: new Date().toISOString() };
    Arc.Shared.addComment(entityId, c)
      .then(() => refreshCommentsList(entityId, true))
      .catch(e => alert('Could not post: ' + (e.message || e)));
    clearRte('cm-rte');
    refreshCommentsList(entityId, true); // optimistic — cache already updated
    return;
  }
  Arc.Comments.add(entityId, text, html);
  clearRte('cm-rte');
  refreshCommentsList(entityId, true);
}

function deleteComment(entityId, commentId) {
  if (!Arc.Comments) return;
  const sharedItem = Arc.Shared.get(entityId);
  if (sharedItem) {
    Arc.Shared.deleteComment(entityId, commentId)
      .then(() => refreshCommentsList(entityId))
      .catch(e => alert('Could not delete: ' + (e.message || e)));
    refreshCommentsList(entityId); // optimistic
    return;
  }
  Arc.Comments.delete(entityId, commentId);
  refreshCommentsList(entityId);
}

// ======================================================
// SAVE TASK
// ======================================================
function saveTask(id) {
  const title = document.getElementById('tm-title').value.trim();
  if (!title) { document.getElementById('tm-title').style.borderColor='var(--red)'; document.getElementById('tm-title').focus(); return; }
  // Task shared with me: edit the shared copy; the owner's project/labels
  // are personal to them and aren't shown in my form, so carry them over.
  const sharedWithMe = id && Arc.Shared.isWithMe(id);
  const existing = id
    ? (sharedWithMe ? Arc.Shared.get(id)?.data : Arc.Tasks.getAll().find(t=>t.id===id))
    : null;
  // Collect selected labels
  const labels = sharedWithMe
    ? (existing?.labels || [])
    : Arc.Labels.getAll().filter(l => document.getElementById(`lchip-${l.id}`)?.classList.contains('sel')).map(l=>l.id);
  const task = {
    id: id || Arc.uid(),
    title,
    description: document.getElementById('tm-desc').value.trim(),
    priority:    document.getElementById('tm-pri').value,
    dueDate:     document.getElementById('tm-due').value,
    bucketId:    document.getElementById('tm-bucket').value,
    projectId:   sharedWithMe ? (existing?.projectId || '') : document.getElementById('tm-proj').value,
    labels,
    subtasks:    window._stBuf || [],
    createdAt:   existing?.createdAt || new Date().toISOString(),
  };
  if (sharedWithMe) {
    Arc.Shared.updateAsMember(id, task).catch(e => console.warn('Arcus: shared save failed', e));
    closeModal(); renderBoard();
    return;
  }
  id ? Arc.Tasks.update(task) : Arc.Tasks.add(task);
  if (task.bucketId === 'b_done') Arc.PinnedTasks.unpin(task.id);
  closeModal(); renderBoard();
}

function confirmDelTask(id) {
  const t = Arc.Tasks.getAll().find(x=>x.id===id);
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Delete Task?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete <strong>${Arc.esc(t?.title)}</strong>? This cannot be undone.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDelTask('${id}')">Delete</button></div>
  </div>`);
}

function doDelTask(id) { Arc.Tasks.delete(id); Arc.PinnedTasks.unpin(id); closeModal(); renderBoard(); }
function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml('tasks'); }
function onDataImported() { window.location.reload(); }

init();
</script>
</body>
</html>
