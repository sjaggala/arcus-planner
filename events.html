<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Events</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.ev-layout { flex:1; display:flex; min-height:0; }
.ev-sidebar { width:210px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 14px; gap:16px; overflow-y:auto; background:var(--s1); }
.ev-main { flex:1; display:flex; flex-direction:column; min-width:0; }
.page-body { flex:1; overflow-y:auto; padding:28px 36px 60px; display:flex; flex-direction:column; }

/* Mini calendar */
.mini-cal { display:flex; flex-direction:column; gap:8px; }
.mini-cal-hdr { display:flex; align-items:center; justify-content:space-between; }
.mini-cal-title { font-size:12px; font-weight:700; color:var(--text); }
.mini-cal-nav { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:2px 5px; border-radius:4px; line-height:1; }
.mini-cal-nav:hover { background:var(--s3); color:var(--text); }
.mini-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
.mc-dh { font-size:9px; font-weight:700; text-align:center; color:var(--dim); padding:2px 0; }
.mc-day { font-size:11px; text-align:center; padding:3px 1px; border-radius:4px; cursor:pointer; color:var(--muted); line-height:1.4; }
.mc-day:hover { background:var(--s3); color:var(--text); }
.mc-day.other-m { color:var(--dim); }
.mc-day.is-today { background:var(--accent); color:#fff; border-radius:50%; }
.mc-day.is-cur { background:var(--s3); color:var(--text); font-weight:700; outline:1px solid var(--accent); }
.mc-day.has-ev { font-weight:700; color:var(--text); }

/* Toolbar */
.cal-toolbar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.cal-nav { display:flex; align-items:center; gap:4px; }
.cal-nav-btn { width:30px; height:30px; border-radius:7px; background:var(--s2); border:1px solid var(--border); color:var(--text); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.cal-nav-btn:hover { background:var(--s3); }
.cal-title { font-family:'Fraunces',serif; font-size:18px; font-weight:600; letter-spacing:-.3px; min-width:160px; text-align:center; }
.view-pills { display:flex; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:3px; gap:2px; margin-left:auto; }
.view-pill { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); transition:all .15s; border:none; background:transparent; }
.view-pill.active { background:var(--accent); color:#fff; }

/* Month grid */
.month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0; background:var(--s1); border:1px solid var(--border); border-radius:10px; overflow:hidden; flex:1; }
.day-hdr { background:var(--s2); padding:4px 0; text-align:center; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.day-cell { background:var(--s1); min-height:90px; padding:6px; position:relative; cursor:pointer; transition:background .1s; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.month-grid > *:nth-child(7n) { border-right:none; }
.month-grid > *:nth-last-child(-n+7) { border-bottom:none; }
.day-cell:hover { background:var(--s2); }
.day-cell.other-month { background:var(--bg); }
.day-cell.other-month .day-num { color:var(--dim); }
.day-cell.is-today .day-num { background:var(--accent); color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
.day-num { font-size:12px; font-weight:600; width:22px; height:22px; display:flex; align-items:center; justify-content:center; margin-bottom:3px; }
.ev-pill { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; line-height:1.4; }
.ev-pill:hover { filter:brightness(1.15); }
.more-pill { font-size:10px; color:var(--muted); padding:1px 4px; cursor:pointer; }
.more-pill:hover { color:var(--accent); }

/* Week grid */
.week-grid { display:flex; flex-direction:column; flex:1; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.week-hdr-row { display:grid; grid-template-columns:52px repeat(7,1fr); background:var(--s2); border-bottom:1px solid var(--border); }
.week-hdr-cell { padding:8px 6px; text-align:center; font-size:11px; font-weight:700; color:var(--muted); }
.week-hdr-cell.is-today { color:var(--accent); }
.week-hdr-date { font-size:18px; font-weight:600; font-family:'Fraunces',serif; display:block; }
.week-body { flex:1; overflow-y:auto; display:grid; grid-template-columns:52px repeat(7,1fr); }
.week-time-col { border-right:1px solid var(--border); }
.week-hour-lbl { height:52px; display:flex; align-items:flex-start; justify-content:flex-end; padding:4px 8px 0 0; font-size:10px; color:var(--dim); }
.week-day-col { border-right:1px solid var(--border); position:relative; }
.week-day-col:last-child { border-right:none; }
.week-hour-line { height:52px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
.week-hour-line:hover { background:rgba(123,121,247,.06); }
.week-ev-block { position:absolute; left:2px; right:2px; border-radius:5px; padding:2px 5px; font-size:10px; font-weight:600; overflow:hidden; cursor:pointer; z-index:1; line-height:1.3; }
.week-ev-block:hover { filter:brightness(1.15); z-index:2; }

/* Day view */
.day-view { display:flex; flex-direction:column; flex:1; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.day-view-hdr { padding:14px 16px; background:var(--s2); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.day-view-title { font-family:'Fraunces',serif; font-size:20px; font-weight:600; }
.day-view-body { flex:1; overflow-y:auto; display:grid; grid-template-columns:52px 1fr; }
.day-view-events { position:relative; }
.day-allday-bar { padding:8px 12px; border-bottom:1px solid var(--border); display:flex; gap:6px; flex-wrap:wrap; align-items:center; background:var(--s1); min-height:36px; }
.day-allday-lbl { font-size:10px; color:var(--dim); margin-right:4px; }

/* List view (agenda) — two-column grid */
.agenda-grid { display:flex; flex-direction:column; border:1px solid var(--border); border-radius:10px; overflow:hidden; background:var(--s1); flex-shrink:0; }
.agenda-grid-row { display:grid; grid-template-columns:76px 1fr; border-bottom:1px solid var(--border); background:var(--s1); }
.agenda-grid-row:last-child { border-bottom:none; }
.agr-date { padding:14px 10px; background:var(--s2); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; text-align:center; flex-shrink:0; }
.agr-day { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.agr-num { font-family:'Fraunces',serif; font-size:22px; font-weight:600; line-height:1; margin-top:3px; }
.agr-mon { font-size:10px; color:var(--muted); margin-top:3px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.agr-date.is-today .agr-num { color:var(--accent); }
.agr-date.is-today .agr-day { color:var(--accent); }
.agr-events { display:flex; flex-direction:column; background:var(--s1); }
.agr-ev { display:flex; gap:10px; padding:11px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; align-items:flex-start; background:var(--s1); }
.agr-ev:last-child { border-bottom:none; }
.agr-ev:hover { background:var(--s2); }
.agr-stripe { width:3px; border-radius:2px; flex-shrink:0; align-self:stretch; min-height:18px; }
.agr-ev-body { flex:1; min-width:0; }
.agr-ev-title { font-size:13px; font-weight:600; line-height:1.35; }
.agr-ev-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.agr-ev-desc { font-size:11px; color:var(--dim); margin-top:3px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.agenda-empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; }

/* Event type badge */
.ev-type-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }

/* ── Recurrence UI ── */
.rec-section { margin-top:4px; padding:14px 16px; background:var(--s3); border:1px solid var(--border); border-radius:10px; display:flex; flex-direction:column; gap:14px; }
.rec-type-row { display:flex; gap:6px; flex-wrap:wrap; }
.rec-pill { padding:5px 13px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid var(--border); background:var(--s2); color:var(--muted); cursor:pointer; transition:all .15s; }
.rec-pill:hover { color:var(--text); border-color:var(--border2); }
.rec-pill.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.day-toggle-row { display:flex; gap:5px; flex-wrap:wrap; }
.day-tog { width:40px; height:34px; border-radius:8px; font-size:11px; font-weight:700; border:1px solid var(--border); background:var(--s2); color:var(--muted); cursor:pointer; transition:all .15s; }
.day-tog:hover { border-color:var(--border2); color:var(--text); }
.day-tog.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.rec-badge { font-size:9px; font-weight:700; letter-spacing:.5px; padding:1px 5px; border-radius:4px; background:rgba(123,121,247,.18); color:var(--accent); vertical-align:middle; margin-left:3px; }

@media(max-width:700px) { .page-body { padding:16px 12px 40px; } .cal-title { min-width:120px; font-size:15px; } }
[data-theme="light"] body { background: #ffffff; }
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="ev-layout">

  <div class="ev-sidebar">
    <div class="mini-cal" id="mini-cal"></div>
  </div>

  <div class="ev-main">
    <div class="page-body">

      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="navigate(-1)" title="Previous">‹</button>
          <button class="btn btn-ghost btn-sm" onclick="goToday()" style="padding:5px 12px">Today</button>
          <button class="cal-nav-btn" onclick="navigate(1)" title="Next">›</button>
        </div>
        <div class="cal-title" id="cal-title"></div>
        <button class="btn btn-primary btn-sm" onclick="newEventModal(null)">＋ New Event</button>
        <div class="view-pills">
          <button class="view-pill" data-view="month" onclick="setView('month')">Month</button>
          <button class="view-pill" data-view="week"  onclick="setView('week')">Week</button>
          <button class="view-pill" data-view="day"   onclick="setView('day')">Day</button>
          <button class="view-pill" data-view="agenda" onclick="setView('agenda')">List</button>
        </div>
      </div>

      <div id="cal-body" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>

    </div>
  </div>

</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="data.js?v=8"></script>
<script>
const DAYS_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_LONG   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const EV_COLORS   = ['#7b79f7','#60a5fa','#3ec97a','#f5c542','#f06f6f','#f472b6','#fb923c','#2dd4bf','#e879f9','#94a3b8'];
const EV_TYPES    = ['Event','Reminder','Meeting','Deadline','Personal'];

let curView   = 'month';
let curDate   = new Date();

function ds(d) { return Arc.dateStr(d); }
function todayDs() { return Arc.today(); }

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function addMonths(d, n) { const r = new Date(d); r.setMonth(r.getMonth()+n); return r; }

function fmt12(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
}

function fmtDateFull(d) {
  return `${DAYS_LONG[d.getDay()]}, ${MONTHS_LONG[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function getGoalTaskItems(dStr) {
  const goals = Arc.Goals.getAll().filter(g => g.dateTo === dStr && g.status !== 'cancelled' && g.status !== 'completed');
  const tasks = Arc.Tasks.getAll().filter(t => t.dueDate === dStr && t.bucketId !== 'b_done');
  return [
    ...goals.map(g => ({ kind:'goal', id:g.id, title:g.title, color: g.labelColor||'#3ec97a', projectId: g.projectId })),
    ...tasks.map(t => ({ kind:'task', id:t.id, title:t.title, color:'#f5c542' })),
  ];
}

function gtPillHtml(item) {
  const icon = item.kind === 'goal' ? '🎯' : '✓';
  const nav = item.kind === 'goal' ? `location.href='planner.html?pid=${item.projectId}'` : `location.href='tasks.html'`;
  return `<div class="ev-pill" style="background:var(--s3);color:var(--muted);border:1px solid var(--border);cursor:pointer"
    onclick="event.stopPropagation();${nav}"
    title="${item.kind==='goal'?'Goal due':'Task due'}: ${Arc.esc(item.title)}">${icon} ${Arc.esc(item.title)}</div>`;
}

function setView(v) {
  curView = v;
  document.querySelectorAll('.view-pill').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  render();
}

function navigate(dir) {
  if (curView === 'month') curDate = addMonths(curDate, dir);
  else if (curView === 'week') curDate = addDays(curDate, dir * 7);
  else if (curView === 'day')  curDate = addDays(curDate, dir);
  else if (curView === 'agenda') curDate = addMonths(curDate, dir);
  render();
}

function goToday() { curDate = new Date(); render(); }

// ── Mini calendar sidebar ────────────────────────────────────────────
let miniCalYear  = new Date().getFullYear();
let miniCalMonth = new Date().getMonth();

function miniCalPrev() { miniCalMonth--; if (miniCalMonth < 0) { miniCalMonth = 11; miniCalYear--; } renderMiniCal(); }
function miniCalNext() { miniCalMonth++; if (miniCalMonth > 11) { miniCalMonth = 0; miniCalYear++; } renderMiniCal(); }

function miniCalNav(dStr) {
  curDate = new Date(dStr + 'T12:00:00');
  render();
}

function renderMiniCal() {
  const today   = todayDs();
  const curDs   = ds(curDate);
  const mcFrom  = `${miniCalYear}-${String(miniCalMonth+1).padStart(2,'0')}-01`;
  const mcTo    = `${miniCalYear}-${String(miniCalMonth+1).padStart(2,'0')}-${String(new Date(miniCalYear,miniCalMonth+1,0).getDate()).padStart(2,'0')}`;
  const evDates = new Set(getExpandedEvents(mcFrom, mcTo).map(e => e.startDate));
  const gtDates = new Set([
    ...Arc.Goals.getAll().filter(g => g.dateTo && g.status !== 'cancelled' && g.status !== 'completed').map(g => g.dateTo),
    ...Arc.Tasks.getAll().filter(t => t.dueDate && t.bucketId !== 'b_done').map(t => t.dueDate),
  ]);

  const y = miniCalYear, m = miniCalMonth;
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div class="mc-day other-m"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls  = [
      'mc-day',
      dStr === today  ? 'is-today' : '',
      dStr === curDs  ? 'is-cur'   : '',
      (evDates.has(dStr) || gtDates.has(dStr)) ? 'has-ev' : '',
    ].filter(Boolean).join(' ');
    cells += `<div class="${cls}" onclick="miniCalNav('${dStr}')">${d}</div>`;
  }

  const hdrs = ['S','M','T','W','T','F','S'].map(h => `<div class="mc-dh">${h}</div>`).join('');
  document.getElementById('mini-cal').innerHTML =
    `<div class="mini-cal-hdr">
      <button class="mini-cal-nav" onclick="miniCalPrev()">‹</button>
      <div class="mini-cal-title">${MONTHS_SHORT[m]} ${y}</div>
      <button class="mini-cal-nav" onclick="miniCalNext()">›</button>
    </div>
    <div class="mini-cal-grid">${hdrs}${cells}</div>`;
}

function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme','dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('events');
  miniCalYear  = curDate.getFullYear();
  miniCalMonth = curDate.getMonth();
  setView('month');
  const p = new URLSearchParams(location.search);
  if (p.get('new') === '1') {
    history.replaceState({}, '', 'events.html');
    setTimeout(() => newEventModal(null), 150);
  }
  const eid = p.get('eid');
  if (eid) setTimeout(() => editEvent(eid), 200);
}

window.closeModal = (orig => () => { orig(); setUrlParam('eid', null); })(window.closeModal);

function render() {
  updateTitle();
  renderMiniCal();
  const body = document.getElementById('cal-body');
  // Agenda grows naturally (parent page-body scrolls); other views fill viewport height
  if (curView === 'agenda') {
    body.style.flex = 'none';
    body.style.minHeight = '';
    body.innerHTML = renderAgenda();
  } else {
    body.style.flex = '1';
    body.style.minHeight = '0';
    if (curView === 'month')     body.innerHTML = renderMonth();
    else if (curView === 'week') renderWeekView(body);
    else if (curView === 'day')  renderDayView(body);
  }
}

function updateTitle() {
  const el = document.getElementById('cal-title');
  if (curView === 'month') {
    el.textContent = `${MONTHS_LONG[curDate.getMonth()]} ${curDate.getFullYear()}`;
  } else if (curView === 'week') {
    const mon = weekStart(curDate);
    const sun = addDays(mon, 6);
    if (mon.getMonth() === sun.getMonth()) el.textContent = `${MONTHS_SHORT[mon.getMonth()]} ${mon.getDate()}–${sun.getDate()}, ${mon.getFullYear()}`;
    else el.textContent = `${MONTHS_SHORT[mon.getMonth()]} ${mon.getDate()} – ${MONTHS_SHORT[sun.getMonth()]} ${sun.getDate()}`;
  } else if (curView === 'day') {
    el.textContent = `${MONTHS_SHORT[curDate.getMonth()]} ${curDate.getDate()}, ${curDate.getFullYear()}`;
  } else {
    el.textContent = `Agenda — ${MONTHS_LONG[curDate.getMonth()]} ${curDate.getFullYear()}`;
  }
}

// ── Month View ──────────────────────────────────────────────────────
function renderMonth() {
  const y = curDate.getFullYear(), m = curDate.getMonth();
  const firstDay    = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev  = new Date(y, m, 0).getDate();
  // Range covers all visible cells (prev-month lead + next-month tail)
  const fromDs = Arc.dateStr(new Date(y, m, 1 - firstDay));
  const toDs   = Arc.dateStr(addDays(new Date(y, m+1, 0), 7 - new Date(y, m+1, 0).getDay() || 7));
  const evs  = getExpandedEvents(fromDs, toDs);
  const today = todayDs();

  const hdrs = DAYS_SHORT.map(d => `<div class="day-hdr">${d}</div>`).join('');

  const cells = [];
  // Leading prev-month cells
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = new Date(y, m-1, daysInPrev - i);
    cells.push(dayCell(d, evs, today, true));
  }
  // Current month
  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(y, m, i);
    cells.push(dayCell(d, evs, today, false));
  }
  // Trailing next-month
  const total = cells.length;
  const rows = Math.ceil(total / 7);
  for (let i = 1; cells.length < rows * 7; i++) {
    const d = new Date(y, m+1, i);
    cells.push(dayCell(d, evs, today, true));
  }

  return `<div class="month-grid">${hdrs}${cells.join('')}</div>`;
}

function dayCell(d, evs, today, otherMonth) {
  const dStr   = ds(d);
  const isToday = dStr === today;
  const dayEvs  = evs.filter(ev => ev.startDate === dStr || (ev.endDate && ev.startDate <= dStr && ev.endDate >= dStr));
  const gtItems = getGoalTaskItems(dStr);
  const MAX = 3;
  const shownEvs = dayEvs.slice(0, MAX);
  const shownGT  = gtItems.slice(0, Math.max(0, MAX - shownEvs.length));
  const moreCount = (dayEvs.length - shownEvs.length) + (gtItems.length - shownGT.length);

  const evPills = shownEvs.map(ev => {
    const clr = ev.color || '#7b79f7';
    const recBadge = ev._masterId ? `<span class="rec-badge">↻</span>` : '';
    return `<div class="ev-pill" style="background:${clr}22;color:${clr};border:1px solid ${clr}44"
      onclick="event.stopPropagation();editEvent('${ev.id}')" title="${Arc.esc(ev.title)}">${Arc.esc(ev.title)}${recBadge}</div>`;
  }).join('');

  const gtPills  = shownGT.map(gtPillHtml).join('');
  const morePill = moreCount > 0 ? `<div class="more-pill" onclick="event.stopPropagation();clickDay('${dStr}')">+${moreCount} more</div>` : '';

  return `<div class="day-cell ${otherMonth?'other-month':''} ${isToday?'is-today':''}"
    onclick="clickDay('${dStr}')">
    <div class="day-num">${d.getDate()}</div>
    ${evPills}${gtPills}${morePill}
  </div>`;
}

// ── Week View ───────────────────────────────────────────────────────
function weekStart(d) {
  const r = new Date(d);
  r.setDate(r.getDate() - r.getDay());
  return r;
}

function renderWeekView(container) {
  const today = todayDs();
  const mon  = weekStart(curDate);
  const days = Array.from({length:7}, (_,i) => addDays(mon, i));
  const evs  = getExpandedEvents(Arc.dateStr(mon), Arc.dateStr(addDays(mon, 6)));

  const hdrCells = days.map(d => {
    const dStr = ds(d);
    const isTd = dStr === today;
    return `<div class="week-hdr-cell ${isTd?'is-today':''}">
      <span>${DAYS_SHORT[d.getDay()]}</span>
      <span class="week-hdr-date">${d.getDate()}</span>
    </div>`;
  }).join('');

  // All-day events row
  const allDayRow = days.map(d => {
    const dStr  = ds(d);
    const adevs = evs.filter(ev => ev.allDay && (ev.startDate === dStr || (ev.endDate && ev.startDate <= dStr && ev.endDate >= dStr)));
    const gtItems = getGoalTaskItems(dStr);
    const evPills = adevs.map(ev => `<div class="ev-pill" style="background:${(ev.color||'#7b79f7')}22;color:${ev.color||'#7b79f7'};border:1px solid ${(ev.color||'#7b79f7')}44" onclick="editEvent('${ev.id}')">${Arc.esc(ev.title)}</div>`).join('');
    const gtPills = gtItems.map(gtPillHtml).join('');
    return `<div style="padding:3px;border-right:1px solid var(--border);min-height:24px">${evPills}${gtPills}</div>`;
  }).join('');

  // Hours
  const hours = Array.from({length:24}, (_,i) => i);
  const timeLbls = hours.map(h => {
    const lbl = h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h-12} PM`;
    return `<div class="week-hour-lbl">${lbl}</div>`;
  }).join('');

  const dayCols = days.map(d => {
    const dStr = ds(d);
    const dayEvs = evs.filter(ev => !ev.allDay && ev.startDate === dStr && ev.startTime);
    const hourLines = hours.map(h =>
      `<div class="week-hour-line" onclick="newEventModal('${dStr}','${String(h).padStart(2,'0')}:00')"></div>`
    ).join('');
    const blocks = dayEvs.map(ev => {
      const [sh, sm] = (ev.startTime||'00:00').split(':').map(Number);
      const [eh, em] = (ev.endTime  ||String(Math.min(sh+1,23)).padStart(2,'0')+':00').split(':').map(Number);
      const top  = (sh * 52) + (sm / 60 * 52);
      const dur  = Math.max(((eh*60+em)-(sh*60+sm))/60, 0.5);
      const ht   = dur * 52;
      const clr  = ev.color || '#7b79f7';
      const rb = ev._masterId ? ` <span style="font-size:9px;opacity:.7">↻</span>` : '';
      return `<div class="week-ev-block" style="top:${top}px;height:${ht}px;background:${clr}22;color:${clr};border-left:3px solid ${clr}"
        onclick="editEvent('${ev.id}')">${Arc.esc(ev.title)}${rb}<br><span style="font-weight:400;font-size:9px">${fmt12(ev.startTime)}</span></div>`;
    }).join('');
    return `<div class="week-day-col" style="position:relative">${hourLines}${blocks}</div>`;
  }).join('');

  container.innerHTML = `<div class="week-grid">
    <div class="week-hdr-row">
      <div class="week-hdr-cell" style="font-size:10px;color:var(--dim)">GMT</div>
      ${hdrCells}
    </div>
    <div style="display:grid;grid-template-columns:52px repeat(7,1fr);background:var(--s1);border-bottom:1px solid var(--border)">
      <div style="padding:4px 6px;font-size:10px;color:var(--dim);display:flex;align-items:center;justify-content:flex-end">ALL DAY</div>
      ${allDayRow}
    </div>
    <div class="week-body">
      <div class="week-time-col">${timeLbls}</div>
      ${dayCols}
    </div>
  </div>`;
  // Scroll to 8am
  const wb = container.querySelector('.week-body');
  if (wb) wb.scrollTop = 8 * 52;
}

// ── Day View ────────────────────────────────────────────────────────
function renderDayView(container) {
  const dStr = ds(curDate);
  const evs  = getExpandedEvents(dStr, dStr);
  const today = todayDs();
  const isToday = dStr === today;
  const dayEvs = evs.filter(ev => ev.startDate === dStr || (ev.endDate && ev.startDate <= dStr && ev.endDate >= dStr));
  const allDayEvs  = dayEvs.filter(ev => ev.allDay);
  const gtItemsDay = getGoalTaskItems(dStr);
  const timedEvs   = dayEvs.filter(ev => !ev.allDay && ev.startTime);

  const hours = Array.from({length:24}, (_,i) => i);
  const timeLbls = hours.map(h => {
    const lbl = h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h-12} PM`;
    return `<div class="week-hour-lbl">${lbl}</div>`;
  }).join('');

  const hourLines = hours.map(h =>
    `<div class="week-hour-line" onclick="newEventModal('${dStr}','${String(h).padStart(2,'0')}:00')"></div>`
  ).join('');

  const blocks = timedEvs.map(ev => {
    const [sh, sm] = (ev.startTime||'00:00').split(':').map(Number);
    const [eh, em] = (ev.endTime||String(Math.min(sh+1,23)).padStart(2,'0')+':00').split(':').map(Number);
    const top = (sh * 52) + (sm / 60 * 52);
    const dur = Math.max(((eh*60+em)-(sh*60+sm))/60, 0.5);
    const clr = ev.color || '#7b79f7';
    return `<div class="week-ev-block" style="top:${top}px;height:${dur*52}px;background:${clr}22;color:${clr};border-left:3px solid ${clr}"
      onclick="editEvent('${ev.id}')">${Arc.esc(ev.title)}<br><span style="font-weight:400;font-size:9px">${fmt12(ev.startTime)}${ev.endTime?' – '+fmt12(ev.endTime):''}</span></div>`;
  }).join('');

  const allDayPills = [
    ...allDayEvs.map(ev =>
      `<div class="ev-pill" style="background:${(ev.color||'#7b79f7')}22;color:${ev.color||'#7b79f7'};border:1px solid ${(ev.color||'#7b79f7')}44;cursor:pointer" onclick="editEvent('${ev.id}')">${Arc.esc(ev.title)}</div>`
    ),
    ...gtItemsDay.map(gtPillHtml),
  ].join('');

  container.innerHTML = `<div class="day-view">
    <div class="day-view-hdr">
      <div class="day-view-title ${isToday?'':''}">
        ${isToday?'<span style="color:var(--accent)">Today — </span>':''}${fmtDateFull(curDate)}
      </div>
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="newEventModal('${dStr}')">＋ Add Event</button>
    </div>
    ${(allDayEvs.length+gtItemsDay.length)>0?`<div class="day-allday-bar"><span class="day-allday-lbl">ALL DAY / DUE</span>${allDayPills}</div>`:''}
    <div style="flex:1;overflow-y:auto;display:grid;grid-template-columns:52px 1fr">
      <div class="week-time-col">${timeLbls}</div>
      <div style="position:relative">${hourLines}${blocks}</div>
    </div>
  </div>`;

  const dv = container.querySelector('.day-view');
  if (dv) { const sc = dv.querySelector('[style*="overflow-y:auto"]'); if(sc) sc.scrollTop = 8*52; }
}

// ── Agenda View ─────────────────────────────────────────────────────
function renderAgenda() {
  const today = todayDs();
  const y = curDate.getFullYear(), m = curDate.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const fromDs = `${y}-${String(m+1).padStart(2,'0')}-01`;
  const toDs   = `${y}-${String(m+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
  const evs    = getExpandedEvents(fromDs, toDs);

  const rows = Array.from({length: daysInMonth}, (_,i) => {
    const d    = new Date(y, m, i+1);
    const dStr = ds(d);
    const dayEvs  = evs.filter(ev => ev.startDate === dStr || (ev.endDate && ev.startDate <= dStr && ev.endDate >= dStr));
    const gtItems = getGoalTaskItems(dStr);
    if (!dayEvs.length && !gtItems.length) return '';
    const isToday = dStr === today;

    const evItems = dayEvs.sort((a,b) => {
      if (a.allDay && !b.allDay) return -1;
      if (!a.allDay && b.allDay) return 1;
      return (a.startTime||'').localeCompare(b.startTime||'');
    }).map(ev => {
      const timeStr = ev.allDay ? 'All day' : fmt12(ev.startTime) + (ev.endTime ? ' – '+fmt12(ev.endTime) : '');
      const typeSuffix = ev.type && ev.type !== 'Event' ? ` · ${Arc.esc(ev.type)}` : '';
      // For recurring instances, find master to get recurrence info
      const masterId = ev._masterId || ev.id;
      const master   = Arc.Events.getAll().find(x => x.id === masterId) || ev;
      const rec      = master.recurrence;
      const recLabel = rec && rec.freq && rec.freq !== 'none'
        ? ` · ↻ ${REC_LABELS[rec.freq] || rec.freq}${rec.endDate ? ' until ' + rec.endDate : ''}` : '';
      return `<div class="agr-ev" onclick="editEvent('${ev.id}')">
        <div class="agr-ev-body">
          <div class="agr-ev-title">${Arc.esc(ev.title)}</div>
          <div class="agr-ev-meta">${timeStr}${typeSuffix}${recLabel}</div>
          ${ev.description ? `<div class="agr-ev-desc">${Arc.esc(ev.description.slice(0,100))}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    const gtItems2 = gtItems.map(item => {
      const icon = item.kind === 'goal' ? '🎯' : '✓';
      const nav = item.kind === 'goal' ? `location.href='planner.html?pid=${item.projectId}'` : `location.href='tasks.html'`;
      return `<div class="agr-ev" onclick="${nav}" style="cursor:pointer">
        <div class="agr-ev-body">
          <div class="agr-ev-title">${icon} ${Arc.esc(item.title)}</div>
          <div class="agr-ev-meta">Due · ${item.kind === 'goal' ? 'Goal' : 'Task'}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="agenda-grid-row">
      <div class="agr-date ${isToday?'is-today':''}">
        <div class="agr-day">${DAYS_SHORT[d.getDay()]}</div>
        <div class="agr-num">${d.getDate()}</div>
        <div class="agr-mon">${MONTHS_SHORT[m]}</div>
      </div>
      <div class="agr-events">${evItems}${gtItems2}</div>
    </div>`;
  }).filter(Boolean).join('');

  if (!rows) return `<div class="agenda-empty">No events, goals, or tasks due this month.<br><span style="color:var(--accent);cursor:pointer" onclick="newEventModal(null)">+ Add an event</span></div>`;
  return `<div class="agenda-grid">${rows}</div>`;
}

// ── Recurrence helpers ───────────────────────────────────────────────
const REC_LABELS = { none:'None', daily:'Daily', weekly:'Weekly', biweekly:'Bi-weekly', monthly:'Monthly' };

function toggleRecurrenceSection(type) {
  // Recurrence is available for Event, Reminder, and Meeting types
  const s = document.getElementById('em-rec-section');
  const show = ['Event','Reminder','Meeting'].includes(type);
  if (s) s.style.display = show ? '' : 'none';
}

function setRecType(freq) {
  document.querySelectorAll('.rec-pill').forEach(p =>
    p.classList.toggle('on', p.dataset.freq === freq));
  document.getElementById('em-rec-type').value = freq;
  document.getElementById('em-days-row').style.display   = ['weekly','biweekly'].includes(freq) ? '' : 'none';
  document.getElementById('em-monthly-row').style.display = freq === 'monthly' ? '' : 'none';
  document.getElementById('em-rec-end-row').style.display = freq === 'none'    ? 'none' : '';
}


function getRecurrenceFromModal() {
  const sec = document.getElementById('em-rec-section');
  // Section is hidden when type is Deadline/Personal — no recurrence
  if (!sec) return null;
  const secHidden = sec.style.display === 'none' || getComputedStyle(sec).display === 'none';
  if (secHidden) return null;

  const freq = document.getElementById('em-rec-type')?.value || 'none';
  if (freq === 'none') return null;

  const days     = [...document.querySelectorAll('.day-tog.on')].map(el => parseInt(el.dataset.day));
  const monthDay = parseInt(document.getElementById('em-month-day')?.value) || null;
  const endEl    = document.getElementById('em-rec-end');
  const endDate  = (endEl && /^\d{4}-\d{2}-\d{2}$/.test(endEl.value)) ? endEl.value : '';

  return { freq, days, monthDay, endDate };
}

// Returns true if `date` matches the recurrence pattern relative to master
function dateMatchesRecurrence(date, masterDate, masterWeekSun, r) {
  if (r.freq === 'daily') return true;
  if (r.freq === 'weekly') {
    const days = (r.days && r.days.length) ? r.days : [masterDate.getDay()];
    return days.includes(date.getDay());
  }
  if (r.freq === 'biweekly') {
    const days = (r.days && r.days.length) ? r.days : [masterDate.getDay()];
    if (!days.includes(date.getDay())) return false;
    const dSun = new Date(date); dSun.setDate(date.getDate() - date.getDay()); dSun.setHours(0,0,0,0);
    return Math.round((dSun - masterWeekSun) / 604800000) % 2 === 0;
  }
  if (r.freq === 'monthly') {
    return date.getDate() === (r.monthDay || masterDate.getDate());
  }
  return false;
}

// Expand one master event into instances within [fromDs, toDs]
function expandEvent(ev, fromDs, toDs) {
  const r = ev.recurrence;
  if (!r || !r.freq || r.freq === 'none') return [ev];

  // recEnd is the user-set stop date ('' means never)
  const recEnd = (r.endDate && r.endDate.length === 10) ? r.endDate : '';

  // winEnd = earliest of (recurrence end, view window end)
  // This is the ABSOLUTE last date we will ever generate an instance for
  const winEnd = recEnd ? (recEnd < toDs ? recEnd : toDs) : toDs;

  // winStart = latest of (event start, view window start)
  const winStart = ev.startDate > fromDs ? ev.startDate : fromDs;

  // Nothing to generate if window is empty
  if (winStart > winEnd) return [];

  const masterDate = new Date(ev.startDate + 'T00:00:00');
  const masterWeekSun = new Date(masterDate);
  masterWeekSun.setDate(masterDate.getDate() - masterDate.getDay());
  masterWeekSun.setHours(0,0,0,0);

  const instances = [];
  const cur = new Date(winStart + 'T00:00:00');

  while (true) {
    const dStr = Arc.dateStr(cur);
    if (dStr > winEnd) break;   // ← only exit: past the hard stop

    if (dateMatchesRecurrence(cur, masterDate, masterWeekSun, r)) {
      instances.push({ ...ev, id: ev.id + '__' + dStr, startDate: dStr, endDate: dStr, _masterId: ev.id });
    }

    cur.setDate(cur.getDate() + 1);
  }

  return instances;
}

// Return all events (with recurrences expanded) visible in [fromDs, toDs]
function getExpandedEvents(fromDs, toDs) {
  const result = [];
  for (const ev of Arc.Events.getAll()) {
    if (!ev.recurrence || ev.recurrence.freq === 'none') result.push(ev);
    else result.push(...expandEvent(ev, fromDs, toDs));
  }
  return result;
}

function newEventModal(dateStr, timeStr) {
  const today = todayDs();
  eventModal(null, dateStr || today, timeStr || '');
}

function editEvent(id) {
  // Instance IDs look like 'masterId__2026-05-21' — always open the master
  const masterId = id.includes('__') ? id.split('__')[0] : id;
  const ev = Arc.Events.getAll().find(x => x.id === masterId);
  if (ev) { setUrlParam('eid', masterId); eventModal(ev, ev.startDate, ev.startTime || ''); }
}

function eventModal(ev, prefillDate, prefillTime) {
  const isEdit = !!ev;
  const e = ev || {
    title:'', description:'', type:'Event',
    startDate: prefillDate || todayDs(), startTime: prefillTime || '',
    endDate: prefillDate || todayDs(), endTime: '',

  // Recurrence state
  const rec       = e.recurrence || {};
  const recFreq   = rec.freq || 'none';
  const recDays   = rec.days || [];
  const prefDate  = new Date((prefillDate || todayDs()) + 'T12:00:00');
  const recMonthDay = rec.monthDay || prefDate.getDate();
  const recEndDate  = rec.endDate || '';

  const colorSwatches = EV_COLORS.map(c =>
    `<div class="cswatch ${c===e.color?'sel':''}" style="background:${c}" onclick="evPickColor(this,'${c}')"></div>`

  const typeOpts = EV_TYPES.map(t =>
    `<option value="${t}" ${t===e.type?'selected':''}>${t}</option>`

  const reminderOpts = [
    {v:0,l:'None'},{v:5,l:'5 min'},{v:10,l:'10 min'},{v:15,l:'15 min'},
    {v:30,l:'30 min'},{v:60,l:'1 hour'},{v:120,l:'2 hours'},
    {v:1440,l:'1 day'},{v:2880,l:'2 days'}

      <textarea class="form-inp" id="em-desc" rows="2" placeholder="Notes or context…">${Arc.esc(e.description||'')}</textarea>

    </div>
    <div class="form-group"><label class="form-lbl">Reminder</label>
      <select class="form-inp" id="em-reminder">${reminderOpts}</select>
    </div>
    <div class="modal-foot">
      ${isEdit?`<button class="btn btn-danger" style="margin-right:auto" onclick="confirmDelEvent('${e.id}')">Delete</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent(${isEdit?`'${e.id}'`:'null'})">${isEdit?'Save':'Create Event'}</button>
    </div>
  </div>`);
}

function toggleAllDay(checked) {
  document.getElementById('em-stime-grp').style.cssText = checked ? 'opacity:.4;pointer-events:none' : '';
  document.getElementById('em-etime-grp').style.cssText = checked ? 'opacity:.4;pointer-events:none' : '';
}

function evPickColor(el, c) {
  el.closest('#em-cp').querySelectorAll('.cswatch').forEach(s => s.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('em-color').value = c;
}

function saveEvent(id) {
  const title = document.getElementById('em-title').value.trim();
  if (!title) { document.getElementById('em-title').style.borderColor='var(--red)'; document.getElementById('em-title').focus(); return; }
  const sDate = document.getElementById('em-sdate').value;
  if (!sDate) { alert('Please set a start date.'); return; }
  const allDay = document.getElementById('em-allday').checked;
  const recurrence = getRecurrenceFromModal();
  const ev = {
    id:          id || Arc.uid(),
    title,
    description: document.getElementById('em-desc').value.trim(),
    type:        document.getElementById('em-type').value,
    color:       document.getElementById('em-color').value || EV_COLORS[0],
    allDay,
    startDate:   sDate,
    startTime:   allDay ? '' : (document.getElementById('em-stime').value || ''),
    endDate:     document.getElementById('em-edate').value || sDate,
    endTime:     allDay ? '' : (document.getElementById('em-etime').value || ''),
    reminder:    parseInt(document.getElementById('em-reminder').value) || 0,
    recurrence:  recurrence || null,
    createdAt:   id ? (Arc.Events.getAll().find(x=>x.id===id)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
  };
  if (id) Arc.Events.update(ev); else Arc.Events.add(ev);
  closeModal();
  render();
}

function confirmDelEvent(id) {
  const ev = Arc.Events.getAll().find(x => x.id === id);
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Delete Event?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete <strong style="color:var(--text)">${Arc.esc(ev?.title)}</strong>? This cannot be undone.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDelEvent('${id}')">Delete</button></div>
  </div>`);
}

function doDelEvent(id) { Arc.Events.delete(id); closeModal(); render(); }

function onDataImported() { window.location.reload(); }
function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml('events'); }

init();
</script>
</body>
</html>
