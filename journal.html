<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.journal-layout { flex:1; display:flex; overflow:hidden; }

/* ═══ DATE SIDEBAR (left) ═══ */
.date-sidebar {
  width:185px; flex-shrink:0; display:flex; flex-direction:column;
  border-right:1px solid var(--border); background:var(--s1); transition:background .2s;
}
.ds-hdr { padding:12px 10px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.ds-hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.ds-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.today-link { font-size:11px; font-weight:600; color:var(--accent); cursor:pointer; padding:2px 7px; border-radius:5px; background:rgba(123,121,247,.1); border:1px solid rgba(123,121,247,.25); transition:background .15s; }
.today-link:hover { background:rgba(123,121,247,.2); }

/* Range pills */
.range-pills { display:flex; gap:3px; flex-wrap:wrap; }
.range-pill { padding:3px 7px; border-radius:20px; font-size:10px; font-weight:600; border:1px solid var(--border); background:var(--s3); color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
.range-pill:hover { color:var(--text); border-color:var(--border2); }
.range-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Date list */
.ds-list { flex:1; overflow-y:auto; padding:6px; }
.ds-item { padding:8px 8px; border-radius:7px; cursor:pointer; margin-bottom:2px; transition:background .15s; border:1px solid transparent; }
.ds-item:hover { background:var(--s2); }
.ds-item.active { background:var(--s2); border-color:var(--accent); }
.ds-item-date { font-size:12px; font-weight:600; margin-bottom:2px; }
.ds-item-meta { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.ds-count { font-size:10px; padding:1px 5px; border-radius:8px; background:var(--s3); border:1px solid var(--border); color:var(--muted); }
.ds-note-dot { font-size:9px; color:var(--accent); }
.ds-empty { padding:16px 8px; text-align:center; color:var(--muted); font-size:11px; }

/* ═══ ENTRY SIDEBAR (middle) ═══ */
.entry-sidebar {
  width:225px; flex-shrink:0; display:flex; flex-direction:column;
  border-right:1px solid var(--border); background:var(--bg); transition:background .2s;
}
.es-hdr { padding:10px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; min-height:44px; }
.es-date-lbl { font-size:12px; font-weight:700; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
.es-list { flex:1; overflow-y:auto; padding:6px; }
.es-item { padding:10px 10px; border-radius:8px; cursor:pointer; margin-bottom:3px; transition:background .15s; border:1px solid transparent; position:relative; }
.es-item:hover { background:var(--s1); }
.es-item.active { background:var(--s1); border-color:var(--accent); }
.es-item-title { font-size:12px; font-weight:600; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:20px; }
.es-item-preview { font-size:11px; color:var(--muted); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.es-item-time { font-size:10px; color:var(--dim); margin-top:3px; }
.es-item-del { position:absolute; top:8px; right:7px; width:18px; height:18px; border-radius:4px; background:transparent; border:none; color:var(--muted); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s,color .15s; }
.es-item:hover .es-item-del { opacity:1; }
.es-item-del:hover { color:var(--red); }
.es-empty { padding:20px 10px; text-align:center; color:var(--muted); font-size:11px; line-height:1.5; }
.es-no-date { padding:40px 12px; text-align:center; color:var(--dim); font-size:12px; }

/* ═══ MAIN EDITOR ═══ */
.journal-main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }

/* Placeholder */
.editor-placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); padding:40px; text-align:center; }
.ph-icon { font-size:44px; opacity:.4; margin-bottom:4px; }
.ph-title { font-size:15px; font-weight:600; color:var(--text); }
.ph-sub { font-size:12px; }

/* Title bar */
.entry-title-bar { padding:16px 24px 8px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.entry-title-inp {
  flex:1; background:transparent; border:none; outline:none;
  font-family:'Fraunces',serif; font-size:21px; font-weight:600;
  color:var(--text); letter-spacing:-.3px; min-width:0;
}
.entry-title-inp::placeholder { color:var(--dim); }
.entry-date-lbl { font-size:11px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
.entry-del-btn { width:28px; height:28px; border-radius:6px; background:transparent; border:1px solid transparent; color:var(--muted); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
.entry-del-btn:hover { background:rgba(240,111,111,.12); color:var(--red); border-color:rgba(240,111,111,.3); }

/* Format toolbar */
.format-toolbar {
  padding:5px 24px; display:flex; align-items:center; gap:1px;
  border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; gap:2px;
}
.fmt-btn {
  min-width:28px; height:27px; padding:0 5px; border-radius:5px; background:transparent;
  border:1px solid transparent; color:var(--muted); font-size:13px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background .15s,color .15s,border-color .15s; font-family:'Outfit',sans-serif;
  white-space:nowrap;
}
.fmt-btn:hover { background:var(--s3); color:var(--text); }
.fmt-btn.active { background:var(--s3); color:var(--accent); border-color:rgba(123,121,247,.3); }
.fmt-btn.text-sm { font-size:11px; font-weight:600; }
.fmt-sep { width:1px; height:18px; background:var(--border); margin:0 3px; flex-shrink:0; }

/* Editor scroll area */
.editor-scroll { flex:1; overflow-y:auto; padding:12px 24px 32px; }

/* Editable content */
.entry-editor {
  min-height:220px; outline:none; font-family:'Outfit',sans-serif;
  font-size:14px; line-height:1.85; color:var(--text); caret-color:var(--accent);
}
.entry-editor:empty::before { content:attr(data-placeholder); color:var(--dim); pointer-events:none; display:block; }
.entry-editor h2 { font-family:'Fraunces',serif; font-size:19px; font-weight:600; margin:16px 0 6px; letter-spacing:-.2px; }
.entry-editor h3 { font-family:'Fraunces',serif; font-size:15px; font-weight:600; margin:13px 0 4px; }
.entry-editor p { margin:0 0 10px; }
.entry-editor ul, .entry-editor ol { padding-left:22px; margin:4px 0 12px; }
.entry-editor li { margin-bottom:3px; }
.entry-editor blockquote { border-left:3px solid var(--accent); padding:4px 14px; color:var(--muted); margin:10px 0; font-style:italic; background:rgba(123,121,247,.04); border-radius:0 6px 6px 0; }
.entry-editor hr { border:none; border-top:1px solid var(--border); margin:18px 0; }
.entry-editor a { color:var(--accent); text-decoration:underline; }
[data-theme="light"] .entry-editor blockquote { background:rgba(84,82,214,.04); }

/* Goal notes */
.goal-notes-panel { margin-top:20px; padding-top:18px; border-top:1px solid var(--border); }
.gnp-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.gn-item { background:var(--s1); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
.gn-hdr { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.gn-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.gn-title { font-size:12px; font-weight:600; flex:1; }
.gn-proj { font-size:10px; color:var(--muted); }
.gn-text { font-size:12px; color:var(--muted); line-height:1.5; white-space:pre-wrap; }
.gn-link { font-size:11px; color:var(--accent); font-weight:600; cursor:pointer; margin-top:5px; display:inline-block; }

/* Editor footer */
.editor-footer { padding:5px 24px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.word-count { font-size:11px; color:var(--dim); }
.save-badge { font-size:11px; color:var(--green); font-weight:600; opacity:0; transition:opacity .4s; }
.save-badge.show { opacity:1; }

@media(max-width:820px) { .date-sidebar { display:none; } }
@media(max-width:560px) { .entry-sidebar { display:none; } }
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="journal-layout">

  <!-- ── Date Sidebar ── -->
  <div class="date-sidebar">
    <div class="ds-hdr">
      <div class="ds-hdr-top">
        <span class="ds-label">Dates</span>
        <span class="today-link" onclick="goToday()">Today</span>
      </div>
      <div class="range-pills">
        <button class="range-pill active" data-v="all"   onclick="setRange('all')">All</button>
        <button class="range-pill"        data-v="week"  onclick="setRange('week')">Week</button>
        <button class="range-pill"        data-v="month" onclick="setRange('month')">Month</button>
        <button class="range-pill"        data-v="year"  onclick="setRange('year')">Year</button>
      </div>
    </div>
    <div class="ds-list" id="ds-list"></div>
  </div>

  <!-- ── Entry Sidebar ── -->
  <div class="entry-sidebar">
    <div class="es-hdr">
      <div class="es-date-lbl" id="es-date-lbl">Select a date</div>
      <button class="btn btn-primary btn-sm" id="new-entry-btn" style="display:none" onclick="newEntry()">+ New</button>
    </div>
    <div class="es-list" id="es-list">
      <div class="es-no-date">← Pick a date</div>
    </div>
  </div>

  <!-- ── Main Editor ── -->
  <div class="journal-main" id="journal-main">
    <div class="editor-placeholder">
      <div class="ph-icon">📓</div>
      <div class="ph-title">Your Journal</div>
      <div class="ph-sub">Select a date and entry from the left, or create a new one.</div>
    </div>
  </div>

</div>
<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="data.js"></script>
<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const DAYS    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentDate    = Arc.today();
let currentEntryId = null;
let rangeFilter    = 'all';
let saveTimer      = null;

// ─────────────────────────────────────────────
// DATA — arc_j2 (multi-entry format)
// Migrates from old arc_j on first load.
// arc_j is kept in sync so Home page strip works.
// ─────────────────────────────────────────────
function getEntries() {
  const raw = localStorage.getItem('arc_j2');
  if (raw !== null) {
    try { return JSON.parse(raw); } catch { return []; }
  }
  // One-time migration from arc_j plain-text format
  const old = JSON.parse(localStorage.getItem('arc_j') || '{}');
  const migrated = Object.entries(old)
    .filter(([, v]) => v)
    .map(([date, text]) => ({
      id: Arc.uid(), date,
      title: 'Journal Entry',
      content: '<p>' + text.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>') + '</p>',
      createdAt: date + 'T12:00:00.000Z',
      updatedAt: new Date().toISOString(),
    }));
  localStorage.setItem('arc_j2', JSON.stringify(migrated));
  return migrated;
}

function saveEntries(entries) {
  localStorage.setItem('arc_j2', JSON.stringify(entries));
  // Keep arc_j in sync (used by Home journal strip)
  const byDate = {};
  entries.forEach(e => {
    const plain = stripHtml(e.content);
    const snippet = (e.title && e.title !== 'Journal Entry' ? e.title + ': ' : '') + plain;
    byDate[e.date] = byDate[e.date] ? byDate[e.date] + '\n\n' + snippet : snippet;
  });
  localStorage.setItem('arc_j', JSON.stringify(byDate));
}

function entriesForDate(date) {
  return getEntries()
    .filter(e => e.date === date)
    .sort((a, b) => a.createdAt.localeCompare(b.createdAt));
}

function goalNotesForDate(date) {
  const notes = JSON.parse(localStorage.getItem('arc_n') || '{}');
  const result = [];
  Object.entries(notes).forEach(([key, text]) => {
    if (!text) return;
    const parts   = key.split('_');
    const keyDate = parts[parts.length - 1];
    if (keyDate !== date) return;
    const goalId = parts.slice(0, -1).join('_');
    const goal   = Arc.Goals.getAll().find(g => g.id === goalId);
    if (goal) result.push({ goal, text });
  });
  return result;
}

function allDatesWithContent() {
  const dates = new Set();
  getEntries().forEach(e => dates.add(e.date));
  Object.keys(JSON.parse(localStorage.getItem('arc_n') || '{}')).forEach(key => {
    const parts = key.split('_');
    dates.add(parts[parts.length - 1]);
  });
  dates.add(Arc.today()); // always show today
  return [...dates].sort().reverse();
}

function applyRangeFilter(dates) {
  if (rangeFilter === 'all') return dates;
  const now   = new Date();
  const limit = {
    week:  Arc.dateStr(new Date(now.getFullYear(), now.getMonth(), now.getDate() - 6)),
    month: Arc.dateStr(new Date(now.getFullYear(), now.getMonth(), 1)),
    year:  Arc.dateStr(new Date(now.getFullYear(), 0, 1)),
  }[rangeFilter];
  return dates.filter(d => d >= limit);
}

// ─────────────────────────────────────────────
// FORMAT HELPERS
// ─────────────────────────────────────────────
function stripHtml(html) {
  return (html || '').replace(/<[^>]+>/g, ' ').replace(/&[^;]+;/g, ' ').replace(/\s+/g, ' ').trim();
}
function wordCount(html) {
  const t = stripHtml(html);
  return t ? t.split(/\s+/).filter(Boolean).length : 0;
}
function fmtDateLong(ds) {
  const d = new Date(ds + 'T00:00:00');
  const tag = ds === Arc.today() ? ' · Today' : '';
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}${tag}`;
}
function fmtDateSidebar(ds) {
  const d = new Date(ds + 'T00:00:00');
  if (ds === Arc.today()) return 'Today';
  const yr = d.getFullYear() !== new Date().getFullYear() ? `, ${d.getFullYear()}` : '';
  return `${MONTHS_S[d.getMonth()]} ${d.getDate()}${yr}`;
}
function fmtTime(iso) {
  const d = new Date(iso);
  const h = d.getHours(), m = d.getMinutes();
  return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h < 12 ? 'AM' : 'PM'}`;
}

// ─────────────────────────────────────────────
// INIT & NAVIGATION
// ─────────────────────────────────────────────
function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme', 'dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('journal');

  currentDate = Arc.today();
  renderDateSidebar();
  renderEntrySidebar();

  // Auto-select first entry of today
  const todayEntries = entriesForDate(currentDate);
  if (todayEntries.length > 0) {
    currentEntryId = todayEntries[0].id;
    renderEntrySidebar();
    renderEditor();
  }
}

function goToday() {
  currentDate    = Arc.today();
  currentEntryId = null;
  renderDateSidebar();
  renderEntrySidebar();
  const entries = entriesForDate(currentDate);
  if (entries.length > 0) { currentEntryId = entries[0].id; renderEntrySidebar(); }
  renderEditor();
}

function selectDate(ds) {
  currentDate    = ds;
  currentEntryId = null;
  renderDateSidebar();
  renderEntrySidebar();
  renderEditor();
}

function selectEntry(id) {
  currentEntryId = id;
  renderEntrySidebar();
  renderEditor();
}

function setRange(r) {
  rangeFilter = r;
  document.querySelectorAll('.range-pill').forEach(el =>
    el.classList.toggle('active', el.dataset.v === r)
  );
  renderDateSidebar();
}

// ─────────────────────────────────────────────
// RENDER — DATE SIDEBAR
// ─────────────────────────────────────────────
function renderDateSidebar() {
  const filtered = applyRangeFilter(allDatesWithContent());
  const el = document.getElementById('ds-list');

  if (filtered.length === 0) {
    el.innerHTML = `<div class="ds-empty">No entries in this range</div>`;
    return;
  }

  el.innerHTML = filtered.map(ds => {
    const eCount   = entriesForDate(ds).length;
    const hasNotes = goalNotesForDate(ds).length > 0;
    return `<div class="ds-item ${ds === currentDate ? 'active' : ''}" onclick="selectDate('${ds}')">
      <div class="ds-item-date">${fmtDateSidebar(ds)}</div>
      <div class="ds-item-meta">
        ${eCount > 0 ? `<span class="ds-count">${eCount}</span>` : ''}
        ${hasNotes   ? `<span class="ds-note-dot" title="Has goal notes">◆</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// RENDER — ENTRY SIDEBAR
// ─────────────────────────────────────────────
function renderEntrySidebar() {
  const lbl    = document.getElementById('es-date-lbl');
  const newBtn = document.getElementById('new-entry-btn');
  const list   = document.getElementById('es-list');

  if (!currentDate) {
    lbl.textContent    = 'Select a date';
    newBtn.style.display = 'none';
    list.innerHTML     = `<div class="es-no-date">← Pick a date</div>`;
    return;
  }

  lbl.textContent    = fmtDateSidebar(currentDate);
  newBtn.style.display = '';

  const entries = entriesForDate(currentDate);
  if (entries.length === 0) {
    list.innerHTML = `<div class="es-empty">No entries yet.<br>Click <strong>+ New</strong> to start writing.</div>`;
    return;
  }

  list.innerHTML = entries.map(e => {
    const preview = stripHtml(e.content).slice(0, 55) + (stripHtml(e.content).length > 55 ? '…' : '');
    return `<div class="es-item ${e.id === currentEntryId ? 'active' : ''}" onclick="selectEntry('${e.id}')">
      <button class="es-item-del" onclick="event.stopPropagation();confirmDelEntry('${e.id}')" title="Delete">✕</button>
      <div class="es-item-title">${Arc.esc(e.title || 'Untitled')}</div>
      ${preview ? `<div class="es-item-preview">${Arc.esc(preview)}</div>` : ''}
      <div class="es-item-time">${fmtTime(e.createdAt)}</div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// RENDER — MAIN EDITOR
// ─────────────────────────────────────────────
function renderEditor() {
  const main = document.getElementById('journal-main');

  if (!currentEntryId) {
    main.innerHTML = `<div class="editor-placeholder">
      <div class="ph-icon">📓</div>
      <div class="ph-title">${currentDate ? 'No entry selected' : 'Your Journal'}</div>
      <div class="ph-sub">${currentDate ? 'Select an entry or create a new one.' : 'Select a date from the left.'}</div>
      ${currentDate ? `<button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="newEntry()">+ New Entry</button>` : ''}
    </div>`;
    return;
  }

  const entry = getEntries().find(e => e.id === currentEntryId);
  if (!entry) { currentEntryId = null; renderEditor(); return; }

  const gnotes = goalNotesForDate(entry.date);
  const gnHtml = gnotes.map(({ goal, text }) => {
    const proj = Arc.Projects.getById(goal.projectId);
    return `<div class="gn-item">
      <div class="gn-hdr">
        <div class="gn-dot" style="background:${goal.labelColor || '#7b79f7'}"></div>
        <div class="gn-title">${Arc.esc(goal.title)}</div>
        ${proj ? `<div class="gn-proj">${Arc.esc(proj.name)}</div>` : ''}
      </div>
      <div class="gn-text">${Arc.esc(text)}</div>
      <span class="gn-link" onclick="location.href='planner.html?pid=${goal.projectId}'">View in Planner →</span>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="entry-title-bar">
      <input class="entry-title-inp" id="entry-title-inp"
             value="${Arc.esc(entry.title || '')}"
             placeholder="Entry title…"
             oninput="scheduleSave()"
             onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();document.getElementById('entry-editor').focus();}">
      <div class="entry-date-lbl">${fmtDateLong(entry.date)}</div>
      <button class="entry-del-btn" onclick="confirmDelEntry('${entry.id}')" title="Delete entry">🗑</button>
    </div>

    <div class="format-toolbar">
      <button class="fmt-btn" id="fmt-bold"          onclick="fmt('bold')"                   title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="fmt-btn" id="fmt-italic"        onclick="fmt('italic')"                 title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="fmt-btn" id="fmt-underline"     onclick="fmt('underline')"              title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="fmt-btn" id="fmt-strikeThrough" onclick="fmt('strikeThrough')"          title="Strikethrough"><s>S</s></button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn text-sm"                onclick="fmt('formatBlock','h2')"       title="Heading 1">H1</button>
      <button class="fmt-btn text-sm"                onclick="fmt('formatBlock','h3')"       title="Heading 2">H2</button>
      <button class="fmt-btn text-sm"                onclick="fmt('formatBlock','p')"        title="Normal paragraph">¶</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn"                        onclick="fmt('insertUnorderedList')"    title="Bullet list">•≡</button>
      <button class="fmt-btn"                        onclick="fmt('insertOrderedList')"      title="Numbered list" style="font-size:11px;font-weight:600">1≡</button>
      <button class="fmt-btn"                        onclick="fmt('formatBlock','blockquote')" title="Quote block" style="font-size:16px;line-height:1">"</button>
      <button class="fmt-btn text-sm"               onclick="insertRule()"                  title="Horizontal rule">—</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn text-sm"               onclick="fmt('removeFormat')"           title="Clear formatting">✕ fmt</button>
    </div>

    <div class="editor-scroll">
      <div class="entry-editor" id="entry-editor"
           contenteditable="true"
           data-placeholder="Start writing…"
           oninput="onEditorInput()"
           onkeydown="onEditorKeyDown(event)"></div>
      ${gnotes.length ? `<div class="goal-notes-panel">
        <div class="gnp-label">Goal Notes · ${fmtDateSidebar(entry.date)}</div>
        ${gnHtml}
      </div>` : ''}
    </div>

    <div class="editor-footer">
      <span class="word-count" id="word-count">0 words</span>
      <span class="save-badge" id="save-badge">✓ Saved</span>
    </div>`;

  // Populate content after DOM is ready
  const editorEl = document.getElementById('entry-editor');
  editorEl.innerHTML = entry.content || '';
  refreshWordCount();

  // Keep toolbar state in sync with selection
  document.removeEventListener('selectionchange', refreshToolbar);
  document.addEventListener('selectionchange', refreshToolbar);

  document.execCommand('defaultParagraphSeparator', false, 'p');
}

// ─────────────────────────────────────────────
// RICH TEXT FORMATTING
// ─────────────────────────────────────────────
function fmt(cmd, val) {
  document.execCommand(cmd, false, val || null);
  const ed = document.getElementById('entry-editor');
  if (ed) ed.focus();
  refreshToolbar();
  scheduleSave();
}

function insertRule() {
  document.execCommand('insertHTML', false, '<hr>');
  scheduleSave();
}

function refreshToolbar() {
  ['bold','italic','underline','strikeThrough'].forEach(cmd => {
    const btn = document.getElementById('fmt-' + cmd);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

function onEditorKeyDown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand(e.shiftKey ? 'outdent' : 'indent', false, null);
    return;
  }
  if (e.ctrlKey || e.metaKey) {
    const map = { b:'bold', i:'italic', u:'underline' };
    if (map[e.key.toLowerCase()]) { e.preventDefault(); fmt(map[e.key.toLowerCase()]); }
  }
}

function onEditorInput() {
  refreshWordCount();
  scheduleSave();
}

function refreshWordCount() {
  const ed = document.getElementById('entry-editor');
  const wc = document.getElementById('word-count');
  if (ed && wc) wc.textContent = wordCount(ed.innerHTML) + ' words';
}

// ─────────────────────────────────────────────
// AUTO-SAVE (debounced)
// ─────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(commitSave, 700);
}

function commitSave() {
  if (!currentEntryId) return;
  const titleEl  = document.getElementById('entry-title-inp');
  const editorEl = document.getElementById('entry-editor');
  if (!titleEl || !editorEl) return;

  const entries = getEntries();
  const idx = entries.findIndex(e => e.id === currentEntryId);
  if (idx === -1) return;

  entries[idx] = {
    ...entries[idx],
    title:     titleEl.value.trim() || 'Untitled',
    content:   editorEl.innerHTML,
    updatedAt: new Date().toISOString(),
  };
  saveEntries(entries);

  const badge = document.getElementById('save-badge');
  if (badge) { badge.classList.add('show'); setTimeout(() => badge.classList.remove('show'), 1600); }

  // Refresh sidebars without touching the editor
  renderDateSidebar();
  renderEntrySidebar();
}

// ─────────────────────────────────────────────
// CRUD
// ─────────────────────────────────────────────
function newEntry() {
  if (!currentDate) return;
  const existing = entriesForDate(currentDate).length;
  const entry = {
    id: Arc.uid(), date: currentDate,
    title:     existing === 0 ? 'Journal Entry' : `Entry ${existing + 1}`,
    content:   '',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  const all = getEntries();
  all.push(entry);
  saveEntries(all);
  currentEntryId = entry.id;
  renderEntrySidebar();
  renderEditor();
  // Select all text in title so user can rename immediately
  setTimeout(() => {
    const ti = document.getElementById('entry-title-inp');
    if (ti) { ti.focus(); ti.select(); }
  }, 50);
}

function confirmDelEntry(id) {
  const entry = getEntries().find(e => e.id === id);
  if (!entry) return;
  showModal(`<div class="modal narrow">
    <div class="modal-hdr">
      <div class="modal-title">Delete Entry?</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <p style="color:var(--muted);font-size:13px">Delete <strong style="color:var(--text)">"${Arc.esc(entry.title || 'Untitled')}"</strong>? This cannot be undone.</p>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doDelEntry('${id}')">Delete Entry</button>
    </div>
  </div>`);
}

function doDelEntry(id) {
  const remaining = getEntries().filter(e => e.id !== id);
  saveEntries(remaining);
  if (currentEntryId === id) {
    const sibling = entriesForDate(currentDate).find(e => e.id !== id);
    currentEntryId = sibling ? sibling.id : null;
  }
  closeModal();
  renderDateSidebar();
  renderEntrySidebar();
  renderEditor();
}

function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml('journal'); }
function onDataImported() { window.location.reload(); }

init();
</script>
</body>
</html>
