<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Journal</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ═══ TOP TOOLBAR ═══ */
.journal-toolbar {
  height:50px; padding:0 18px; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border); flex-shrink:0;
  background:var(--s1); transition:background .2s;
}
.jt-title { font-family:'Fraunces',serif; font-size:17px; font-weight:600; flex-shrink:0; }
.jt-sep   { width:1px; height:20px; background:var(--border); flex-shrink:0; }

/* Range pills in toolbar */
.range-pills { display:flex; gap:4px; align-items:center; }
.range-pill  { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:500; border:1px solid var(--border); background:var(--s3); color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
.range-pill:hover  { color:var(--text); border-color:var(--border2); }
.range-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ═══ DATE STRIP ═══ */
.date-strip {
  height:46px; display:flex; align-items:center; gap:6px;
  padding:0 18px; border-bottom:1px solid var(--border); flex-shrink:0;
  overflow-x:auto; background:var(--s2); transition:background .2s;
}
.date-strip::-webkit-scrollbar { height:0; }
.date-pill {
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:500;
  border:1px solid var(--border); background:var(--s3); color:var(--muted);
  cursor:pointer; transition:all .15s; white-space:nowrap; flex-shrink:0;
  display:flex; align-items:center; gap:5px;
}
.date-pill:hover  { border-color:var(--border2); color:var(--text); }
.date-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.date-pill.is-today { border-color:var(--accent); color:var(--accent); }
.date-pill.active.is-today { color:#fff; }
.date-pill-count {
  font-size:10px; font-weight:700; background:rgba(255,255,255,.25);
  border-radius:8px; padding:0 5px; line-height:16px;
}
.date-pill:not(.active) .date-pill-count { background:var(--s2); color:var(--muted); }
.date-strip-empty { font-size:12px; color:var(--muted); padding:0 4px; }

/* ═══ BODY (entry sidebar + editor) ═══ */
.journal-body { flex:1; display:flex; overflow:hidden; }

/* ── Entry sidebar ── */
.entry-sidebar {
  width:240px; flex-shrink:0; display:flex; flex-direction:column;
  border-right:1px solid var(--border); background:var(--s1); transition:background .2s;
}
.es-hdr {
  padding:10px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px; flex-shrink:0; min-height:46px;
}
.es-date-lbl { font-size:12px; font-weight:700; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.es-list { flex:1; overflow-y:auto; padding:6px; }
.es-item {
  padding:10px 10px; border-radius:8px; cursor:pointer; margin-bottom:3px;
  transition:background .15s; border:1px solid transparent; position:relative;
}
.es-item:hover  { background:var(--s2); }
.es-item.active { background:var(--s2); border-color:var(--accent); }
.es-item-title   { font-size:12px; font-weight:600; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:20px; }
.es-item-preview { font-size:11px; color:var(--muted); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.es-item-time    { font-size:10px; color:var(--dim); margin-top:3px; }
.es-item-del {
  position:absolute; top:8px; right:7px; width:18px; height:18px;
  border-radius:4px; background:transparent; border:none; color:var(--muted);
  font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .15s, color .15s;
}
.es-item:hover .es-item-del { opacity:1; }
.es-item-del:hover { color:var(--red); }
.es-empty  { padding:20px 10px; text-align:center; color:var(--muted); font-size:11px; line-height:1.6; }
.es-nodate { padding:40px 12px; text-align:center; color:var(--dim); font-size:12px; }

/* ── Main editor ── */
.journal-main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* Placeholder */
.editor-placeholder {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:8px; color:var(--muted); padding:40px; text-align:center;
}
.ph-icon  { font-size:44px; opacity:.4; margin-bottom:4px; }
.ph-title { font-size:15px; font-weight:600; color:var(--text); }
.ph-sub   { font-size:12px; }

/* Editor wrapper */
.editor-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* Title bar */
.entry-title-bar {
  padding:14px 24px 8px; display:flex; align-items:center; gap:10px;
  flex-shrink:0; border-bottom:1px solid var(--border);
}
.entry-title-inp {
  flex:1; min-width:0; background:transparent; border:none; outline:none;
  font-family:'Fraunces',serif; font-size:20px; font-weight:600;
  color:var(--text); letter-spacing:-.3px;
}
.entry-title-inp::placeholder { color:var(--dim); }
.entry-date-lbl { font-size:11px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
.entry-del-btn {
  width:28px; height:28px; border-radius:6px; background:transparent;
  border:1px solid transparent; color:var(--muted); font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s;
}
.entry-del-btn:hover { background:rgba(240,111,111,.12); color:var(--red); border-color:rgba(240,111,111,.3); }
.entry-created-lbl { font-size:10px; color:var(--dim); white-space:nowrap; }
.date-jump-inp {
  padding:4px 8px; font-size:12px; height:29px; width:148px;
  background:var(--s3); border:1px solid var(--border); border-radius:7px;
  color:var(--text); cursor:pointer; font-family:'Outfit',sans-serif;
}
.date-jump-inp:focus { border-color:var(--accent); outline:none; }
.cr-inp {
  padding:4px 7px; font-size:12px; height:29px;
  background:var(--s3); border:1px solid var(--border); border-radius:7px;
  color:var(--text); font-family:'Outfit',sans-serif;
}
.cr-inp:focus { border-color:var(--accent); outline:none; }

/* Format toolbar */
.format-toolbar {
  padding:5px 24px; display:flex; align-items:center; flex-wrap:wrap; gap:2px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.fmt-btn {
  min-width:28px; height:27px; padding:0 6px; border-radius:5px;
  background:transparent; border:1px solid transparent;
  color:var(--muted); font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, color .15s; font-family:'Outfit',sans-serif;
}
.fmt-btn:hover  { background:var(--s3); color:var(--text); }
.fmt-btn.active { background:var(--s3); color:var(--accent); border-color:rgba(123,121,247,.3); }
.fmt-btn.sm     { font-size:11px; font-weight:600; }
.fmt-sep { width:1px; height:18px; background:var(--border); margin:0 3px; flex-shrink:0; }

/* Editor scroll + content */
.editor-scroll { flex:1; overflow-y:auto; padding:16px 24px 32px; min-width:0; }
.entry-editor {
  width:100%; min-height:220px; outline:none; box-sizing:border-box;
  font-family:'Outfit',sans-serif; font-size:14px; line-height:1.65;
  color:var(--text); caret-color:var(--accent);
}
.entry-editor:empty::before { content:attr(data-placeholder); color:var(--dim); pointer-events:none; display:block; }
.entry-editor h2 { font-family:'Fraunces',serif; font-size:19px; font-weight:600; margin:16px 0 6px; }
.entry-editor h3 { font-family:'Fraunces',serif; font-size:15px; font-weight:600; margin:12px 0 4px; }
.entry-editor p  { margin:0 0 10px; }
.entry-editor ul { list-style-type:disc !important; padding-left:24px; margin:4px 0 12px; }
.entry-editor ol { list-style-type:decimal !important; padding-left:24px; margin:4px 0 12px; }
.entry-editor li { margin-bottom:3px; display:list-item; }
.entry-editor a  { color:var(--accent); text-decoration:underline; cursor:pointer; }
.entry-editor a:hover { opacity:.8; }
.entry-editor img { max-width:100%; border-radius:6px; margin:8px 0; display:block; cursor:pointer; outline:2px solid transparent; transition:outline-color .15s; }
.entry-editor img:hover { outline-color:rgba(123,121,247,.45); }
.entry-editor blockquote { border-left:3px solid var(--accent); padding:4px 14px; color:var(--muted); margin:10px 0; font-style:italic; background:rgba(123,121,247,.04); border-radius:0 6px 6px 0; }
.entry-editor hr { border:none; border-top:1px solid var(--border); margin:18px 0; }
[data-theme="light"] .entry-editor blockquote { background:rgba(84,82,214,.04); }

/* Goal notes */
.goal-notes-panel { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
.gnp-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.gn-item   { background:var(--s1); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
.gn-hdr    { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.gn-dot    { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.gn-title  { font-size:12px; font-weight:600; flex:1; }
.gn-proj   { font-size:10px; color:var(--muted); }
.gn-text   { font-size:12px; color:var(--muted); line-height:1.5; white-space:pre-wrap; }
.gn-link   { font-size:11px; color:var(--accent); font-weight:600; cursor:pointer; margin-top:5px; display:inline-block; }

/* Footer */
.editor-footer {
  padding:5px 24px; border-top:1px solid var(--border); flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
}
.word-count  { font-size:11px; color:var(--dim); }
.save-badge  { font-size:11px; color:var(--green); font-weight:600; opacity:0; transition:opacity .4s; }
.save-badge.show { opacity:1; }

@media(max-width:600px) { .entry-sidebar { display:none; } }
[data-theme="light"] body { background: #ffffff; }
</style>
</head>
<body>
<div id="nav-container"></div>

<!-- Toolbar -->
<div class="journal-toolbar">
  <div class="jt-title">Journal</div>
  <div class="jt-sep"></div>
  <div class="range-pills">
    <button class="range-pill active" data-v="all"    onclick="setRange('all')">All</button>
    <button class="range-pill"        data-v="week"   onclick="setRange('week')">Week</button>
    <button class="range-pill"        data-v="month"  onclick="setRange('month')">Month</button>
    <button class="range-pill"        data-v="year"   onclick="setRange('year')">Year</button>
    <button class="range-pill"        data-v="custom" onclick="setRange('custom')">Custom</button>
  </div>
  <div id="custom-range" style="display:none;align-items:center;gap:5px;flex-shrink:0">
    <input type="date" id="cr-from" class="cr-inp" onchange="renderDateStrip()" title="From date">
    <span style="color:var(--muted);font-size:12px;flex-shrink:0">→</span>
    <input type="date" id="cr-to"   class="cr-inp" onchange="renderDateStrip()" title="To date">
  </div>
  <div style="flex:1"></div>
  <span style="font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0">Jump to</span>
  <input type="date" id="date-jump" class="date-jump-inp" title="Jump to any date" onchange="jumpToDate(this.value)">
  <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
</div>

<!-- Date strip -->
<div class="date-strip" id="date-strip"></div>

<!-- Body -->
<div class="journal-body">

  <!-- Entry sidebar -->
  <div class="entry-sidebar">
    <div class="es-hdr">
      <div class="es-date-lbl" id="es-date-lbl">Select a date</div>
      <button class="btn btn-primary btn-sm" id="new-entry-btn" style="display:none" onclick="newEntry()">+ New</button>
    </div>
    <div class="es-list" id="es-list">
      <div class="es-nodate">← Pick a date above</div>
    </div>
  </div>

  <!-- Editor -->
  <div class="journal-main" id="journal-main">
    <div class="editor-placeholder">
      <div class="ph-icon">📓</div>
      <div class="ph-title">Your Journal</div>
      <div class="ph-sub">Select a date above, then pick or create an entry.</div>
    </div>
  </div>

</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="data.js?v=6"></script>
<script>
// ── Constants ────────────────────────────────────────────────────────
const DAYS    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── State ────────────────────────────────────────────────────────────
let currentDate    = Arc.today();
let currentEntryId = null;
let rangeFilter    = 'all';
let saveTimer      = null;

// ── Data ─────────────────────────────────────────────────────────────
function getEntries() {
  const raw = localStorage.getItem('arc_j2');
  if (raw !== null) { try { return JSON.parse(raw); } catch { return []; } }
  // One-time migration from legacy arc_j plain-text format
  const old = JSON.parse(localStorage.getItem('arc_j') || '{}');
  const migrated = Object.entries(old).filter(([,v])=>v).map(([date,text])=>({
    id: Arc.uid(), date,
    title: 'Journal Entry',
    content: '<p>' + text.replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>') + '</p>',
    createdAt: date + 'T12:00:00.000Z',
    updatedAt: new Date().toISOString(),
  }));
  localStorage.setItem('arc_j2', JSON.stringify(migrated));
  return migrated;
}

function saveEntries(entries) {
  localStorage.setItem('arc_j2', JSON.stringify(entries));
  // Keep arc_j in sync for home-page strip
  const byDate = {};
  entries.forEach(e => {
    const plain   = stripHtml(e.content);
    const snippet = (e.title && e.title !== 'Journal Entry' ? e.title + ': ' : '') + plain;
    byDate[e.date] = byDate[e.date] ? byDate[e.date] + '\n\n' + snippet : snippet;
  });
  localStorage.setItem('arc_j', JSON.stringify(byDate));
}

function entriesForDate(date) {
  return getEntries().filter(e=>e.date===date).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
}

function goalNotesForDate(date) {
  const notes = JSON.parse(localStorage.getItem('arc_n') || '{}');
  const result = [];
  Object.entries(notes).forEach(([key, text]) => {
    if (!text) return;
    const parts   = key.split('_');
    const keyDate = parts[parts.length - 1];
    if (keyDate !== date) return;
    const goalId = parts.slice(0,-1).join('_');
    const goal   = Arc.Goals.getAll().find(g=>g.id===goalId);
    if (goal) result.push({ goal, text });
  });
  return result;
}

function allDatesWithContent(extraDate) {
  const dates = new Set();
  getEntries().forEach(e => dates.add(e.date));
  Object.keys(JSON.parse(localStorage.getItem('arc_n')||'{}')).forEach(key => {
    const parts = key.split('_'); dates.add(parts[parts.length-1]);
  });
  dates.add(Arc.today());
  if (extraDate) dates.add(extraDate);
  return [...dates].sort().reverse();
}

function applyRangeFilter(dates) {
  if (rangeFilter === 'all') return dates;
  if (rangeFilter === 'custom') {
    const from = document.getElementById('cr-from')?.value;
    const to   = document.getElementById('cr-to')?.value;
    if (!from && !to) return dates;
    return dates.filter(d => (!from || d >= from) && (!to || d <= to));
  }
  const now   = new Date();
  const limit = {
    week:  Arc.dateStr(new Date(now.getFullYear(), now.getMonth(), now.getDate() - 6)),
    month: Arc.dateStr(new Date(now.getFullYear(), now.getMonth(), 1)),
    year:  Arc.dateStr(new Date(now.getFullYear(), 0, 1)),
  }[rangeFilter];
  return dates.filter(d => d >= limit);
}

// ── Format helpers ────────────────────────────────────────────────────
function stripHtml(html) {
  return (html||'').replace(/<[^>]+>/g,' ').replace(/&[^;]+;/g,' ').replace(/\s+/g,' ').trim();
}
function wordCount(html) {
  const t = stripHtml(html);
  return t ? t.split(/\s+/).filter(Boolean).length : 0;
}
function fmtDateLong(ds) {
  const d = new Date(ds+'T00:00:00');
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}${ds===Arc.today()?' · Today':''}`;
}
function fmtDatePill(ds) {
  const d = new Date(ds+'T00:00:00');
  if (ds === Arc.today()) return 'Today';
  const yr = d.getFullYear() !== new Date().getFullYear() ? `, ${d.getFullYear()}` : '';
  return `${MONTHS_S[d.getMonth()]} ${d.getDate()}${yr}`;
}
function fmtTime(iso) {
  const d = new Date(iso);
  const h = d.getHours(), m = d.getMinutes();
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
}

// ── Init & navigation ─────────────────────────────────────────────────
function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme','dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('journal');
  currentDate = Arc.today();
  renderAll();

  const p = new URLSearchParams(location.search);
  const jid = p.get('jid');
  if (jid) {
    const entry = getEntries().find(e => e.id === jid);
    if (entry) { currentDate = entry.date; currentEntryId = jid; renderAll(); renderEditor(); }
  } else {
    const todayEntries = entriesForDate(currentDate);
    if (todayEntries.length > 0) { currentEntryId = todayEntries[0].id; renderEntrySidebar(); renderEditor(); }
  }

  if (p.get('new') === '1') {
    history.replaceState({}, '', 'journal.html');
    newEntry();
  }
}

function goToday() {
  currentDate = Arc.today(); currentEntryId = null;
  renderDateStrip(); renderEntrySidebar();
  const es = entriesForDate(currentDate);
  if (es.length > 0) { currentEntryId = es[0].id; renderEntrySidebar(); }
  renderEditor();
  // Scroll today pill into view
  setTimeout(() => {
    const active = document.querySelector('.date-pill.active');
    if (active) active.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 50);
}

function selectDate(ds) {
  currentDate = ds; currentEntryId = null;
  renderDateStrip(); renderEntrySidebar(); renderEditor();
}

function selectEntry(id) {
  currentEntryId = id; setUrlParam('jid', id); renderEntrySidebar(); renderEditor();
}

function setRange(r) {
  rangeFilter = r;
  document.querySelectorAll('.range-pill').forEach(el => el.classList.toggle('active', el.dataset.v === r));
  const cr = document.getElementById('custom-range');
  if (cr) cr.style.display = r === 'custom' ? 'flex' : 'none';
  renderDateStrip();
}

function jumpToDate(ds) {
  if (!ds) return;
  currentDate = ds;
  document.getElementById('date-jump').value = '';
  // Switch to All so the jumped-to date is always visible in the strip
  rangeFilter = 'all';
  document.querySelectorAll('.range-pill').forEach(el => el.classList.toggle('active', el.dataset.v === 'all'));
  const cr = document.getElementById('custom-range');
  if (cr) cr.style.display = 'none';
  renderDateStrip();
  renderEntrySidebar();
  renderEditor();
  setTimeout(() => {
    const active = document.querySelector('.date-pill.active');
    if (active) active.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 50);
}

function renderAll() { renderDateStrip(); renderEntrySidebar(); renderEditor(); }

// ── Date strip ────────────────────────────────────────────────────────
function renderDateStrip() {
  const filtered = applyRangeFilter(allDatesWithContent(currentDate));
  const el = document.getElementById('date-strip');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="date-strip-empty">No entries in this range</div>`;
    return;
  }
  el.innerHTML = filtered.map(ds => {
    const eCount   = entriesForDate(ds).length;
    const hasNotes = goalNotesForDate(ds).length > 0;
    const isToday  = ds === Arc.today();
    const isActive = ds === currentDate;
    const badge    = (eCount > 0 || hasNotes) ? `<span class="date-pill-count">${eCount||''}${hasNotes?'◆':''}</span>` : '';
    return `<div class="date-pill ${isActive?'active':''} ${isToday&&!isActive?'is-today':''}" onclick="selectDate('${ds}')">${fmtDatePill(ds)}${badge}</div>`;
  }).join('');
  // Scroll selected pill into view
  setTimeout(() => {
    const active = el.querySelector('.date-pill.active');
    if (active) active.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 30);
}

// ── Entry sidebar ─────────────────────────────────────────────────────
function renderEntrySidebar() {
  const lbl    = document.getElementById('es-date-lbl');
  const newBtn = document.getElementById('new-entry-btn');
  const list   = document.getElementById('es-list');
  if (!currentDate) {
    lbl.textContent = 'Select a date'; newBtn.style.display = 'none';
    list.innerHTML  = `<div class="es-nodate">← Pick a date above</div>`;
    return;
  }
  lbl.textContent = fmtDatePill(currentDate); newBtn.style.display = '';
  const entries = entriesForDate(currentDate);
  if (entries.length === 0) {
    list.innerHTML = `<div class="es-empty">No entries yet.<br>Click <strong>+ New</strong> to start writing.</div>`;
    return;
  }
  list.innerHTML = entries.map(e => {
    const preview = stripHtml(e.content).slice(0,60) + (stripHtml(e.content).length>60?'…':'');
    return `<div class="es-item ${e.id===currentEntryId?'active':''}" onclick="selectEntry('${e.id}')">
      <button class="es-item-del" onclick="event.stopPropagation();confirmDelEntry('${e.id}')" title="Delete">✕</button>
      <div class="es-item-title">${Arc.esc(e.title||'Untitled')}</div>
      ${preview?`<div class="es-item-preview">${Arc.esc(preview)}</div>`:''}
      <div class="es-item-time">${fmtTime(e.createdAt)}</div>
    </div>`;
  }).join('');
}

// ── Main editor ───────────────────────────────────────────────────────
function renderEditor() {
  const main = document.getElementById('journal-main');
  if (!currentEntryId) {
    main.innerHTML = `<div class="editor-placeholder">
      <div class="ph-icon">📓</div>
      <div class="ph-title">${currentDate?'No entry selected':'Your Journal'}</div>
      <div class="ph-sub">${currentDate?'Select an entry or create a new one.':'Pick a date from the strip above.'}</div>
      ${currentDate?`<button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="newEntry()">+ New Entry</button>`:''}
    </div>`;
    return;
  }
  const entry = getEntries().find(e=>e.id===currentEntryId);
  if (!entry) { currentEntryId = null; renderEditor(); return; }

  const gnotes = goalNotesForDate(entry.date);
  const gnHtml = gnotes.map(({goal,text}) => {
    const proj = Arc.Projects.getById(goal.projectId);
    return `<div class="gn-item">
      <div class="gn-hdr">
        <div class="gn-dot" style="background:${goal.labelColor||'#7b79f7'}"></div>
        <div class="gn-title">${Arc.esc(goal.title)}</div>
        ${proj?`<div class="gn-proj">${Arc.esc(proj.name)}</div>`:''}
      </div>
      <div class="gn-text">${Arc.esc(text)}</div>
      <span class="gn-link" onclick="location.href='planner.html?pid=${goal.projectId}'">View in Planner →</span>
    </div>`;
  }).join('');

  main.innerHTML = `<div class="editor-wrap">
    <div class="entry-title-bar">
      <input class="entry-title-inp" id="entry-title-inp"
        value="${Arc.esc(entry.title||'')}" placeholder="Entry title…"
        oninput="scheduleSave()"
        onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();document.getElementById('entry-editor').focus();}">
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0">
        <div class="entry-date-lbl">${fmtDateLong(entry.date)}</div>
        <div class="entry-created-lbl">Created ${fmtTime(entry.createdAt)}</div>
      </div>
      <button class="entry-del-btn" onclick="confirmDelEntry('${entry.id}')" title="Delete entry">🗑</button>
    </div>
    <div class="format-toolbar">
      <button class="fmt-btn" id="fmt-bold"          onclick="fmt('bold')"                    title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="fmt-btn" id="fmt-italic"        onclick="fmt('italic')"                  title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="fmt-btn" id="fmt-underline"     onclick="fmt('underline')"               title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="fmt-btn" id="fmt-strikeThrough" onclick="fmt('strikeThrough')"           title="Strikethrough"><s>S</s></button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn sm" onclick="fmt('formatBlock','h2')"        title="Heading 1">H1</button>
      <button class="fmt-btn sm" onclick="fmt('formatBlock','h3')"        title="Heading 2">H2</button>
      <button class="fmt-btn sm" onclick="fmt('formatBlock','p')"         title="Paragraph">¶</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn"    onclick="fmt('insertUnorderedList')"     title="Bullet list">•≡</button>
      <button class="fmt-btn sm" onclick="fmt('insertOrderedList')"       title="Numbered list">1≡</button>
      <button class="fmt-btn"    onclick="fmt('formatBlock','blockquote')" title="Quote" style="font-size:16px;line-height:1">"</button>
      <button class="fmt-btn sm" onclick="insertRule()"                   title="Divider">—</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn sm" onclick="insertLink()"                   title="Insert / wrap link">🔗</button>
      <button class="fmt-btn sm" onclick="fmt('removeFormat')"            title="Clear formatting">Clear</button>
      <div class="fmt-sep"></div>
      <select class="fmt-btn sm" id="lh-select" onchange="setLineHeight(this.value)" title="Line height" style="padding:0 4px;cursor:pointer;width:auto">
        <option value="1.4">Tight</option>
        <option value="1.65" selected>Normal</option>
        <option value="1.85">Relaxed</option>
        <option value="2.1">Loose</option>
      </select>
    </div>
    <div class="editor-scroll">
      <div class="entry-editor" id="entry-editor"
           contenteditable="true"
           data-placeholder="Start writing…"
           oninput="onEditorInput()"
           onkeydown="onEditorKeyDown(event)"></div>
      ${gnotes.length?`<div class="goal-notes-panel">
        <div class="gnp-label">Goal Notes · ${fmtDatePill(entry.date)}</div>${gnHtml}
      </div>`:''}
    </div>
    <div class="editor-footer">
      <span class="word-count" id="word-count">0 words</span>
      <span class="save-badge" id="save-badge">✓ Saved</span>
    </div>
  </div>`;

  const ed = document.getElementById('entry-editor');
  ed.innerHTML = entry.content || '';
  refreshWordCount();
  document.removeEventListener('selectionchange', refreshToolbar);
  document.addEventListener('selectionchange', refreshToolbar);
  document.execCommand('defaultParagraphSeparator', false, 'p');
  setupEditorPaste();
}

// ── Link insertion ────────────────────────────────────────────────────
function insertLink() {
  const sel = window.getSelection();
  const selectedText = sel ? sel.toString().trim() : '';
  const url = prompt('Enter URL:', 'https://');
  if (!url || url === 'https://') return;
  document.getElementById('entry-editor')?.focus();
  if (selectedText) {
    document.execCommand('createLink', false, url);
    // Ensure new links open in new tab
    document.querySelectorAll('#entry-editor a').forEach(a => { if (!a.target) a.target = '_blank'; });
  } else {
    const linkText = prompt('Link text (leave blank to use URL):', '') || url;
    document.execCommand('insertHTML', false,
      `<a href="${Arc.esc(url)}" target="_blank" rel="noopener">${Arc.esc(linkText)}</a>`);
  }
  scheduleSave();
}

// ── Image paste & resize ──────────────────────────────────────────────
function setupEditorPaste() {
  const ed = document.getElementById('entry-editor');
  if (!ed) return;
  // Image paste from clipboard
  ed.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (!file) continue;
        const reader = new FileReader();
        reader.onload = ev => {
          document.execCommand('insertHTML', false,
            `<img src="${ev.target.result}" style="max-width:100%">`);
          scheduleSave();
        };
        reader.readAsDataURL(file);
        return;
      }
    }
  });
  // Click image to resize
  ed.addEventListener('click', e => {
    if (e.target.tagName === 'IMG') showImageResizer(e.target);
  });
}

function showImageResizer(img) {
  window._resizingImg = img;
  const sizes = [
    { label: 'Small — 25%',     w: '25%'  },
    { label: 'Medium — 50%',    w: '50%'  },
    { label: 'Large — 75%',     w: '75%'  },
    { label: 'Full width',      w: '100%' },
    { label: 'Original size',   w: 'auto' },
  ];
  const cur = img.style.width || '100%';
  showModal(`<div class="modal narrow">
    <div class="modal-hdr">
      <div><div class="modal-title">Resize Image</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px">
      ${sizes.map(s => `<button class="btn btn-ghost" style="${s.w===cur?'border-color:var(--accent);color:var(--accent)':''}"
        onclick="resizeEditorImg('${s.w}')">${s.label}</button>`).join('')}
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
  </div>`);
}

function resizeEditorImg(width) {
  if (window._resizingImg) {
    window._resizingImg.style.width = width;
    window._resizingImg.style.maxWidth = '100%';
    scheduleSave();
  }
  closeModal();
}

// ── Rich text ─────────────────────────────────────────────────────────
function fmt(cmd, val) {
  document.execCommand(cmd, false, val||null);
  const ed = document.getElementById('entry-editor');
  if (ed) ed.focus();
  refreshToolbar(); scheduleSave();
}
function insertRule() { document.execCommand('insertHTML', false, '<hr>'); scheduleSave(); }
function setLineHeight(v) { const ed = document.getElementById('entry-editor'); if (ed) { ed.style.lineHeight = v; ed.focus(); } }
function refreshToolbar() {
  ['bold','italic','underline','strikeThrough'].forEach(cmd => {
    const btn = document.getElementById('fmt-'+cmd);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}
function onEditorKeyDown(e) {
  if (e.key === 'Tab') { e.preventDefault(); document.execCommand(e.shiftKey?'outdent':'indent', false, null); return; }
  if (e.ctrlKey || e.metaKey) {
    const map = { b:'bold', i:'italic', u:'underline' };
    if (map[e.key.toLowerCase()]) { e.preventDefault(); fmt(map[e.key.toLowerCase()]); }
  }
}
function onEditorInput() { refreshWordCount(); scheduleSave(); }
function refreshWordCount() {
  const ed = document.getElementById('entry-editor');
  const wc = document.getElementById('word-count');
  if (ed && wc) wc.textContent = wordCount(ed.innerHTML) + ' words';
}

// ── Auto-save ─────────────────────────────────────────────────────────
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(commitSave, 700); }
function commitSave() {
  if (!currentEntryId) return;
  const ti = document.getElementById('entry-title-inp');
  const ed = document.getElementById('entry-editor');
  if (!ti || !ed) return;
  const entries = getEntries();
  const idx = entries.findIndex(e=>e.id===currentEntryId);
  if (idx === -1) return;
  entries[idx] = { ...entries[idx], title: ti.value.trim()||'Untitled', content: ed.innerHTML, updatedAt: new Date().toISOString() };
  saveEntries(entries);
  const badge = document.getElementById('save-badge');
  if (badge) { badge.classList.add('show'); setTimeout(()=>badge.classList.remove('show'), 1600); }
  renderDateStrip(); renderEntrySidebar();
}

// ── CRUD ──────────────────────────────────────────────────────────────
function newEntry() {
  if (!currentDate) return;
  const existing = entriesForDate(currentDate).length;
  const entry = {
    id: Arc.uid(), date: currentDate,
    title: existing === 0 ? 'Journal Entry' : `Entry ${existing+1}`,
    content: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
  };
  const all = getEntries(); all.push(entry); saveEntries(all);
  currentEntryId = entry.id;
  Arc.Activity.log('created', 'journal', entry.title, entry.id);
  renderEntrySidebar(); renderEditor();
  setTimeout(() => { const ti = document.getElementById('entry-title-inp'); if (ti) { ti.focus(); ti.select(); } }, 50);
}

function confirmDelEntry(id) {
  const entry = getEntries().find(e=>e.id===id); if (!entry) return;
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Delete Entry?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete <strong style="color:var(--text)">"${Arc.esc(entry.title||'Untitled')}"</strong>? This cannot be undone.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDelEntry('${id}')">Delete</button></div>
  </div>`);
}
function doDelEntry(id) {
  const _delE = getEntries().find(e => e.id === id);
  if (_delE) Arc.Activity.log('deleted', 'journal', _delE.title, id);
  const remaining = getEntries().filter(e=>e.id!==id); saveEntries(remaining);
  if (currentEntryId === id) {
    const sib = entriesForDate(currentDate).find(e=>e.id!==id);
    currentEntryId = sib ? sib.id : null;
  }
  closeModal(); renderAll();
}

function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml('journal'); }
function onDataImported() { window.location.reload(); }

init();
</script>
