<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Layout ── */
.journal-layout { flex: 1; display: flex; overflow: hidden; }

/* ── Sidebar ── */
.journal-sidebar {
  width: 260px; flex-shrink: 0; display: flex; flex-direction: column;
  border-right: 1px solid var(--border); background: var(--s1);
  transition: background .2s;
}
.sidebar-hdr {
  padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-hdr-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.sidebar-today-btn { font-size: 11px; font-weight: 600; color: var(--accent); cursor: pointer; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--accent); background: rgba(123,121,247,.1); transition: background .15s; }
.sidebar-today-btn:hover { background: rgba(123,121,247,.2); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-entry {
  padding: 10px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px;
  transition: background .15s; border: 1px solid transparent;
}
.sidebar-entry:hover { background: var(--s2); }
.sidebar-entry.active { background: var(--s2); border-color: var(--accent); }
.sidebar-entry-date { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.sidebar-entry-preview { font-size: 11px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.sidebar-entry-has-notes { font-size: 10px; color: var(--dim); margin-top: 3px; display: flex; gap: 6px; }
.sidebar-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 2px; vertical-align: middle; }
.sidebar-empty { padding: 20px 12px; text-align: center; color: var(--muted); font-size: 12px; }

/* ── Main area ── */
.journal-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Toolbar */
.journal-toolbar {
  height: 50px; padding: 0 20px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--s1); transition: background .2s;
}
.jt-date { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; flex: 1; }
.jt-date-sub { font-size: 11px; color: var(--muted); font-family: 'Outfit', sans-serif; font-weight: 400; }
.date-nav { display: flex; align-items: center; gap: 4px; }
.date-nav-btn { width: 28px; height: 28px; border-radius: 7px; background: var(--s3); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: color .15s, background .15s; }
.date-nav-btn:hover { color: var(--text); background: var(--s2); }
input[type="date"].date-picker { background: var(--s3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 4px 8px; font-size: 12px; font-family: 'Outfit', sans-serif; cursor: pointer; }
input[type="date"].date-picker:focus { border-color: var(--accent); outline: none; }

/* Content area */
.journal-content { flex: 1; overflow-y: auto; padding: 24px 28px 40px; display: flex; flex-direction: column; gap: 24px; }

/* Journal entry editor */
.entry-section { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: background .2s; }
.entry-section-hdr { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.entry-section-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.entry-section-actions { display: flex; gap: 6px; }
.entry-body { padding: 16px 18px; }
.journal-textarea {
  width: 100%; background: transparent; border: none; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 14px; line-height: 1.7;
  resize: none; min-height: 160px; outline: none;
}
.journal-textarea::placeholder { color: var(--dim); }
.entry-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.entry-char-count { font-size: 11px; color: var(--dim); }
.entry-saved-badge { font-size: 11px; color: var(--green); font-weight: 600; opacity: 0; transition: opacity .3s; }
.entry-saved-badge.show { opacity: 1; }

/* Goal notes section */
.goal-notes-section { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: background .2s; }
.goal-note-item { padding: 12px 18px; border-bottom: 1px solid var(--border); }
.goal-note-item:last-child { border-bottom: none; }
.goal-note-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.goal-note-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.goal-note-title { font-size: 13px; font-weight: 600; flex: 1; }
.goal-note-proj { font-size: 11px; color: var(--muted); }
.goal-note-text { font-size: 12px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; background: var(--s2); border-radius: 7px; padding: 8px 10px; }
.goal-note-link { font-size: 11px; color: var(--accent); font-weight: 600; cursor: pointer; margin-top: 6px; display: inline-block; }
.goal-note-link:hover { opacity: .8; }
.gnotes-empty { padding: 16px 18px; color: var(--muted); font-size: 12px; font-style: italic; }

/* All entries tab */
.all-entries-section { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.all-entry-row { padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; display: flex; align-items: flex-start; gap: 12px; }
.all-entry-row:last-child { border-bottom: none; }
.all-entry-row:hover { background: var(--s2); }
.all-entry-date-col { flex-shrink: 0; width: 90px; }
.all-entry-date { font-size: 12px; font-weight: 600; }
.all-entry-weekday { font-size: 11px; color: var(--muted); }
.all-entry-text { font-size: 12px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; }

@media(max-width:700px) {
  .journal-sidebar { display: none; }
  .journal-content { padding: 16px; }
}
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="journal-layout">

  <!-- Sidebar: past entries list -->
  <div class="journal-sidebar">
    <div class="sidebar-hdr">
      <span class="sidebar-hdr-title">Entries</span>
      <span class="sidebar-today-btn" onclick="goToday()">Today</span>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <!-- Main -->
  <div class="journal-main">
    <div class="journal-toolbar">
      <div class="date-nav">
        <div class="date-nav-btn" onclick="navigateDay(-1)">‹</div>
        <input type="date" class="date-picker" id="date-picker" onchange="onDatePick(this.value)">
        <div class="date-nav-btn" onclick="navigateDay(1)">›</div>
      </div>
      <div style="flex:1">
        <div class="jt-date" id="jt-date-label"></div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
    </div>

    <div class="journal-content" id="journal-content"></div>
  </div>
</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="data.js"></script>
<script>
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentDate = Arc.today();
let saveTimer   = null;

// ── Data helpers ──────────────────────────────────────────────────────
function getJournals() { return JSON.parse(localStorage.getItem('arc_j') || '{}'); }
function getJournal(ds) { return getJournals()[ds] || ''; }
function saveJournal(ds, txt) {
  const j = getJournals();
  if (txt.trim()) j[ds] = txt.trim(); else delete j[ds];
  localStorage.setItem('arc_j', JSON.stringify(j));
}
function getGoalNotes() { return JSON.parse(localStorage.getItem('arc_n') || '{}'); }
function goalNotesForDate(ds) {
  const notes = getGoalNotes();
  const result = [];
  Object.entries(notes).forEach(([key, text]) => {
    const parts = key.split('_');
    const keyDate = parts[parts.length - 1];
    if (keyDate === ds && text) {
      const goalId = parts.slice(0, -1).join('_');
      const goal   = Arc.Goals.getAll().find(g => g.id === goalId);
      if (goal) result.push({ goal, text, goalId });
    }
  });
  return result;
}

// ── Date helpers ──────────────────────────────────────────────────────
function addDays(ds, n) {
  const d = new Date(ds + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return Arc.dateStr(d);
}
function formatDateLong(ds) {
  const d = new Date(ds + 'T00:00:00');
  const isToday = ds === Arc.today();
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}${isToday ? ' · Today' : ''}`;
}
function formatDateShort(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${MONTHS_S[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ── All dates with content (journal or goal notes) ────────────────────
function allEntryDates() {
  const dates = new Set();
  Object.keys(getJournals()).forEach(d => dates.add(d));
  Object.keys(getGoalNotes()).forEach(key => {
    const parts = key.split('_');
    dates.add(parts[parts.length - 1]);
  });
  return [...dates].sort().reverse();
}

// ── Init ──────────────────────────────────────────────────────────────
function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme', 'dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('journal');

  // Check URL param for date
  const param = new URLSearchParams(location.search).get('date');
  if (param) currentDate = param;

  renderSidebar();
  renderMain();
}

// ── Navigation ────────────────────────────────────────────────────────
function goToday() { currentDate = Arc.today(); renderSidebar(); renderMain(); }
function navigateDay(dir) { currentDate = addDays(currentDate, dir); renderSidebar(); renderMain(); }
function onDatePick(val) { if (val) { currentDate = val; renderSidebar(); renderMain(); } }
function selectDate(ds) { currentDate = ds; renderSidebar(); renderMain(); }

// ── Sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  const dates  = allEntryDates();
  // Always include today
  if (!dates.includes(Arc.today())) dates.unshift(Arc.today());
  const el = document.getElementById('sidebar-list');

  if (dates.length === 0) {
    el.innerHTML = `<div class="sidebar-empty">No entries yet — start writing above!</div>`;
    return;
  }

  el.innerHTML = dates.map(ds => {
    const entry    = getJournal(ds);
    const gnotes   = goalNotesForDate(ds);
    const isToday  = ds === Arc.today();
    const isActive = ds === currentDate;
    const preview  = entry ? entry.slice(0, 60) + (entry.length > 60 ? '…' : '') : '';
    const d = new Date(ds + 'T00:00:00');
    const dateLabel = `${MONTHS_S[d.getMonth()]} ${d.getDate()}${isToday?' · Today':''}`;
    return `<div class="sidebar-entry ${isActive?'active':''}" onclick="selectDate('${ds}')">
      <div class="sidebar-entry-date">${dateLabel}</div>
      ${preview ? `<div class="sidebar-entry-preview">${Arc.esc(preview)}</div>` : ''}
      ${gnotes.length > 0 ? `<div class="sidebar-entry-has-notes"><span class="sidebar-dot"></span>${gnotes.length} goal note${gnotes.length!==1?'s':''}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Main content ──────────────────────────────────────────────────────
function renderMain() {
  const ds      = currentDate;
  const entry   = getJournal(ds);
  const gnotes  = goalNotesForDate(ds);
  const isToday = ds === Arc.today();
  const isFuture = ds > Arc.today();

  // Update toolbar
  document.getElementById('jt-date-label').textContent = formatDateLong(ds);
  document.getElementById('date-picker').value = ds;

  // Build content
  const el = document.getElementById('journal-content');

  const journalSection = `<div class="entry-section">
    <div class="entry-section-hdr">
      <span class="entry-section-title">Daily Journal</span>
      <div class="entry-section-actions">
        ${entry ? `<button class="btn btn-ghost btn-sm" style="color:var(--muted)" onclick="clearEntry()">Clear</button>` : ''}
      </div>
    </div>
    <div class="entry-body">
      <textarea class="journal-textarea" id="journal-ta"
        placeholder="${isToday ? 'What\'s on your mind today? Thoughts, progress, reflections…' : isFuture ? 'Planning ahead…' : 'Reflecting on this day…'}"
        oninput="onJournalInput()">${Arc.esc(entry)}</textarea>
    </div>
    <div class="entry-footer">
      <span class="entry-char-count" id="entry-char-count">${entry.length} chars</span>
      <span class="entry-saved-badge" id="entry-saved-badge">✓ Saved</span>
    </div>
  </div>`;

  const goalNotesSection = `<div class="goal-notes-section">
    <div class="entry-section-hdr">
      <span class="entry-section-title">Goal Notes</span>
      <span style="font-size:11px;color:var(--muted)">${gnotes.length} note${gnotes.length!==1?'s':''} on this day</span>
    </div>
    ${gnotes.length === 0
      ? `<div class="gnotes-empty">No goal notes on this day. Click a date cell in the Planner to add goal notes.</div>`
      : gnotes.map(({ goal, text }) => {
          const proj = Arc.Projects.getById(goal.projectId);
          const clr  = goal.labelColor || '#7b79f7';
          return `<div class="goal-note-item">
            <div class="goal-note-hdr">
              <div class="goal-note-dot" style="background:${clr}"></div>
              <div class="goal-note-title">${Arc.esc(goal.title)}</div>
              ${proj ? `<div class="goal-note-proj">${Arc.esc(proj.name)}</div>` : ''}
            </div>
            <div class="goal-note-text">${Arc.esc(text)}</div>
            <span class="goal-note-link" onclick="location.href='planner.html?pid=${goal.projectId}'">View in Planner →</span>
          </div>`;
        }).join('')
    }
  </div>`;

  el.innerHTML = journalSection + goalNotesSection;

  // Focus textarea if today with no entry
  if (isToday && !entry) {
    setTimeout(() => { const ta = document.getElementById('journal-ta'); if (ta) ta.focus(); }, 50);
  }
}

// ── Auto-save ─────────────────────────────────────────────────────────
function onJournalInput() {
  const ta  = document.getElementById('journal-ta');
  const txt = ta ? ta.value : '';
  document.getElementById('entry-char-count').textContent = txt.length + ' chars';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveJournal(currentDate, txt);
    const badge = document.getElementById('entry-saved-badge');
    if (badge) { badge.classList.add('show'); setTimeout(() => badge.classList.remove('show'), 1500); }
    renderSidebar();
  }, 600);
}

function clearEntry() {
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Clear Entry?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete the journal entry for <strong style="color:var(--text)">${formatDateShort(currentDate)}</strong>? This cannot be undone.</p>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doClear()">Clear Entry</button>
    </div>
  </div>`);
}

function doClear() {
  saveJournal(currentDate, '');
  closeModal();
  renderSidebar();
  renderMain();
}

function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml('journal'); }
function onDataImported() { window.location.reload(); }

init();
</script>
</body>
</html>
