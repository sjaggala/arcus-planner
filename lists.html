<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Lists</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── Toolbar ── */
.lists-toolbar {
  padding:0 20px; height:50px; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border); flex-shrink:0; background:var(--s1);
}
.lists-title { font-family:'Fraunces',serif; font-size:16px; font-weight:600; }
.lists-count { font-size:12px; color:var(--muted); background:var(--s3); border:1px solid var(--border); border-radius:10px; padding:2px 10px; }

/* ── Canvas ── */
.lists-canvas {
  flex:1; position:relative; overflow:auto; background:var(--bg);
  min-height:0;
}
[data-theme="light"] .lists-canvas { background:#f2f2f3; }

/* ── Checklist Card ── */
.cl-card {
  position:absolute; display:flex; flex-direction:column;
  background:var(--s1); border:1px solid var(--border); border-radius:8px;
  box-shadow:0 2px 10px rgba(0,0,0,.18); min-width:220px; min-height:120px;
  overflow:hidden; transition:box-shadow .15s;
}
[data-theme="light"] .cl-card { background:#fff; border-color:#e0e0e2; box-shadow:0 2px 10px rgba(0,0,0,.07); }
.cl-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.22); }
[data-theme="light"] .cl-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.11); }
.cl-card.is-dragging { box-shadow:0 10px 36px rgba(0,0,0,.28); opacity:.94; }

/* ── Card Header (drag zone) ── */
.cl-header {
  padding:10px 12px 9px; display:flex; align-items:center; gap:8px;
  cursor:grab; background:var(--s2); border-bottom:1px solid var(--border);
  flex-shrink:0; user-select:none;
}
[data-theme="light"] .cl-header { background:#f7f7f8; border-bottom-color:#e8e8ea; }
.cl-header:active { cursor:grabbing; }
.cl-title {
  flex:1; background:transparent; border:none; outline:none;
  font-size:13px; font-weight:700; color:var(--text);
  font-family:'Outfit',sans-serif; min-width:0; cursor:text;
}
.cl-title::placeholder { color:var(--dim); font-weight:500; }
.cl-hdr-btn {
  width:22px; height:22px; border-radius:5px; background:transparent;
  border:none; color:var(--muted); cursor:pointer; display:flex;
  align-items:center; justify-content:center; font-size:12px;
  transition:color .15s,background .15s; flex-shrink:0; padding:0;
}
.cl-hdr-btn:hover { background:var(--s3); color:var(--red); }

/* ── Shared list indicators ── */
.cl-card.shared-in { border-left:3px solid var(--accent); }
.cl-people { display:inline-flex; align-items:center; gap:4px; flex-shrink:0; margin-right:2px; }
.cl-people > div, .cl-people > img { box-shadow:0 0 0 2px var(--s2); border-radius:50%; }
.cl-dir { font-size:8.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--dim); }

/* ── Quick share modal rows ── */
.csm-lbl { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin:14px 0 7px; }
.csm-lbl:first-child { margin-top:0; }
.csm-row { display:flex; align-items:center; gap:10px; padding:7px 11px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; }
.csm-row.csm-add { cursor:pointer; transition:border-color .15s, background .15s; }
.csm-row.csm-add:hover { border-color:var(--accent); background:rgba(123,121,247,.05); }
.csm-info { flex:1; min-width:0; }
.csm-name { font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.csm-mail { font-size:10.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.csm-x { width:22px; height:22px; border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:11px; border-radius:5px; flex-shrink:0; padding:0; }
.csm-x:hover { color:var(--red); }
.csm-plus { color:var(--accent); font-weight:700; flex-shrink:0; display:flex; }

/* ── Items area ── */
.cl-items { flex:1; overflow-y:auto; padding:6px 0 8px; }
.cl-item {
  display:flex; align-items:flex-start; gap:8px; padding:4px 12px;
}
.cl-item:hover .cl-item-del { opacity:1; }
.cl-item input[type="checkbox"] {
  width:14px; height:14px; margin-top:2px; accent-color:var(--accent);
  cursor:pointer; flex-shrink:0;
}
.cl-item-text {
  flex:1; font-size:13px; color:var(--text); line-height:1.45;
  word-break:break-word;
}
.cl-item.done .cl-item-text { text-decoration:line-through; color:var(--muted); }
.cl-item-del {
  width:16px; height:16px; border-radius:3px; background:transparent; border:none;
  color:var(--muted); cursor:pointer; display:flex; align-items:center;
  justify-content:center; font-size:10px; opacity:0;
  transition:opacity .15s,color .15s; flex-shrink:0; margin-top:2px; padding:0;
}
.cl-item-del:hover { color:var(--red); opacity:1; }

/* ── Done section divider ── */
.cl-done-sep { border:none; border-top:1px solid var(--border); margin:16px 12px 6px; }
.cl-done-hdr {
  padding:2px 12px 4px; font-size:10px; font-weight:700; letter-spacing:.5px;
  text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:5px;
}

/* ── Ghost new-item row ── */
.cl-new-row {
  display:flex; align-items:center; gap:8px; padding:4px 12px;
}
.cl-new-cb { opacity:.3; flex-shrink:0; width:13px; height:13px; }
.cl-new-inp {
  flex:1; background:transparent; border:none; outline:none;
  font-size:12px; color:var(--text); font-family:'Outfit',sans-serif; padding:0;
}
.cl-new-inp::placeholder { color:var(--dim); }

/* ── Resize handle ── */
.cl-resize {
  position:absolute; bottom:0; right:0;
  width:18px; height:18px; cursor:nwse-resize;
  opacity:0; transition:opacity .2s;
}
.cl-card:hover .cl-resize { opacity:1; }
.cl-resize::after {
  content:''; position:absolute; bottom:4px; right:4px;
  width:7px; height:7px;
  border-right:2px solid var(--border2); border-bottom:2px solid var(--border2);
  border-radius:1px;
}

/* ── Empty state ── */
.lists-empty {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-55%);
  text-align:center; pointer-events:none;
}
.lists-empty h3 { font-size:18px; font-weight:600; color:var(--text); margin-bottom:8px; }
.lists-empty p { font-size:13px; color:var(--muted); line-height:1.6; }
.lists-empty .arrow-hint { font-size:12px; color:var(--accent); margin-top:12px; font-weight:600; }

[data-theme="light"] body { background:#f2f2f3; }
</style>
</head>
<body>
<div id="nav-container"></div>

<div class="lists-toolbar">
  <span class="lists-title">Lists</span>
  <span class="lists-count" id="lists-count">0 lists</span>
  <div style="flex:1"></div>
  <button class="btn btn-ghost btn-sm" onclick="autoArrange()" title="Auto-arrange cards"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;vertical-align:-1px"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Auto-arrange</button>
  <button class="btn btn-primary btn-sm" onclick="addChecklist()">＋ New List</button>
</div>

<div class="lists-canvas" id="lists-canvas">
  <div class="lists-empty" id="lists-empty">
    <h3>No lists yet</h3>
    <p>Create checklists for groceries, packing lists,<br>things to do — anything with multiple items.</p>
    <div class="arrow-hint">↑ Click "New List" to get started</div>
  </div>
</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="data.js?v=12"></script>
<script>
function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme', 'dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('lists');
  renderBoard();
}

function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml('lists'); }
function onDataImported() { window.location.reload(); }

// ── Shared-list helpers ────────────────────────────────────────────────
// A list shared WITH me lives in the shared doc, not in my own store.
function getCl(id) {
  const own = Arc.Checklists.getById(id);
  if (own) return own;
  const s = Arc.Shared.get(id);
  return (s && Arc.Shared.isWithMe(id)) ? s.data : null;
}

function saveCl(cl) {
  if (Arc.Shared.isWithMe(cl.id)) {
    Arc.Shared.updateAsMember(cl.id, cl).catch(e => console.warn('Arcus: shared list save failed', e));
    return;
  }
  Arc.Checklists.update(cl);
}

// ── Render ─────────────────────────────────────────────────────────────
function renderBoard() {
  const canvas = document.getElementById('lists-canvas');
  canvas.querySelectorAll('.cl-card').forEach(c => c.remove());
  const own = Arc.Checklists.getAll();
  const sharedIn = Arc.Shared.withMeOfType('list');
  updateCount(own.length + sharedIn.length);
  own.forEach(cl => canvas.appendChild(buildCard(cl)));
  sharedIn.forEach(s => canvas.appendChild(buildCard(s.data, s)));
}

function buildCard(cl, shared) {
  const items  = cl.items || [];
  const active = items.filter(i => !i.done);
  const done   = items.filter(i =>  i.done);
  const canShare = !!(window._arcUser && window._arcDb);
  const sharedByMe = !shared && Arc.Shared.isSharedByMe(cl.id);

  const el = document.createElement('div');
  el.className = 'cl-card' + (shared ? ' shared-in' : '');
  el.id = `cl-${cl.id}`;
  el.style.left  = (cl.x || 24) + 'px';
  el.style.top   = (cl.y || 24) + 'px';
  el.style.width = (cl.w || 280) + 'px';
  if (cl.h) el.style.height = cl.h + 'px';

  // People badge in the header: "from" + owner on incoming, "with" + members on mine
  let people = '';
  if (shared) {
    people = `<span class="cl-people" title="Shared by ${Arc.esc(shared.ownerName)}"><span class="cl-dir">from</span>${arcPersonAva({ name: shared.ownerName, email: shared.ownerEmail, photo: shared.ownerPhoto }, 18)}</span>`;
  } else if (sharedByMe) {
    const ms = Arc.Shared.membersOf(cl.id);
    people = `<span class="cl-people" title="Shared with ${Arc.esc(ms.map(m => Arc.People.nameFor(m)).join(', '))}"><span class="cl-dir">with</span>${ms.slice(0, 2).map(m => arcPersonAva(Arc.People.byEmail(m) || { name: m, email: m, photo: null }, 18)).join('')}${ms.length > 2 ? `<span class="cl-dir" style="margin-left:3px">+${ms.length - 2}</span>` : ''}</span>`;
  }

  const hdrBtns = shared
    ? `<button class="cl-hdr-btn" onmousedown="event.stopPropagation()" onclick="leaveSharedList('${cl.id}')" title="Remove from my board">${Arc.icon('x', 11)}</button>`
    : `${canShare ? `<button class="cl-hdr-btn" onmousedown="event.stopPropagation()" onclick="shareListModal('${cl.id}')" title="Share list">${Arc.icon('share', 11)}</button>` : ''}
       <button class="cl-hdr-btn" onmousedown="event.stopPropagation()" onclick="deleteChecklist('${cl.id}')" title="Delete list">${Arc.icon('trash', 11)}</button>`;

  el.innerHTML = `
    <div class="cl-header" onmousedown="startDrag(event,'${cl.id}')">
      <input class="cl-title" value="${Arc.esc(cl.title)}" placeholder="List title…"
        onmousedown="event.stopPropagation()"
        onblur="saveTitle('${cl.id}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()">
      ${people}
      ${hdrBtns}
    </div>
    <div class="cl-items" id="cli-${cl.id}">
      ${active.map(i => itemHtml(cl.id, i)).join('')}
      ${done.length ? `
        <hr class="cl-done-sep">
        <div class="cl-done-hdr">✓ Completed (${done.length})</div>
        ${done.map(i => itemHtml(cl.id, i)).join('')}
      ` : ''}
      <div class="cl-new-row">
        <input type="checkbox" class="cl-new-cb" disabled>
        <input class="cl-new-inp" id="clai-${cl.id}" placeholder="Add an item…"
          onkeydown="if(event.key==='Enter'&&this.value.trim()){addItem('${cl.id}');event.preventDefault()}">
      </div>
    </div>
    <div class="cl-resize" onmousedown="startResize(event,'${cl.id}')"></div>`;

  return el;
}

function itemHtml(clId, item) {
  return `<div class="cl-item ${item.done ? 'done' : ''}" id="clitem-${item.id}">
    <input type="checkbox" ${item.done ? 'checked' : ''}
      onchange="toggleItem('${clId}','${item.id}',this.checked)">
    <span class="cl-item-text">${Arc.esc(item.text)}</span>
    <button class="cl-item-del" onclick="deleteItem('${clId}','${item.id}')" title="Remove">✕</button>
  </div>`;
}

function reRenderCard(clId) {
  const cl  = getCl(clId);
  const old = document.getElementById(`cl-${clId}`);
  if (!cl || !old) return;
  // Preserve current DOM position/size
  const nx = old.style.left, ny = old.style.top, nw = old.style.width, nh = old.style.height;
  const newCard = buildCard(cl, Arc.Shared.isWithMe(clId) ? Arc.Shared.get(clId) : null);
  newCard.style.left = nx; newCard.style.top = ny;
  newCard.style.width = nw; if (nh) newCard.style.height = nh;
  old.replaceWith(newCard);
  document.getElementById(`clai-${clId}`)?.focus();
}

function updateCount(n) {
  const c = n ?? (Arc.Checklists.getAll().length + Arc.Shared.withMeOfType('list').length);
  document.getElementById('lists-count').textContent = `${c} list${c !== 1 ? 's' : ''}`;
  document.getElementById('lists-empty').style.display = c ? 'none' : '';
}

// ── Actions ────────────────────────────────────────────────────────────
function addChecklist() {
  const all  = Arc.Checklists.getAll();
  const cols = Math.max(1, Math.floor((window.innerWidth - 80) / 310));
  const idx  = all.length;
  const cl   = {
    id: Arc.uid(), title: '', items: [],
    x: 24 + (idx % cols) * 310,
    y: 24 + Math.floor(idx / cols) * 340,
    w: 280,
  };
  Arc.Checklists.add(cl);
  const canvas = document.getElementById('lists-canvas');
  canvas.appendChild(buildCard(cl));
  updateCount();
  setTimeout(() => document.getElementById(`cl-${cl.id}`)?.querySelector('.cl-title')?.focus(), 30);
}

function saveTitle(clId, val) {
  const cl = getCl(clId);
  if (cl && cl.title !== val) saveCl({ ...cl, title: val });
}

function addItem(clId) {
  const inp  = document.getElementById(`clai-${clId}`);
  const text = inp?.value?.trim();
  if (!text) { inp?.focus(); return; }
  const cl = getCl(clId);
  if (!cl) return;
  saveCl({ ...cl, items: [...(cl.items || []), { id: Arc.uid(), text, done: false }] });
  reRenderCard(clId);
  setTimeout(() => document.getElementById(`clai-${clId}`)?.focus(), 20);
}

function toggleItem(clId, itemId, done) {
  const cl = getCl(clId);
  if (!cl) return;
  saveCl({ ...cl, items: cl.items.map(i => i.id === itemId ? { ...i, done } : i) });
  reRenderCard(clId);
}

function deleteItem(clId, itemId) {
  const cl = getCl(clId);
  if (!cl) return;
  saveCl({ ...cl, items: cl.items.filter(i => i.id !== itemId) });
  reRenderCard(clId);
}

function deleteChecklist(clId) {
  if (!confirm('Delete this list?')) return;
  Arc.Checklists.delete(clId);
  document.getElementById(`cl-${clId}`)?.remove();
  updateCount();
}

function leaveSharedList(clId) {
  const s = Arc.Shared.get(clId);
  if (!confirm(`Remove this list from your board? ${s?.ownerName || 'The owner'} keeps it.`)) return;
  Arc.Shared.leave(clId)
    .then(() => { document.getElementById(`cl-${clId}`)?.remove(); updateCount(); })
    .catch(e => alert('Could not remove: ' + (e.message || e)));
}

// ── Share modal ────────────────────────────────────────────────────────
function shareListModal(clId) {
  const cl = Arc.Checklists.getById(clId);
  if (!cl) return;
  showModal(`<div class="modal narrow">
    <div class="modal-hdr">
      <div><div class="modal-title">Share List</div><div class="modal-sub">${Arc.esc(cl.title || 'Untitled list')}</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="slm-body"></div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
  </div>`);
  slmRender(clId);
}

function slmRender(clId) {
  const body = document.getElementById('slm-body');
  if (!body) return;
  const ms = Arc.Shared.membersOf(clId);
  const candidates = Arc.People.connected().filter(p => !ms.includes(p.email));
  body.innerHTML = `
    ${ms.length ? `<div class="csm-lbl">Shared with</div>` + ms.map(m => {
      const p = Arc.People.byEmail(m) || { name: m, email: m, photo: null };
      return `<div class="csm-row">
        ${arcPersonAva(p, 28)}
        <div class="csm-info"><div class="csm-name">${Arc.esc(Arc.People.nameFor(m))}</div><div class="csm-mail">${Arc.esc(m)}</div></div>
        <button class="csm-x" onclick="slmRemove('${clId}','${Arc.esc(m)}')" title="Remove access">✕</button>
      </div>`;
    }).join('') : ''}
    ${candidates.length ? `<div class="csm-lbl">Add people</div>` + candidates.map(p => `
      <div class="csm-row csm-add" onclick="slmAdd('${clId}','${Arc.esc(p.email)}')">
        ${arcPersonAva(p, 28)}
        <div class="csm-info"><div class="csm-name">${Arc.esc(p.name)}</div><div class="csm-mail">${Arc.esc(p.email)}</div></div>
        <span class="csm-plus">${Arc.icon('plus', 14)}</span>
      </div>`).join('') : ''}
    ${!ms.length && !candidates.length ? `<div style="font-size:12px;color:var(--dim);padding:4px 0 10px;line-height:1.7">No connected people yet — add them on the <strong>People &amp; Sharing</strong> page, or share by email below.</div>` : ''}
    <div class="csm-lbl">Or by email</div>
    <input class="form-inp" id="slm-email" type="email" placeholder="their-email@gmail.com"
      onkeydown="if(event.key==='Enter'&&this.value.trim()){slmAdd('${clId}',this.value);event.preventDefault()}">
    <div id="slm-err" style="font-size:11px;color:var(--red);min-height:14px;margin-top:4px"></div>`;
}

async function slmAdd(clId, email) {
  const cl = Arc.Checklists.getById(clId);
  if (!cl || !email || !String(email).trim()) return;
  const err = document.getElementById('slm-err');
  if (err) err.textContent = '';
  try { await Arc.Shared.share('list', cl, email); }
  catch (e) { if (err) err.textContent = e.message || 'Could not share.'; return; }
  slmRender(clId);
  reRenderCard(clId);
}

async function slmRemove(clId, email) {
  try { await Arc.Shared.unshare(clId, email); }
  catch (e) { alert('Could not remove: ' + (e.message || e)); }
  slmRender(clId);
  reRenderCard(clId);
}

function autoArrange() {
  const all  = Arc.Checklists.getAll();
  const cols = Math.max(1, Math.floor((window.innerWidth - 80) / 310));
  all.forEach((cl, i) => { cl.x = 24 + (i % cols) * 310; cl.y = 24 + Math.floor(i / cols) * 340; });
  Arc.Checklists.save(all);
  renderBoard();
}

// ── Drag ───────────────────────────────────────────────────────────────
let _drag = null;

function startDrag(e, clId) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  e.preventDefault();
  const card = document.getElementById(`cl-${clId}`);
  if (!card) return;
  _drag = { clId, sx: e.clientX, sy: e.clientY, ox: parseFloat(card.style.left)||0, oy: parseFloat(card.style.top)||0 };
  card.classList.add('is-dragging');
  card.style.zIndex = 100;

  const onMove = ev => {
    if (!_drag) return;
    card.style.left = Math.max(0, _drag.ox + ev.clientX - _drag.sx) + 'px';
    card.style.top  = Math.max(0, _drag.oy + ev.clientY - _drag.sy) + 'px';
  };
  const onUp = ev => {
    if (!_drag) return;
    const nx = Math.max(0, _drag.ox + ev.clientX - _drag.sx);
    const ny = Math.max(0, _drag.oy + ev.clientY - _drag.sy);
    const cl = getCl(clId);
    if (cl) saveCl({ ...cl, x: Math.round(nx), y: Math.round(ny) });
    card.classList.remove('is-dragging');
    card.style.zIndex = '';
    _drag = null;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ── Resize ─────────────────────────────────────────────────────────────
function startResize(e, clId) {
  e.preventDefault(); e.stopPropagation();
  const card = document.getElementById(`cl-${clId}`);
  if (!card) return;
  const sx = e.clientX, sy = e.clientY;
  const sw = card.offsetWidth, sh = card.offsetHeight;

  const onMove = ev => {
    card.style.width  = Math.max(220, sw + ev.clientX - sx) + 'px';
    card.style.height = Math.max(150, sh + ev.clientY - sy) + 'px';
  };
  const onUp = ev => {
    const w = Math.max(220, sw + ev.clientX - sx);
    const h = Math.max(150, sh + ev.clientY - sy);
    const cl = getCl(clId);
    if (cl) saveCl({ ...cl, w: Math.round(w), h: Math.round(h) });
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ── Boot ───────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
