<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — People &amp; Sharing</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.page-body { flex: 1; overflow-y: auto; padding: 32px 40px 60px; }

/* Page header */
.pg-hdr { display: flex; align-items: center; gap: 16px; margin-bottom: 26px; }
.pg-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--s1); font-weight: 500; transition: border-color .15s, color .15s; flex-shrink: 0; }
.pg-back:hover { border-color: var(--border2); color: var(--text); }
.pg-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; letter-spacing: -.4px; }
.pg-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

[data-theme="light"] body { background: #ffffff; }

/* Layout: side nav + main, separated by a full-height vertical line */
.pg-layout { display: flex; gap: 24px; align-items: stretch; min-height: calc(100vh - 215px); }
.pg-nav { width: 195px; flex-shrink: 0; display: flex; flex-direction: column; gap: 3px; border-right: 1px solid var(--border); padding-right: 18px; }
.pg-nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border-radius: 9px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border: 1px solid transparent; transition: all .13s; height: fit-content; }
.pg-nav-item:hover { color: var(--text); background: var(--s2); }
.pg-nav-item.on { color: var(--text); background: var(--s2); border-color: var(--border); font-weight: 600; }
.pg-nav-count { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--muted); background: var(--s3); border-radius: 10px; padding: 1px 8px; }
.pg-main { flex: 1; min-width: 0; }

/* Section panel — flat, fills the available width */
.pg-panel { background: transparent; }
.pg-panel-hdr { padding: 0 0 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.pg-panel-title { font-size: 14px; font-weight: 700; }
.pg-panel-sub { font-size: 11.5px; color: var(--muted); }

/* Invite inline form */
.pp-invite-form { display: flex; gap: 8px; align-items: center; margin-left: auto; }
.pp-invite-form .form-inp { width: 230px; font-size: 12px; padding: 6px 10px; }

/* People split: list + detail (detail hidden until a person is selected) */
.pp-split { display: flex; min-height: calc(100vh - 320px); }
.pp-listcol { flex: 1; min-width: 0; }
.pp-detail { display: none; width: 380px; flex-shrink: 0; border-left: 1px solid var(--border); background: transparent; margin-left: 18px; }
.pp-split.open .pp-detail { display: block; }

/* People list rows — column grid */
.pp-row, .pp-cols-hdr {
  display: grid; gap: 12px; align-items: center;
  grid-template-columns: minmax(150px,1.4fr) minmax(170px,1.6fr) minmax(90px,1fr) minmax(90px,1fr) minmax(100px,1fr) minmax(90px,1fr) 150px;
  padding: 10px 16px 10px 12px; border-bottom: 1px solid var(--border);
}
.pp-cols-hdr { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); padding-top: 12px; padding-bottom: 8px; }
.pp-row { cursor: pointer; transition: background .1s; }
.pp-row:hover { background: rgba(123,121,247,.05); }
.pp-row.sel { background: rgba(123,121,247,.07); box-shadow: inset 3px 0 0 var(--accent); }
.pp-row-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pp-cell { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pp-group-lbl { padding: 16px 12px 7px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }

/* Status chips */
.pg-chip { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; border-radius: 10px; padding: 2px 10px; flex-shrink: 0; }
.pg-chip.ok      { color: var(--green); background: rgba(62,201,122,.1);  border: 1px solid rgba(62,201,122,.3); }
.pg-chip.pending { color: var(--amber); background: rgba(245,197,66,.1);  border: 1px solid rgba(245,197,66,.3); }
.pg-chip.type    { color: var(--accent); background: rgba(123,121,247,.12); border: 1px solid rgba(123,121,247,.25); }

/* Person detail panel */
.pd-hdr { display: flex; align-items: center; gap: 15px; padding: 20px 18px 18px; border-bottom: 1px solid var(--border); }
.pd-hdr-main { flex: 1; min-width: 0; }
.pd-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.2px; }
.pd-email { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.pd-del { width: 28px; height: 28px; border-radius: 7px; border: 1px solid rgba(240,111,111,.3); background: rgba(240,111,111,.08); color: var(--red); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.pd-del:hover { background: rgba(240,111,111,.18); }
.pd-body { padding: 16px 18px 18px; }
.pd-body .form-group { margin-bottom: 11px; }
.pd-body .form-lbl { font-size: 10px; }
.pd-body .form-inp { font-size: 12.5px; padding: 7px 10px; }
.pd-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 0 18px 18px; }
.pd-saved { font-size: 11px; color: var(--green); align-self: center; margin-right: auto; opacity: 0; transition: opacity .2s; }
.pd-saved.show { opacity: 1; }

/* Shared tables */
.sh-table { width: 100%; }
.sh-thead, .sh-tr { display: grid; gap: 12px; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); }
.sh-thead { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); padding-top: 12px; padding-bottom: 8px; }
.sh-tr { transition: background .1s; }
.sh-tr:hover { background: rgba(123,121,247,.05); }
.sh-tr:last-child { border-bottom: none; }
.sh-cols-mine   { grid-template-columns: minmax(140px,1.8fr) minmax(150px,1.5fr) 64px minmax(80px,1fr) 86px 92px 100px; }
.sh-cols-withme { grid-template-columns: minmax(140px,2fr) minmax(90px,1fr) 64px 86px 92px 80px; }
.sh-people-cell { display:flex; align-items:center; gap:10px; min-width:0; overflow:hidden; }
.sh-person { display:inline-flex; align-items:center; gap:5px; min-width:0; }
.sh-person-name { font-size:11.5px; color:var(--text); font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
.sh-search-wrap { position:relative; margin-left:auto; display:flex; align-items:center; }
.sh-search-wrap > svg { position:absolute; left:11px; color:var(--dim); pointer-events:none; }
.sh-search { width:230px; font-size:12px; padding:6px 11px 6px 32px; }
.sh-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sh-title a { color: var(--text); text-decoration: none; }
.sh-title a:hover { color: var(--accent); }
.sh-cell { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sh-people { display: flex; align-items: center; }
.sh-people > * { margin-left: -7px; box-shadow: 0 0 0 2px var(--s1); border-radius: 50%; }
.sh-people > *:first-child { margin-left: 0; }
.sh-people-more { font-size: 10px; color: var(--muted); font-weight: 700; margin-left: 4px !important; box-shadow: none !important; }
.sh-stop { font-size: 11px; padding: 4px 11px; border-radius: 7px; border: 1px solid rgba(240,111,111,.3); background: rgba(240,111,111,.06); color: var(--red); cursor: pointer; font-weight: 500; transition: all .15s; white-space: nowrap; }
.sh-stop:hover { background: rgba(240,111,111,.16); }

.pg-empty { font-size: 12.5px; color: var(--dim); padding: 36px 20px; line-height: 1.7; text-align: center; }

/* Signed-out notice */
.pg-signin { max-width: 520px; background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 32px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.8; }

@media(max-width: 900px) {
  .page-body { padding: 16px 16px 40px; }
  .pg-layout { flex-direction: column; }
  .pg-nav { width: 100%; flex-direction: row; flex-wrap: wrap; }
  .pp-split { flex-direction: column; }
  .pp-detail { width: 100%; border-left: none; border-top: 1px solid var(--border); }
}
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="page-body">

  <div class="pg-hdr">
    <div>
      <div class="pg-title">People &amp; Sharing</div>
      <div class="pg-sub">Your address book and everything you collaborate on</div>
    </div>
  </div>

  <div id="pg-content"></div>

</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="data.js?v=11"></script>
<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TYPE_LABEL = { task: 'Task', goal: 'Goal', project: 'Project' };

let section  = 'people';   // 'people' | 'by-me' | 'with-me'
let selEmail = null;       // selected person in the People section
let inviteOpen = false;

function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme', 'dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('');
  const h = location.hash.replace('#', '');
  if (['people', 'by-me', 'with-me'].includes(h)) section = h;
  render();
}

function setSection(s) {
  section = s;
  history.replaceState({}, '', '#' + s);
  render();
}

function fmtShareDate(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function bucketName(bucketId) {
  const b = Arc.Buckets.getAll().find(x => x.id === bucketId);
  return b ? b.name : '—';
}

// ── Page render ────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('pg-content');
  if (!window._arcUser || !window._arcDb) {
    // If this tab was already authenticated, Firebase is still resolving the
    // session — show a quiet loading state instead of flashing the sign-in card
    const authPending = sessionStorage.getItem('arc_auth_ok') && localStorage.getItem('arc_local_mode') !== '1';
    el.innerHTML = authPending
      ? `<div class="share-loading" style="padding:30px 4px">Loading your people…</div>`
      : `<div class="pg-signin">
          <div style="margin-bottom:10px;color:var(--muted);display:flex;justify-content:center">${Arc.icon('users', 34)}</div>
          <strong style="color:var(--text)">Sign in to collaborate</strong><br>
          The address book and task sharing need cloud sync.<br>Sign in with Google from the profile menu to get started.
        </div>`;
    return;
  }
  const pendingCount = Arc.People.pendingIn().length + Arc.People.pendingOut().length;
  el.innerHTML = `<div class="pg-layout">
    <div class="pg-nav">
      <div class="pg-nav-item ${section==='people'?'on':''}" onclick="setSection('people')">
        People
        <span class="pg-nav-count">${Arc.People.connected().length}${pendingCount ? ` · ${pendingCount}⏳` : ''}</span>
      </div>
      <div class="pg-nav-item ${section==='by-me'?'on':''}" onclick="setSection('by-me')">
        Shared by me
        <span class="pg-nav-count">${Arc.Shared._mine.length}</span>
      </div>
      <div class="pg-nav-item ${section==='with-me'?'on':''}" onclick="setSection('with-me')">
        Shared with me
        <span class="pg-nav-count">${Arc.Shared._withMe.length}</span>
      </div>
    </div>
    <div class="pg-main" id="pg-main"></div>
  </div>`;
  if (section === 'people') renderPeopleSection();
  else if (section === 'by-me') renderByMe();
  else renderWithMe();
}

// ── People section: list + detail ──────────────────────────────────────
function renderPeopleSection() {
  const main = document.getElementById('pg-main');
  main.innerHTML = `<div class="pg-panel">
    <div class="pg-panel-hdr">
      <div>
        <div class="pg-panel-title">People</div>
        <div class="pg-panel-sub">Select a person to view and edit their details</div>
      </div>
      ${inviteOpen
        ? `<div class="pp-invite-form">
            <input class="form-inp" id="pp-email" type="email" placeholder="their-email@gmail.com"
              onkeydown="if(event.key==='Enter')ppInvite()">
            <button class="btn btn-primary btn-sm" onclick="ppInvite()">Send</button>
            <button class="btn btn-ghost btn-sm" onclick="ppToggleInvite(false)">✕</button>
          </div>`
        : `<button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="ppToggleInvite(true)">＋ Send Invite</button>`}
    </div>
    ${inviteOpen ? `<div id="pp-err" style="font-size:11px;color:var(--red);padding:6px 20px 0;min-height:14px;text-align:right"></div>` : ''}
    <div class="pp-split ${selEmail ? 'open' : ''}" id="pp-split">
      <div class="pp-listcol" id="pp-listcol"></div>
      <div class="pp-detail" id="pp-detail"></div>
    </div>
  </div>`;
  renderPeopleList();
  renderPersonDetail();
  if (inviteOpen) document.getElementById('pp-email')?.focus();
}

function ppToggleInvite(open) {
  inviteOpen = open;
  renderPeopleSection();
}

function renderPeopleList() {
  const el = document.getElementById('pp-listcol');
  if (!el) return;
  const row = (p, right) => {
    const m = Arc.People.metaFor(p.email);
    return `<div class="pp-row ${selEmail===p.email?'sel':''}" onclick="ppSelect('${Arc.esc(p.email)}')">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        ${arcPersonAva({ ...p, name: Arc.People.nameFor(p.email) }, 30)}
        <span class="pp-row-name">${Arc.esc(Arc.People.nameFor(p.email))}</span>
      </div>
      <div class="pp-cell">${Arc.esc(p.email)}</div>
      <div class="pp-cell pp-c-x">${Arc.esc(m.company || '—')}</div>
      <div class="pp-cell pp-c-x">${Arc.esc(m.role || '—')}</div>
      <div class="pp-cell pp-c-x">${Arc.esc(m.phone || '—')}</div>
      <div class="pp-cell pp-c-x">${Arc.esc(m.location || '—')}</div>
      <div style="display:flex;justify-content:flex-end;gap:6px;align-items:center">${right}</div>
    </div>`;
  };

  let html = `<div class="pp-cols-hdr">
    <div>Name</div><div>Email</div>
    <div class="pp-c-x">Company</div><div class="pp-c-x">Role</div>
    <div class="pp-c-x">Phone</div><div class="pp-c-x">Location</div>
    <div style="text-align:right">Status</div>
  </div>`;
  const pin = Arc.People.pendingIn();
  if (pin.length) {
    html += `<div class="pp-group-lbl">Invites for you</div>` + pin.map(p => row(p, `
      <button class="btn btn-primary btn-sm" style="font-size:11px;padding:3px 12px;flex-shrink:0" onclick="event.stopPropagation();ppAccept('${p.id}')">Accept</button>
      <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:3px 9px;color:var(--red);flex-shrink:0" onclick="event.stopPropagation();ppRemove('${p.id}','${Arc.esc(p.email)}','Decline this invite?')">Decline</button>
    `)).join('');
  }
  const pout = Arc.People.pendingOut();
  if (pout.length) {
    html += `<div class="pp-group-lbl">Invited — waiting on them</div>` +
      pout.map(p => row(p, `<span class="pg-chip pending">Pending</span>`)).join('');
  }
  const conn = Arc.People.connected();
  html += `<div class="pp-group-lbl">Connected</div>`;
  html += conn.length
    ? conn.map(p => row(p, `<span class="pg-chip ok">Connected</span>`)).join('')
    : `<div class="pg-empty">No connections yet — click <strong>＋ Send Invite</strong> above.<br>Once they accept, their name fills in automatically from their Google account.</div>`;

  el.innerHTML = html;
}

function ppSelect(email) {
  selEmail = (selEmail === email) ? null : email;
  document.getElementById('pp-split')?.classList.toggle('open', !!selEmail);
  renderPeopleList();
  renderPersonDetail();
}

function renderPersonDetail() {
  const el = document.getElementById('pp-detail');
  if (!el) return;
  const p = selEmail ? Arc.People.byEmail(selEmail) : null;
  if (!p) { el.innerHTML = ''; return; }
  const m = Arc.People.metaFor(p.email);
  const name = Arc.People.nameFor(p.email);
  const fld = (id, lbl, val, ph) => `<div class="form-group">
    <label class="form-lbl">${lbl}</label>
    <input class="form-inp" id="pd-${id}" value="${Arc.esc(val || '')}" placeholder="${ph}">
  </div>`;
  el.innerHTML = `
    <div class="pd-hdr">
      ${arcPersonAva({ ...p, name }, 62)}
      <div class="pd-hdr-main">
        <div class="pd-name">${Arc.esc(name)}</div>
        <div class="pd-email">${Arc.esc(p.email)}</div>
      </div>
      ${p.status === 'pending' ? `<span class="pg-chip pending">Pending</span>` : `<span class="pg-chip ok">Connected</span>`}
      <button class="pd-del" title="Remove this person" onclick="ppRemove('${p.id}','${Arc.esc(p.email)}','Remove ${Arc.esc(name)} from your people? Shared tasks are not affected.')">${Arc.icon('trash', 13)}</button>
    </div>
    <div class="pd-body">
      ${fld('name', 'Name', m.name || (p.status === 'accepted' ? p.name : ''), p.status === 'accepted' ? '' : 'Filled from Google when they accept')}
      <div class="form-row">
        ${fld('company', 'Company', m.company, 'Company')}
        ${fld('role', 'Role', m.role, 'Role / title')}
      </div>
      <div class="form-row">
        ${fld('phone', 'Phone', m.phone, '+1 …')}
        ${fld('location', 'Location', m.location, 'City, Country')}
      </div>
      ${fld('address', 'Address', m.address, 'Street address')}
      <div class="form-group">
        <label class="form-lbl">Notes</label>
        <textarea class="form-inp" id="pd-notes" rows="2" placeholder="Anything to remember…" style="font-size:12.5px">${Arc.esc(m.notes || '')}</textarea>
      </div>
    </div>
    <div class="pd-foot">
      <span class="pd-saved" id="pd-saved">✓ Saved</span>
      <button class="btn btn-primary btn-sm" onclick="pdSave('${Arc.esc(p.email)}')">Save Details</button>
    </div>`;
}

function pdSave(email) {
  const v = id => document.getElementById(`pd-${id}`)?.value?.trim() || '';
  Arc.People.saveMeta(email, {
    name: v('name'), company: v('company'), role: v('role'),
    phone: v('phone'), location: v('location'), address: v('address'),
    notes: document.getElementById('pd-notes')?.value?.trim() || '',
  });
  renderPeopleList();
  const ok = document.getElementById('pd-saved');
  if (ok) { ok.classList.add('show'); setTimeout(() => ok.classList.remove('show'), 1800); }
}

async function ppInvite() {
  const emailEl = document.getElementById('pp-email');
  const err     = document.getElementById('pp-err');
  const email = emailEl?.value?.trim();
  if (!email) { emailEl?.focus(); return; }
  if (err) err.textContent = '';
  try {
    await Arc.People.invite(email, '');
    inviteOpen = false;
    renderPeopleSection();
    render();  // refresh nav counts
  } catch (e) {
    if (err) err.textContent = e.message || 'Could not send the invite.';
  }
}

async function ppAccept(id) {
  try { await Arc.People.accept(id); }
  catch (e) { alert('Could not accept: ' + (e.message || e)); }
  render();
}

async function ppRemove(id, email, msg) {
  if (!confirm(msg || 'Remove this person?')) return;
  try { await Arc.People.remove(id); Arc.People.deleteMeta(email); }
  catch (e) { alert('Could not remove: ' + (e.message || e)); }
  if (selEmail === email) selEmail = null;
  render();
}

// ── Shared by me ───────────────────────────────────────────────────────
function itemLink(s) {
  return s.type === 'task'
    ? `<a href="tasks.html?tid=${s.id}">${Arc.esc(s.data?.title || 'Untitled')}</a>`
    : Arc.esc(s.data?.title || 'Untitled');
}

// People column: up to 2 avatar+name pairs, then a +n count
function peopleCell(emails) {
  const shown = emails.slice(0, 2);
  return `<div class="sh-people-cell">${shown.map(m => {
    const p = Arc.People.byEmail(m) || { name: m, email: m, photo: null };
    const name = Arc.People.nameFor(m);
    return `<span class="sh-person" title="${Arc.esc(name)} (${Arc.esc(m)})">${arcPersonAva(p, 20)}<span class="sh-person-name">${Arc.esc(name)}</span></span>`;
  }).join('')}${emails.length > 2 ? `<span style="font-size:11px;color:var(--muted);font-weight:700;flex-shrink:0">+${emails.length - 2}</span>` : ''}</div>`;
}

let qByMe = '', qWithMe = '';

function shMatches(s, q) {
  if (!q) return true;
  if ((s.data?.title || '').toLowerCase().includes(q)) return true;
  if ((s.ownerName || '').toLowerCase().includes(q) || (s.ownerEmail || '').includes(q)) return true;
  return (s.members || []).some(m => m.includes(q) || Arc.People.nameFor(m).toLowerCase().includes(q));
}

function renderByMe(keepFocus) {
  const main = document.getElementById('pg-main');
  const q = qByMe.trim().toLowerCase();
  const mine = Arc.Shared._mine.filter(s => shMatches(s, q));
  main.innerHTML = `<div class="pg-panel">
    <div class="pg-panel-hdr">
      <div>
        <div class="pg-panel-title">Shared by me</div>
        <div class="pg-panel-sub">Items you've shared with others — they can edit and comment</div>
      </div>
      <div class="sh-search-wrap">${Arc.icon('search', 13)}
        <input class="form-inp sh-search" id="sh-q-mine" placeholder="Search items or people…" value="${Arc.esc(qByMe)}"
          oninput="qByMe=this.value;renderByMe(true)">
      </div>
    </div>
    ${mine.length ? `<div class="sh-table">
      <div class="sh-thead sh-cols-mine"><div>Title</div><div>People</div><div>Type</div><div>Project</div><div>Shared</div><div>Status</div><div></div></div>
      ${mine.map(s => {
        const proj = s.data?.projectId ? Arc.Projects.getById(s.data.projectId) : null;
        return `<div class="sh-tr sh-cols-mine">
          <div class="sh-title">${itemLink(s)}</div>
          ${peopleCell(s.members || [])}
          <div><span class="pg-chip type">${TYPE_LABEL[s.type] || s.type}</span></div>
          <div class="sh-cell">${proj ? Arc.esc(proj.name) : '—'}</div>
          <div class="sh-cell">${fmtShareDate(s.createdAt)}</div>
          <div class="sh-cell">${Arc.esc(bucketName(s.data?.bucketId))}</div>
          <div style="text-align:right"><button class="sh-stop" onclick="shUnshare('${s.id}')">Stop sharing</button></div>
        </div>`;
      }).join('')}
    </div>`
    : `<div class="pg-empty">${q ? 'No shared items match your search.' : `You haven't shared anything yet.<br>Open a task on the board and use the Share button.`}</div>`}
  </div>`;
  if (keepFocus) {
    const inp = document.getElementById('sh-q-mine');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

// ── Shared with me ─────────────────────────────────────────────────────
function renderWithMe(keepFocus) {
  const main = document.getElementById('pg-main');
  const q = qWithMe.trim().toLowerCase();
  const withMe = Arc.Shared._withMe.filter(s => shMatches(s, q));
  main.innerHTML = `<div class="pg-panel">
    <div class="pg-panel-hdr">
      <div>
        <div class="pg-panel-title">Shared with me</div>
        <div class="pg-panel-sub">Items other people share with you — they appear on your task board too</div>
      </div>
      <div class="sh-search-wrap">${Arc.icon('search', 13)}
        <input class="form-inp sh-search" id="sh-q-withme" placeholder="Search items or people…" value="${Arc.esc(qWithMe)}"
          oninput="qWithMe=this.value;renderWithMe(true)">
      </div>
    </div>
    ${withMe.length ? `<div class="sh-table">
      <div class="sh-thead sh-cols-withme"><div>Title</div><div>From</div><div>Type</div><div>Shared</div><div>Status</div><div></div></div>
      ${withMe.map(s => `<div class="sh-tr sh-cols-withme">
        <div class="sh-title">${itemLink(s)}</div>
        <div class="sh-cell" style="display:flex;align-items:center;gap:7px">
          ${arcPersonAva({ name: s.ownerName, email: s.ownerEmail, photo: s.ownerPhoto }, 22)}
          <span style="overflow:hidden;text-overflow:ellipsis">${Arc.esc(s.ownerName)}</span>
        </div>
        <div><span class="pg-chip type">${TYPE_LABEL[s.type] || s.type}</span></div>
        <div class="sh-cell">${fmtShareDate(s.createdAt)}</div>
        <div class="sh-cell">${Arc.esc(bucketName(s.data?.bucketId))}</div>
        <div style="text-align:right"><button class="sh-stop" onclick="shLeave('${s.id}')">Leave</button></div>
      </div>`).join('')}
    </div>`
    : `<div class="pg-empty">${q ? 'No shared items match your search.' : 'Nothing has been shared with you yet.<br>When someone shares a task, it shows up here and on your task board.'}</div>`}
  </div>`;
  if (keepFocus) {
    const inp = document.getElementById('sh-q-withme');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

async function shUnshare(id) {
  if (!confirm('Stop sharing this item? Collaborators will lose access; you keep it.')) return;
  try { await Arc.Shared.unshareAll(id); }
  catch (e) { alert('Could not stop sharing: ' + (e.message || e)); }
  render();
}

async function shLeave(id) {
  if (!confirm('Remove this shared item from your board? The owner keeps it.')) return;
  try { await Arc.Shared.leave(id); }
  catch (e) { alert('Could not leave: ' + (e.message || e)); }
  render();
}

function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml(''); }
function onDataImported() { window.location.reload(); }

init();
</script>
</body>
</html>
