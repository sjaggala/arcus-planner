<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — People &amp; Sharing</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.page-body { flex: 1; overflow-y: auto; padding: 32px 40px 60px; }

/* Page header */
.pg-hdr { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
.pg-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--s1); font-weight: 500; transition: border-color .15s, color .15s; flex-shrink: 0; }
.pg-back:hover { border-color: var(--border2); color: var(--text); }
.pg-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; letter-spacing: -.4px; }
.pg-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Two-column layout */
.pg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; max-width: 1280px; }
@media(max-width: 1000px) { .pg-grid { grid-template-columns: 1fr; } }
@media(max-width: 700px)  { .page-body { padding: 16px 16px 40px; } }

/* Panels */
.pg-panel { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.pg-panel-hdr { padding: 15px 20px 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 9px; }
.pg-panel-title { font-size: 14px; font-weight: 700; flex: 1; }
.pg-panel-count { font-size: 12px; color: var(--muted); }
.pg-panel-body { padding: 18px 20px 20px; }

/* Section labels inside panels */
.pg-sec { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 18px 0 9px; }
.pg-sec:first-child { margin-top: 0; }

/* Rows */
.pg-row { display: flex; align-items: center; gap: 13px; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; background: var(--s2); }
.pg-row-main { flex: 1; min-width: 0; }
.pg-row-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pg-row-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pg-row-name a { color: var(--text); text-decoration: none; }
.pg-row-name a:hover { color: var(--accent); }

/* Status chips */
.pg-chip { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; border-radius: 10px; padding: 2px 10px; flex-shrink: 0; }
.pg-chip.ok      { color: var(--green); background: rgba(62,201,122,.1);  border: 1px solid rgba(62,201,122,.3); }
.pg-chip.pending { color: var(--amber); background: rgba(245,197,66,.1);  border: 1px solid rgba(245,197,66,.3); }
.pg-chip.type    { color: var(--accent); background: rgba(123,121,247,.12); border: 1px solid rgba(123,121,247,.25); }

/* Member avatar cluster in shared rows */
.pg-members { display: flex; align-items: center; flex-shrink: 0; }
.pg-members > * { margin-left: -7px; border: 2px solid var(--s2); border-radius: 50%; }
.pg-members > *:first-child { margin-left: 0; }

/* Add person form */
.pg-add { display: flex; gap: 8px; flex-wrap: wrap; }
.pg-add .form-inp { flex: 1; min-width: 130px; }

/* Empty states */
.pg-empty { font-size: 12.5px; color: var(--dim); padding: 14px 4px; line-height: 1.7; }

/* Signed-out notice */
.pg-signin { max-width: 520px; background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 32px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="page-body">

  <div class="pg-hdr">
    <div class="pg-back" onclick="location.href='index.html'">← Back to Home</div>
    <div>
      <div class="pg-title">People &amp; Sharing</div>
      <div class="pg-sub">Your address book and everything you collaborate on</div>
    </div>
  </div>

  <div id="pg-content"></div>

</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="data.js?v=6"></script>
<script>
function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme', 'dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('');
  render();
}

function render() {
  const el = document.getElementById('pg-content');
  if (!window._arcUser || !window._arcDb) {
    el.innerHTML = `<div class="pg-signin">
      <div style="font-size:32px;margin-bottom:10px">👥</div>
      <strong style="color:var(--text)">Sign in to collaborate</strong><br>
      The address book and task sharing need cloud sync.<br>Sign in with Google from the profile menu to get started.
    </div>`;
    return;
  }
  el.innerHTML = `<div class="pg-grid">
    <div class="pg-panel">
      <div class="pg-panel-hdr">
        <span style="font-size:16px">👤</span>
        <span class="pg-panel-title">People</span>
        <span class="pg-panel-count" id="pp-count"></span>
      </div>
      <div class="pg-panel-body">
        <div class="pg-sec">Add a person</div>
        <div class="pg-add">
          <input class="form-inp" id="pp-name" placeholder="Name" onkeydown="if(event.key==='Enter')ppInvite()">
          <input class="form-inp" id="pp-email" type="email" placeholder="their-email@gmail.com" style="flex:1.4" onkeydown="if(event.key==='Enter')ppInvite()">
          <button class="btn btn-primary btn-sm" style="flex-shrink:0;white-space:nowrap" onclick="ppInvite()">Send Invite</button>
        </div>
        <div class="form-hint" style="margin-top:6px">They'll see your invite here when they sign in to Arcus with that email.</div>
        <div id="pp-err" style="font-size:11px;color:var(--red);min-height:14px;margin-top:4px"></div>
        <div id="pp-lists"></div>
      </div>
    </div>
    <div class="pg-panel">
      <div class="pg-panel-hdr">
        <span style="font-size:16px">🤝</span>
        <span class="pg-panel-title">Shared items</span>
        <span class="pg-panel-count" id="sh-count"></span>
      </div>
      <div class="pg-panel-body" id="sh-lists"></div>
    </div>
  </div>`;
  renderPeople();
  renderShared();
}

// ── People panel ───────────────────────────────────────────────────────
function renderPeople() {
  const el = document.getElementById('pp-lists');
  if (!el) return;
  const row = (p, actions) => `<div class="pg-row">
    ${arcPersonAva(p, 34)}
    <div class="pg-row-main">
      <div class="pg-row-name">${Arc.esc(p.name)}</div>
      <div class="pg-row-sub">${Arc.esc(p.email)}</div>
    </div>
    ${actions}</div>`;
  let html = '';

  const pin = Arc.People.pendingIn();
  if (pin.length) {
    html += `<div class="pg-sec">Invites for you</div>` + pin.map(p => row(p, `
      <button class="btn btn-primary btn-sm" style="font-size:11px;padding:4px 14px;flex-shrink:0" onclick="ppAccept('${p.id}')">Accept</button>
      <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px;color:var(--red);flex-shrink:0" onclick="ppRemove('${p.id}','Decline this invite?')">Decline</button>
    `)).join('');
  }
  const pout = Arc.People.pendingOut();
  if (pout.length) {
    html += `<div class="pg-sec">Invited — waiting on them</div>` + pout.map(p => row(p, `
      <span class="pg-chip pending">Pending</span>
      <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px;color:var(--muted);flex-shrink:0" onclick="ppRemove('${p.id}','Cancel this invite?')">Cancel</button>
    `)).join('');
  }
  const conn = Arc.People.connected();
  html += `<div class="pg-sec">Connected</div>` + (conn.length
    ? conn.map(p => row(p, `
        <span class="pg-chip ok">Connected</span>
        <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px;color:var(--red);flex-shrink:0" onclick="ppRemove('${p.id}','Remove this person from your people?')">✕</button>
      `)).join('')
    : `<div class="pg-empty">No connections yet — send an invite above. Once they accept, you can share tasks with them by name.</div>`);

  el.innerHTML = html;
  const cnt = document.getElementById('pp-count');
  if (cnt) cnt.textContent = `${conn.length} connected${pin.length + pout.length ? ` · ${pin.length + pout.length} pending` : ''}`;
}

async function ppInvite() {
  const nameEl  = document.getElementById('pp-name');
  const emailEl = document.getElementById('pp-email');
  const err     = document.getElementById('pp-err');
  const email = emailEl?.value?.trim();
  if (!email) { emailEl?.focus(); return; }
  if (err) err.textContent = '';
  try {
    await Arc.People.invite(email, nameEl?.value || '');
    if (nameEl) nameEl.value = '';
    if (emailEl) emailEl.value = '';
    renderPeople();
  } catch (e) {
    if (err) err.textContent = e.message || 'Could not send the invite.';
  }
}

async function ppAccept(id) {
  try { await Arc.People.accept(id); }
  catch (e) { alert('Could not accept: ' + (e.message || e)); }
  renderPeople();
}

async function ppRemove(id, msg) {
  if (!confirm(msg || 'Remove this person?')) return;
  try { await Arc.People.remove(id); }
  catch (e) { alert('Could not remove: ' + (e.message || e)); }
  renderPeople();
}

// ── Shared items panel ─────────────────────────────────────────────────
const TYPE_LABEL = { task: 'Task', goal: 'Goal', project: 'Project' };

function itemLink(s) {
  // Shared tasks open straight in the task board
  return s.type === 'task'
    ? `<a href="tasks.html?tid=${s.id}">${Arc.esc(s.data?.title || 'Untitled')}</a>`
    : Arc.esc(s.data?.title || 'Untitled');
}

function memberCluster(emails) {
  return `<div class="pg-members">${emails.slice(0, 5).map(m => {
    const p = Arc.People.byEmail(m) || { name: m, email: m, photo: null };
    return `<span title="${Arc.esc(p.name)}">${arcPersonAva(p, 26)}</span>`;
  }).join('')}${emails.length > 5 ? `<span style="font-size:11px;color:var(--muted);margin-left:4px">+${emails.length - 5}</span>` : ''}</div>`;
}

function renderShared() {
  const el = document.getElementById('sh-lists');
  if (!el) return;
  const mine   = Arc.Shared._mine;
  const withMe = Arc.Shared._withMe;
  let html = '';

  html += `<div class="pg-sec">Shared by me</div>`;
  html += mine.length
    ? mine.map(s => `<div class="pg-row">
        <div class="pg-row-main">
          <div class="pg-row-name">${itemLink(s)} <span class="pg-chip type" style="margin-left:5px">${TYPE_LABEL[s.type] || s.type}</span></div>
          <div class="pg-row-sub">with ${Arc.esc((s.members || []).map(m => Arc.People.nameFor(m)).join(', '))}</div>
        </div>
        ${memberCluster(s.members || [])}
        <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px;color:var(--red);flex-shrink:0" onclick="shUnshare('${s.id}')">Stop sharing</button>
      </div>`).join('')
    : `<div class="pg-empty">You haven't shared anything yet. Open a task on the board and use the ＋ button next to its title.</div>`;

  html += `<div class="pg-sec">Shared with me</div>`;
  html += withMe.length
    ? withMe.map(s => `<div class="pg-row">
        ${arcPersonAva({ name: s.ownerName, email: s.ownerEmail, photo: s.ownerPhoto }, 34)}
        <div class="pg-row-main">
          <div class="pg-row-name">${itemLink(s)} <span class="pg-chip type" style="margin-left:5px">${TYPE_LABEL[s.type] || s.type}</span></div>
          <div class="pg-row-sub">shared by ${Arc.esc(s.ownerName)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px;color:var(--red);flex-shrink:0" onclick="shLeave('${s.id}')">Leave</button>
      </div>`).join('')
    : `<div class="pg-empty">Nothing has been shared with you yet. When someone shares a task, it shows up here and on your task board.</div>`;

  el.innerHTML = html;
  const cnt = document.getElementById('sh-count');
  if (cnt) cnt.textContent = `${mine.length} by me · ${withMe.length} with me`;
}

async function shUnshare(id) {
  if (!confirm('Stop sharing this item? Collaborators will lose access; you keep it.')) return;
  try { await Arc.Shared.unshareAll(id); }
  catch (e) { alert('Could not stop sharing: ' + (e.message || e)); }
  renderShared();
}

async function shLeave(id) {
  if (!confirm('Remove this shared item from your board? The owner keeps it.')) return;
  try { await Arc.Shared.leave(id); }
  catch (e) { alert('Could not leave: ' + (e.message || e)); }
  renderShared();
}

function onProfileSaved() { document.getElementById('nav-container').innerHTML = Arc.navHtml(''); }
function onDataImported() { window.location.reload(); }

init();
</script>
</body>
</html>
