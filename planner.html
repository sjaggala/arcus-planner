<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcus — Planner</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script>try{var __t=(JSON.parse(localStorage.getItem('arc_cfg')||'{}')).theme;if(__t)document.documentElement.setAttribute('data-theme',__t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── Layout ────────────────────────────────────────────── */
body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── Planner Toolbar ───────────────────────────────────── */
.planner-toolbar {
  display:flex; align-items:center; gap:10px; padding:0 18px;
  height:50px; flex-shrink:0; border-bottom:1px solid var(--border);
  background:var(--s1); transition:background .2s;
}
.back-btn {
  display:inline-flex; align-items:center; gap:6px; padding:6px 13px 6px 9px;
  background:var(--s3); border:1.5px solid var(--border2); border-radius:8px;
  color:var(--text); font-size:13px; font-weight:600; cursor:pointer; flex-shrink:0;
  white-space:nowrap; transition:background .15s, border-color .15s, color .15s;
}
.back-btn:hover { background:var(--s2); border-color:var(--accent); color:var(--accent); }
.back-btn svg { width:14px; height:14px; }
.tb-div { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.proj-name { font-family:'Fraunces',serif; font-size:16px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tb-right { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.view-toggle { display:flex; background:var(--s3); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
.view-btn { padding:5px 10px; font-size:12px; font-weight:500; color:var(--muted); background:transparent; border:none; cursor:pointer; transition:background .15s, color .15s; }
.view-btn.active { background:var(--s2); color:var(--text); }
.date-nav { display:flex; align-items:center; gap:3px; }
.date-nav-label { font-size:12px; font-weight:600; min-width:148px; text-align:center; }
.nav-arrow { width:26px; height:26px; border-radius:6px; background:var(--s3); border:1px solid var(--border); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:color .15s, background .15s; }
.nav-arrow:hover { color:var(--text); background:var(--s2); }

/* ── Filter Bar ────────────────────────────────────────── */
.filter-bar {
  display:flex; align-items:center; gap:7px; padding:0 18px;
  min-height:44px; flex-shrink:0; border-bottom:1px solid var(--border);
  background:var(--s2); overflow:visible; transition:background .2s;
  position:relative; z-index:50;
}
.filter-lbl { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.fpill {
  padding:3px 11px; border-radius:20px; font-size:12px; font-weight:500;
  border:1px solid var(--border); background:var(--s3); color:var(--muted);
  cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:5px;
  white-space:nowrap; flex-shrink:0;
}
.fpill:hover { border-color:var(--border2); color:var(--text); }
.fpill .pd { width:7px; height:7px; border-radius:50%; }
.filter-sep { width:1px; height:16px; background:var(--border); margin:0 2px; flex-shrink:0; }

/* ── Gantt wrap ────────────────────────────────────────── */
.gantt-wrap { flex:1; overflow:auto; position:relative; }
.gantt-inner { min-width:max-content; }

/* ── Gantt Header ──────────────────────────────────────── */
.gantt-hdr {
  display:flex; position:sticky; top:0; z-index:30;
  background:var(--s1); border-bottom:2px solid var(--border);
  transition:background .2s;
}
.g-corner {
  width:var(--gLeft); min-width:var(--gLeft); flex-shrink:0;
  padding:8px 16px; display:flex; align-items:center; border-right:1px solid var(--border);
  background:var(--s1);
  position:sticky; left:0; z-index:31;
}
.g-corner-lbl { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.g-dates { display:flex; }
.g-date-col {
  width:var(--gCell); min-width:var(--gCell); flex-shrink:0;
  padding:5px 2px 4px; text-align:center; border-right:1px solid var(--border);
  cursor:pointer; transition:background .15s; user-select:none;
}
.g-date-col:hover { background:var(--s3); }
.g-date-col.is-today { background:rgba(123,121,247,.07); }
[data-theme="light"] .g-date-col.is-today { background:rgba(84,82,214,.05); }
.g-date-col.is-today .d-num { background:var(--accent); color:#fff !important; }
.g-date-col.is-today .d-name { color:var(--accent); }
.d-name { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
.d-num { width:24px; height:24px; margin:2px auto 0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
.d-mon { font-size:9px; color:var(--dim); font-weight:600; margin-top:1px; }

/* ── Category ──────────────────────────────────────────── */
.cat-row { display:flex; background:var(--s2); border-bottom:1px solid var(--border); transition:background .2s; }
.cat-left { width:var(--gLeft); min-width:var(--gLeft); flex-shrink:0; padding:7px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; border-right:1px solid var(--border); user-select:none; position:sticky; left:0; z-index:20; background:var(--s2); }
.cat-left:hover { background:var(--s3); }
.cat-chev { font-size:12px; color:var(--muted); transition:transform .2s; }
.cat-chev.open { transform:rotate(90deg); }
.cat-title { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
.cat-badge { font-size:10px; color:var(--muted); background:var(--s3); padding:1px 7px; border-radius:10px; border:1px solid var(--border); }
.cat-filler { flex:1; }

/* ── Goal Rows ─────────────────────────────────────────── */
.goal-row { display:flex; border-bottom:1px solid var(--border); min-height:44px; transition:background .1s; }
.goal-row:hover { background:color-mix(in srgb, var(--text) 3%, transparent); }
.goal-row.is-overdue { background:rgba(240,111,111,.09); }
[data-theme="light"] .goal-row.is-overdue { background:rgba(220,38,38,.055); }
.goal-row.is-overdue:hover { filter:brightness(1.04); }
.goal-left {
  width:var(--gLeft); min-width:var(--gLeft); flex-shrink:0;
  padding:0 12px; display:flex; align-items:center; gap:8px;
  border-right:1px solid var(--border); cursor:pointer; overflow:hidden;
  min-height:44px;
  /* Frozen while the timeline scrolls horizontally */
  position:sticky; left:0; z-index:20; background:var(--bg);
}
.goal-row.is-overdue .goal-left { background:color-mix(in srgb, var(--red) 8%, var(--bg)); }
.goal-left:hover .goal-title { color:var(--accent); }
.goal-clr { width:3px; height:22px; border-radius:2px; flex-shrink:0; }
.goal-title { font-size:13px; font-weight:500; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:color .15s; }
.overdue-icon { font-size:12px; flex-shrink:0; color:var(--red); }
.status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.goal-cells { display:flex; height:44px; }
.g-cell {
  width:var(--gCell); min-width:var(--gCell); flex-shrink:0;
  border-right:1px solid rgba(44,51,84,.38); position:relative; display:flex; align-items:center;
}
[data-theme="light"] .g-cell { border-right-color:rgba(186,192,218,.42); }
.g-cell.is-today-col { background:rgba(123,121,247,.04); }
[data-theme="light"] .g-cell.is-today-col { background:rgba(84,82,214,.035); }
.g-cell.in-range { cursor:pointer; }
.g-cell.in-range:hover .g-bar { filter:brightness(1.15); }
.g-bar { position:absolute; top:9px; bottom:9px; left:0; right:0; border-radius:0; transition:filter .15s; }
.g-cell.rs .g-bar { left:5px; border-radius:6px 0 0 6px; }
.g-cell.re .g-bar { right:5px; border-radius:0 6px 6px 0; }
.g-cell.rs.re .g-bar { left:5px; right:5px; border-radius:6px; }
.note-pip { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.88); z-index:2; pointer-events:none; display:none; }
.g-cell.has-note .note-pip { display:block; }
[data-theme="light"] .note-pip { background:rgba(0,0,0,.4); }

/* Overdue today indicator */
.overdue-today-pip {
  position:absolute; inset:9px 5px; border-radius:5px;
  background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(240,111,111,.2) 3px,rgba(240,111,111,.2) 6px);
  border:1.5px dashed rgba(240,111,111,.5);
  display:flex; align-items:center; justify-content:center; font-size:10px;
}
[data-theme="light"] .overdue-today-pip { background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(220,38,38,.12) 3px,rgba(220,38,38,.12) 6px); border-color:rgba(220,38,38,.38); }

/* ── Dropdown filters ──────────────────────────────────── */
.ms-wrap { position:relative; }
.ms-btn { background:var(--s3);border:1px solid var(--border);border-radius:7px;padding:4px 9px;color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:6px;white-space:nowrap; }
.ms-btn:hover { border-color:var(--accent); }
.ms-btn.has-filter { border-color:var(--accent);color:var(--accent); }
.ms-btn-arr { font-size:13px; color:var(--muted); line-height:1; }
.ms-dropdown { position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:var(--s2);border:1px solid var(--border);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.22);min-width:160px;padding:5px 0;display:none; }
.ms-dropdown.open { display:block; }
.ms-opt { display:flex;align-items:center;gap:9px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text);transition:background .1s; }
.ms-opt:hover { background:var(--s3); }
.ms-opt-all { border-bottom:1px solid var(--border);margin-bottom:3px;padding-bottom:9px; }
.ms-chk { width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center; }
.ms-chk.checked { background:var(--accent);border-color:var(--accent); }
.ms-chk.checked::after { content:'✓';font-size:9px;color:#fff;line-height:1; }
.od-pill { padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--red);color:var(--red);cursor:pointer;background:rgba(240,111,111,.08);white-space:nowrap; }
.od-pill:hover,.od-pill.active { background:rgba(240,111,111,.18); }

/* ── Project group header (all-projects view) ───────────── */
.proj-grp-hdr { display:flex; border-top:1px solid var(--border); }
.proj-grp-left { width:var(--gLeft); min-width:var(--gLeft); flex-shrink:0; padding:9px 14px; display:flex; align-items:center; gap:8px; border-right:1px solid var(--border); background:var(--s2); position:sticky; left:0; z-index:20; }
.proj-grp-fill { flex:1; background:var(--s2); border-bottom:1px solid var(--border); }

/* ── Empty state ───────────────────────────────────────── */
.gantt-empty { padding:70px 24px; text-align:center; color:var(--muted); }
.gantt-empty-icon { font-size:36px; margin-bottom:14px; }
.gantt-empty h3 { font-size:15px; font-weight:600; color:var(--text); margin-bottom:6px; }
.gantt-empty p { font-size:13px; }

/* ── Status grid (for goal modal) ─────────────────────── */
.status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.status-opt { padding:7px 8px; border-radius:7px; border:1px solid var(--border); background:var(--s3); cursor:pointer; text-align:center; font-size:12px; font-weight:500; color:var(--muted); transition:all .15s; }
.status-opt.sel { border-color:var(--oc); background:color-mix(in srgb,var(--oc) 14%,transparent); color:var(--text); }
.st-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }

/* ── Goal Dependencies (SVG connector lines drawn in JS) ── */
#dep-lines-svg { position:absolute; top:0; left:0; pointer-events:none; z-index:15; overflow:visible; }

/* ── Comments / Updates ── */
.comments-list { border:1px solid var(--border);border-radius:8px;max-height:180px;overflow-y:auto;background:var(--s1); }
.comment-item { padding:9px 12px;border-bottom:1px solid var(--border); }
.comment-item:last-child { border-bottom:none; }
.comment-meta { display:flex;align-items:center;justify-content:space-between;margin-bottom:4px; }
.comment-time { font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.2px; }
.comment-del  { background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:10px;padding:0;line-height:1;transition:color .15s; }
.comment-del:hover { color:var(--red); }
.comment-body { font-size:13px;color:var(--text);line-height:1.6;word-break:break-word; }
.comment-body p { margin:0 0 4px; }
.comment-body p:last-child { margin-bottom:0; }
.comment-empty { padding:16px 14px;font-size:11px;color:var(--dim);text-align:center; }
.cm-input-area { display:flex;flex-direction:column;gap:0; }

/* ── Split modal (edit mode: form left, updates right) ── */
.modal.modal-split { max-width:1060px; padding:0; overflow:hidden; display:flex; flex-direction:column; }
.modal.modal-split .modal-hdr { padding:22px 26px 0; flex-shrink:0; margin-bottom:0; }
.split-body { display:flex; flex:1; min-height:0; }
.split-form { flex:1; min-width:0; overflow-y:auto; padding:18px 26px 22px; }
.split-sidebar { width:460px; flex-shrink:0; border-left:1px solid var(--border); display:flex; flex-direction:column; }
.split-sidebar-hdr { padding:14px 14px 8px; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); flex-shrink:0; }
.split-sidebar .comments-list { flex:1; max-height:none; border:none; border-radius:0; background:transparent; overflow-y:auto; }
.split-sidebar .cm-input-area { padding:8px 10px 10px; border-top:1px solid var(--border); flex-shrink:0; }
.modal.modal-split .modal-foot { padding:13px 26px; border-top:1px solid var(--border); flex-shrink:0; margin-top:0; }
.dep-list { border:1px solid var(--border); border-radius:8px; overflow-y:auto; max-height:160px; margin-top:4px; }
.dep-row  { display:flex; align-items:center; gap:8px; padding:7px 10px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
.dep-row:last-child { border-bottom:none; }
.dep-row:hover { background:var(--s3); }
.dep-row input[type=checkbox] { width:14px;height:14px;flex-shrink:0;accent-color:var(--accent);cursor:pointer; }
.dep-title { flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.dep-st    { font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600;flex-shrink:0; }

/* ── Sub-goals ── */
.goal-row.subgoal-row { background: color-mix(in srgb, var(--text) 1.5%, transparent); }
.goal-row.subgoal-row:hover { filter: brightness(1.06); }
.goal-row.subgoal-row .goal-left { padding-left:28px; }
.goal-row.subgoal-row .goal-title { font-size:12px; font-weight:400; color:var(--muted); }
.goal-row.subgoal-row .g-bar { top:9px; bottom:9px; opacity:.78; }
.goal-row.subgoal-row .g-cell.rs .g-bar { left:3px; }
.goal-row.subgoal-row .g-cell.re .g-bar { right:3px; }
.goal-row.subgoal-row .g-cell.rs .g-bar { border-radius:4px 0 0 4px; }
.goal-row.subgoal-row .g-cell.re .g-bar { border-radius:0 4px 4px 0; }
.goal-row.subgoal-row .g-cell.rs.re .g-bar { border-radius:4px; }
.goal-row.has-subgoals > .goal-left { background: color-mix(in srgb, var(--accent) 4%, transparent); }
.sg-toggle { width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; border-radius:6px; flex-shrink:0; cursor:pointer; }
.sg-toggle:hover { background:var(--s3); }
.sg-chev { font-size:12px; color:var(--muted); display:inline-block; transition:transform .2s; }
.sg-chev.open { transform: rotate(90deg); }
.subgoal-indent { width:14px; flex-shrink:0; display:inline-flex; align-items:center; padding-left:4px; }
.subgoal-connector { width:2px; height:100%; background: var(--border); border-radius:1px; }

/* ── Global label chips (goal modal) ── */
.gl-chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; border:1.5px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; user-select:none; }
.gl-chip.sel { border-color:var(--lc,var(--accent)); background:color-mix(in srgb,var(--lc,var(--accent)) 16%,transparent); color:var(--lc,var(--accent)); }
.gl-chip:hover:not(.sel) { border-color:var(--border2); color:var(--text); }

/* Rich text editor styles are shared — defined in style.css */
</style>
</head>

<div id="nav-container"></div>

<div class="planner-toolbar" id="planner-toolbar"></div>
<div class="filter-bar" id="filter-bar"></div>

<div class="gantt-wrap">
  <div class="gantt-inner" id="gantt-inner"></div>
</div>

<div id="modal-overlay" onclick="overlayClick(event)"></div>
<div id="modal-wrap"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="data.js?v=10"></script>
<script>
// =====================================================================
// STATE
// =====================================================================
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const PS = {
  pid:             new URLSearchParams(location.search).get('pid'),
  filterPids:      new URLSearchParams(location.search).get('pid') ? new Set([new URLSearchParams(location.search).get('pid')]) : new Set(),
  filterStatuses:  new Set(),
  showOverdueOnly: false,
  mode:            'all',
  anchor:          new Date(),
  collapsedCats:   new Set(),
  collapsedGoals:  new Set(), // parent goals with sub-goals that are collapsed

  get project()       { return Arc.Projects.getById(this.pid); },
  get allGoals()      {
    const all = Arc.Goals.getAll();
    if (this.filterPids.size) return all.filter(g => this.filterPids.has(g.projectId));
    return all;
  },
  get filteredGoals() {
    let gs = this.allGoals;
    if (this.showOverdueOnly) return gs.filter(g => Arc.Goals.isOverdue(g));
    if (this.filterStatuses.size) gs = gs.filter(g => this.filterStatuses.has(g.status));
    return gs;
  },
};

// =====================================================================
// VIEW RANGE
// =====================================================================
function getViewDates() {
  if (PS.mode === 'all') {
    const gs = PS.filteredGoals;
    let minD, maxD;
    if (gs.length) {
      minD = gs.reduce((m, g) => g.dateFrom < m ? g.dateFrom : m, gs[0].dateFrom);
      maxD = gs.reduce((m, g) => g.dateTo   > m ? g.dateTo   : m, gs[0].dateTo);
    } else {
      const now = new Date();
      minD = Arc.dateStr(new Date(now.getFullYear(), now.getMonth(), 1));
      maxD = Arc.dateStr(new Date(now.getFullYear(), now.getMonth() + 1, 0));
    }
    const start = new Date(minD + 'T00:00:00'); start.setDate(start.getDate() - 14);
    const end   = new Date(maxD + 'T00:00:00'); end.setDate(end.getDate() + 14);
    const count = Math.round((end - start) / 86400000) + 1;
    return Array.from({ length: count }, (_, i) => addDays(start, i));
  }
  const a = PS.anchor;
  let start, count;
  if (PS.mode === 'week') {
    start = soWeek(a); count = 7;
  } else if (PS.mode === 'twoweek') {
    start = soWeek(a); count = 14;
  } else {
    start = new Date(a.getFullYear(), a.getMonth(), 1);
    count = new Date(a.getFullYear(), a.getMonth() + 1, 0).getDate();
  }
  return Array.from({ length: count }, (_, i) => addDays(start, i));
}

function soWeek(d) { const r = new Date(d); r.setDate(d.getDate() - d.getDay()); return r; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function isToday(d) { return Arc.dateStr(d) === Arc.today(); }

function getViewLabel() {
  const d = getViewDates(), f = d[0], l = d[d.length - 1];
  if (PS.mode === 'all') {
    if (f.getFullYear() === l.getFullYear())
      return `${MONTHS[f.getMonth()]} ${f.getDate()} – ${MONTHS[l.getMonth()]} ${l.getDate()}, ${f.getFullYear()}`;
    return `${MONTHS[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()} – ${MONTHS[l.getMonth()]} ${l.getDate()}, ${l.getFullYear()}`;
  }
  if (PS.mode === 'month') return `${MONTHS[f.getMonth()]} ${f.getFullYear()}`;
  if (f.getMonth() === l.getMonth()) return `${MONTHS[f.getMonth()]} ${f.getDate()}–${l.getDate()}, ${f.getFullYear()}`;
  return `${MONTHS[f.getMonth()]} ${f.getDate()} – ${MONTHS[l.getMonth()]} ${l.getDate()}`;
}

function navigate(dir) {
  if (PS.mode === 'all') return; // no fixed window to navigate in All mode
  const d = new Date(PS.anchor);
  if (PS.mode === 'week')    d.setDate(d.getDate() + dir * 7);
  else if (PS.mode === 'twoweek') d.setDate(d.getDate() + dir * 14);
  else d.setMonth(d.getMonth() + dir);
  PS.anchor = d; render();
}

function goToday() { PS.anchor = new Date(); render(); }
function setMode(m) { PS.mode = m; savePlannerFilters(); render(); }
function toggleProjectFilter(pid) {
  if (PS.filterPids.has(pid)) PS.filterPids.delete(pid); else PS.filterPids.add(pid);
  PS.showOverdueOnly = false; render();
}
function toggleAllProjects() {
  if (PS.filterPids.size === 0) Arc.Projects.getAll().forEach(p => PS.filterPids.add(p.id));
  else PS.filterPids.clear();
  PS.showOverdueOnly = false; render();
}
function toggleStatusFilter(st) {
  if (PS.filterStatuses.has(st)) PS.filterStatuses.delete(st); else PS.filterStatuses.add(st);
  PS.showOverdueOnly = false; savePlannerFilters(); render();
}
function toggleAllStatuses() {
  if (PS.filterStatuses.size === 0) Arc.STATUSES.forEach(s => PS.filterStatuses.add(s.val));
  else PS.filterStatuses.clear();
  PS.showOverdueOnly = false; savePlannerFilters(); render();
}
function toggleOverdue() { PS.showOverdueOnly = !PS.showOverdueOnly; if (PS.showOverdueOnly) PS.filterStatuses.clear(); savePlannerFilters(); render(); }
function savePlannerFilters() {
  try { localStorage.setItem('arc_planner_filter', JSON.stringify({ mode: PS.mode, filterStatuses: [...PS.filterStatuses], showOverdueOnly: PS.showOverdueOnly })); } catch {}
}
function loadPlannerFilters() {
  try {
    const s = JSON.parse(localStorage.getItem('arc_planner_filter') || '{}');
    if (s.mode && ['all','week','twoweek','month'].includes(s.mode)) PS.mode = s.mode;
    if (Array.isArray(s.filterStatuses)) s.filterStatuses.forEach(v => PS.filterStatuses.add(v));
    if (s.showOverdueOnly) PS.showOverdueOnly = true;
  } catch {}
}
function toggleMsDropdown(id) {
  document.querySelectorAll('.ms-dropdown').forEach(d => { if (d.id !== id) d.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}
function toggleCat(c) { PS.collapsedCats.has(c) ? PS.collapsedCats.delete(c) : PS.collapsedCats.add(c); render(); }
function toggleGoalExpand(id) { PS.collapsedGoals.has(id) ? PS.collapsedGoals.delete(id) : PS.collapsedGoals.add(id); render(); }

// =====================================================================
// MAIN RENDER
// =====================================================================
function render() {
  const allProjects = Arc.Projects.getAll();
  if (PS.pid && !PS.project) { location.href = 'projects.html'; return; }
  if (allProjects.length === 0) { location.href = 'projects.html'; return; }

  const dates = getViewDates();
  const cellW = PS.mode === 'all' ? 38 : PS.mode === 'month' ? 38 : PS.mode === 'week' ? 84 : 60;
  document.documentElement.style.setProperty('--gCell', cellW + 'px');
  document.documentElement.style.setProperty('--gLeft', '260px');

  renderToolbar(allProjects, dates);
  renderFilterBar(allProjects);
  renderGantt(dates);
}

  } else if (n > 1 && n < allProjects.length) {

        <span class="date-nav-label" style="${PS.mode==='all'?'color:var(--muted);font-size:11px;font-weight:400':''}">
          ${getViewLabel()}
        </span>
        ${PS.mode !== 'all' ? `<button class="nav-arrow" onclick="navigate(1)">›</button>` : ''}
      </div>

      <div class="view-toggle">

        <button class="view-btn ${PS.mode==='week'?'active':''}" onclick="setMode('week')">Week</button>
        <button class="view-btn ${PS.mode==='twoweek'?'active':''}" onclick="setMode('twoweek')">2 Wk</button>
        <button class="view-btn ${PS.mode==='month'?'active':''}" onclick="setMode('month')">Month</button>

    <div class="ms-chk ${allStChk?'checked':''}"></div><strong>All Statuses</strong></div>`;
  const stOpts = stAllOpt + Arc.STATUSES.map(s => {
    const chk = PS.filterStatuses.has(s.val);
    return `<div class="ms-opt" onclick="toggleStatusFilter('${s.val}')">
      <div class="ms-chk ${chk?'checked':''}"></div>${Arc.esc(s.label)}</div>`;
  }).join('');

    ? `<div class="filter-sep"></div><button class="od-pill ${PS.showOverdueOnly?'active':''}" onclick="toggleOverdue()">⚠ Overdue (${overdueCount})</button>`
    : '';

  document.getElementById('filter-bar').innerHTML = `
    <span class="filter-lbl">Project:</span>
    <div class="ms-wrap">
      <button class="ms-btn ${projCount?'has-filter':''}" onclick="toggleMsDropdown('ms-proj-dd')">${projLabel} <span class="ms-btn-arr">${Arc.icon('chevron-down', 11)}</span></button>
      <div class="ms-dropdown" id="ms-proj-dd">${projOpts}</div>
    </div>
    <div class="filter-sep"></div>

      <div class="ms-dropdown" id="ms-st-dd">${stOpts}</div>

}

// ── Gantt ─────────────────────────────────────────────────────────────
function renderGantt(dates) {
  const goals = PS.filteredGoals;
  const gi    = document.getElementById('gantt-inner');
  const headerHtml = renderGanttHeader(dates);

  if (goals.length === 0) {
    const msg = (PS.filterStatuses.size || PS.showOverdueOnly)
      ? 'No goals match this filter.'
      : 'No goals yet — click "+ Add Goal" to create your first goal.';
    gi.innerHTML = headerHtml + `<div class="gantt-empty">
      <div class="gantt-empty-icon">🎯</div><h3>${msg}</h3>
      <p>Goals appear as horizontal bars across their date range.</p>
    </div>`;
    return;
  }

  // Show project-level grouping whenever goals from multiple projects are visible
  // (works correctly whether we're on ?pid= URL or using the filter bar)
  const uniquePids = new Set(goals.map(g => g.projectId));
  let bodyHtml;
  if (uniquePids.size <= 1) {
    bodyHtml = renderGoalsByCategory(goals, dates);
  } else {
    const projs = Arc.Projects.getAll();
    bodyHtml = projs
      .map(p => {
        const pGoals = goals.filter(g => g.projectId === p.id);
        if (!pGoals.length) return '';
        return `<div>
          <div class="proj-grp-hdr">
            <div class="proj-grp-left">
              <span style="font-size:16px">${Arc.esc(p.emoji||'📁')}</span>
              <span style="font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${Arc.esc(p.name)}</span>
              <span class="cat-badge">${pGoals.length}</span>
            </div>
            <div class="proj-grp-fill"></div>
          </div>
          ${renderGoalsByCategory(pGoals, dates)}
        </div>`;
      }).join('');
  }

  gi.innerHTML = headerHtml + bodyHtml;
  requestAnimationFrame(() => {
    renderDependencyLines(PS.filteredGoals, dates);
    // In All mode, scroll so today is visible near the left quarter of the viewport
    if (PS.mode === 'all') {
      const todayCol = document.querySelector('.g-date-col.is-today');
      if (todayCol) todayCol.scrollIntoView({ inline: 'center', block: 'nearest' });
    }
  });
}

// =====================================================================
// TOPOLOGICAL SORT — keeps dependency chains together
// Independent goals keep date order; a goal's dependents are pulled
// immediately after it (recursively) so connector lines don't cross.
// =====================================================================
function topoSortGoals(goals) {
  const goalIds = new Set(goals.map(g => g.id));
  const placed  = new Set();
  const result  = [];

  // Baseline order: by start date
  const byDate = [...goals].sort((a, b) => a.dateFrom.localeCompare(b.dateFrom));

  function canPlace(g) {
    // All in-view dependencies must already be placed
    return (g.dependsOn || []).every(id => !goalIds.has(id) || placed.has(id));
  }

  function place(g) {
    if (placed.has(g.id)) return;
    result.push(g);
    placed.add(g.id);
    // Immediately pull in dependents that are now unblocked, sorted by date
    byDate
      .filter(x => !placed.has(x.id) && (x.dependsOn || []).includes(g.id) && canPlace(x))
      .forEach(place);
  }

  let guard = 0;
  while (result.length < goals.length && guard++ < goals.length * 3) {
    const next = byDate.find(g => !placed.has(g.id) && canPlace(g));
    if (next) place(next);
    else {
      // Circular dep safeguard: force-place earliest unplaced goal
      const stuck = byDate.find(g => !placed.has(g.id));
      if (stuck) place(stuck); else break;
    }
  }

  return result;
}

function renderGoalsByCategory(goals, dates) {
  // Build children map from ALL goals (not just filtered)
  const allGoals = Arc.Goals.getAll();
  const childrenOf = {};
  allGoals.forEach(g => {
    if (g.parentId) {
      if (!childrenOf[g.parentId]) childrenOf[g.parentId] = [];
      childrenOf[g.parentId].push(g);
    }
  });

  // Separate top-level goals (those without a parentId, or whose parent is not in view)
  const visibleIds = new Set(goals.map(g => g.id));
  const topLevel = goals.filter(g => !g.parentId || !visibleIds.has(g.parentId));

  const cats = {};
  topLevel.forEach(g => {
    const c = g.category || 'Uncategorized';
    if (!cats[c]) cats[c] = [];
    cats[c].push(g);
  });

  return Object.entries(cats).map(([cat, cgs]) => {
    // Count includes visible sub-goals for this category's goals
    const sorted = topoSortGoals(cgs);
    const coll   = PS.collapsedCats.has(cat);

    let rows = '';
    if (!coll) {
      sorted.forEach(g => {
        const children = (childrenOf[g.id] || [])
          .filter(sg => !visibleIds.has(sg.id) || goals.find(x => x.id === sg.id))
          .sort((a, b) => a.dateFrom.localeCompare(b.dateFrom));
        const hasKids = children.length > 0;
        const isExp   = !PS.collapsedGoals.has(g.id);

        rows += renderGoalRow(g, dates, false, hasKids, isExp);
        if (hasKids && isExp) {
          children.forEach(sg => {
            rows += renderGoalRow(sg, dates, true, false, false);
          });
        }
      });
    }

    // Total count = top-level + expanded sub-goals
    const totalShown = sorted.reduce((n, g) => {
      const kids = (childrenOf[g.id] || []).length;
      return n + 1 + ((!PS.collapsedGoals.has(g.id) && kids) ? kids : 0);
    }, 0);

    const subCount = Object.values(childrenOf).flat().filter(sg => cgs.find(g => g.id === sg.parentId)).length;
    return `<div>
      <div class="cat-row">
        <div class="cat-left" data-cat="${Arc.esc(cat)}" onclick="toggleCat(this.dataset.cat)">
          <span class="cat-chev ${coll?'':'open'}">▶</span>
          <span class="cat-title">${Arc.esc(cat)}</span>
          <span class="cat-badge">${cgs.length}${subCount ? '+' : ''}</span>
        </div>
        <div class="cat-filler" data-cat="${Arc.esc(cat)}" onclick="toggleCat(this.dataset.cat)" style="cursor:pointer"></div>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function renderGanttHeader(dates) {
  let prevMonth = -1;
  const cols = dates.map(d => {
    const showMon = d.getMonth() !== prevMonth;
    prevMonth = d.getMonth();
    return `<div class="g-date-col ${isToday(d) ? 'is-today' : ''}" 
                 onclick="openJournal('${Arc.dateStr(d)}')" 
                 title="Journal · ${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}">
      <div class="d-name">${DAYS[d.getDay()]}</div>
      <div class="d-num">${d.getDate()}</div>
      <div class="d-mon">${showMon ? MONTHS[d.getMonth()] : ''}</div>
    </div>`;
  }).join('');
  return `<div class="gantt-hdr">
    <div class="g-corner"><span class="g-corner-lbl">Goals</span></div>
    <div class="g-dates">${cols}</div>
  </div>`;
}

function renderGoalRow(goal, dates, isSubgoal, hasKids, isExpanded) {
  const color = goal.labelColor || '#7b79f7';
  const st    = Arc.Goals.statusInfo(goal.status);
  const od    = Arc.Goals.isOverdue(goal);

  const cells = dates.map(d => {
    const ds   = Arc.dateStr(d);
    const inR  = ds >= goal.dateFrom && ds <= goal.dateTo;
    const tc   = isToday(d);
    const isF  = ds === goal.dateFrom;
    const isL  = ds === goal.dateTo;
    const hasN = !!getNote(goal.id, ds);

    if (tc && od && !inR) {
      return `<div class="g-cell is-today-col" onclick="openDayNote('${goal.id}','${ds}')" title="Overdue — click to add note">
        <div class="overdue-today-pip">⚠</div>
      </div>`;
    }
    if (inR) {
      const cls = ['g-cell','in-range', tc?'is-today-col':'', isF?'rs':'', isL?'re':'', hasN?'has-note':''].filter(Boolean).join(' ');
      return `<div class="${cls}" onclick="openDayNote('${goal.id}','${ds}')" title="${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}">
        <div class="g-bar" style="background:${color};opacity:${isSubgoal?.75:.82}"></div>
        <div class="note-pip"></div>
      </div>`;
    }
    return `<div class="g-cell ${tc ? 'is-today-col' : ''}"></div>`;
  }).join('');

  // Left panel: expand toggle for parents, indent for sub-goals
  const expandBtn = hasKids
    ? `<span class="sg-toggle" onclick="event.stopPropagation();toggleGoalExpand('${goal.id}')" title="${isExpanded?'Collapse':'Expand'} sub-goals">
        <span class="sg-chev ${isExpanded?'open':''}">▶</span>
       </span>`
    : `<span style="width:26px;flex-shrink:0;display:inline-block"></span>`;

  const indentEl = isSubgoal
    ? `<span class="subgoal-indent"><span class="subgoal-connector"></span></span>`
    : '';

  return `<div class="goal-row ${isSubgoal?'subgoal-row':''} ${hasKids?'has-subgoals':''} ${od?'is-overdue':''}" data-gid="${goal.id}">
    <div class="goal-left" onclick="editGoalModal('${goal.id}')">
      ${indentEl}${expandBtn}
      <span class="goal-title" title="${Arc.esc(goal.title)}">${Arc.esc(goal.title)}</span>
      ${od ? `<span class="overdue-icon" title="Overdue">⚠</span>` : ''}
      <div class="status-dot" style="background:${st.color}" title="${st.label}"></div>
    </div>
    <div class="goal-cells">${cells}</div>
  </div>`;
}

// =====================================================================
// DEPENDENCY CONNECTOR LINES (SVG overlay on Gantt)
// =====================================================================
function renderDependencyLines(goals, dates) {
  const gi = document.getElementById('gantt-inner');
  if (!gi) return;

  const old = document.getElementById('dep-lines-svg');
  if (old) old.remove();
  if (!dates.length) return;

  const allGoals = Arc.Goals.getAll();
  const cellW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gCell')) || 60;
  const gLeft = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gLeft')) || 260;

  // Collect pairs where both the dep's end date AND goal's start date are in view
  const pairs = [];
  goals.forEach(goal => {
    (goal.dependsOn || []).forEach(depId => {
      const dep = allGoals.find(g => g.id === depId);
      if (!dep) return;
      const depEndIdx    = dates.findIndex(d => Arc.dateStr(d) === dep.dateTo);
      const goalStartIdx = dates.findIndex(d => Arc.dateStr(d) === goal.dateFrom);
      if (depEndIdx !== -1 && goalStartIdx !== -1) {
        pairs.push({ dep, goal, depEndIdx, goalStartIdx });
      }
    });
  });
  if (!pairs.length) return;

  gi.style.position = 'relative';
  const giRect = gi.getBoundingClientRect();

  const ns  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.id = 'dep-lines-svg';
  svg.setAttribute('width',  gi.scrollWidth);
  svg.setAttribute('height', gi.scrollHeight);

  pairs.forEach(({ dep, goal, depEndIdx, goalStartIdx }) => {
    const depRow  = gi.querySelector(`[data-gid="${dep.id}"]`);
    const goalRow = gi.querySelector(`[data-gid="${goal.id}"]`);
    if (!depRow || !goalRow) return;

    const depRect  = depRow.getBoundingClientRect();
    const goalRect = goalRow.getBoundingClientRect();

    // Start: right edge of dep's bar (end-date cell right side), at row mid-height
    const x1 = gLeft + (depEndIdx + 1) * cellW - 5; // -5 matches .g-cell.re right padding
    const y1 = depRect.top - giRect.top + depRect.height / 2;

    // End: left edge of goal's bar (start-date cell left side), at row mid-height
    const x2 = gLeft + goalStartIdx * cellW + 5; // +5 matches .g-cell.rs left padding
    const y2 = goalRect.top - giRect.top + goalRect.height / 2;

    // Color: sharper opacity so lines are clearly visible
    const allDepsComplete = !(goal.dependsOn || []).some(id => {
      const d = allGoals.find(g => g.id === id);
      return d && !['completed','cancelled'].includes(d.status);
    });
    const stroke = allDepsComplete ? 'rgba(62,201,122,.85)' : 'rgba(123,121,247,.75)';

    // Classic Gantt double-elbow:
    //   dep bar right ──┐
    //                   │  (vertical drop)
    //             ┌─────┘
    //             └──── goal bar left
    const r      = 7;
    const margin = 14; // how far right to step before turning vertically
    const xElbow = x1 + margin;
    const dy     = y2 - y1;
    const down   = dy >= 0;

    let dPath;
    if (Math.abs(dy) < 4) {
      // Same row — straight horizontal
      dPath = `M ${x1} ${y1} L ${x2} ${y2}`;
    } else if (Math.abs(dy) > r * 2 && xElbow + r <= x2) {
      // Full double-elbow: right → corner-down → vertical → corner-right → goal
      const vy1 = y1 + (down ?  r : -r);
      const vy2 = y2 + (down ? -r :  r);
      dPath =
        `M ${x1} ${y1} ` +
        `L ${xElbow - r} ${y1} ` +
        `Q ${xElbow} ${y1} ${xElbow} ${vy1} ` +
        `L ${xElbow} ${vy2} ` +
        `Q ${xElbow} ${y2} ${xElbow + r} ${y2} ` +
        `L ${x2} ${y2}`;
    } else {
      // Fallback S-curve for tight spaces
      dPath = `M ${x1} ${y1} C ${x1 + 28} ${y1} ${x2 - 28} ${y2} ${x2} ${y2}`;
    }

    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', dPath);
    path.setAttribute('stroke', stroke);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);
  });

  gi.appendChild(svg);
}

// =====================================================================
// NOTES HELPERS
// =====================================================================
function getNotes() { return JSON.parse(localStorage.getItem('arc_n') || '{}'); }
function getNote(goalId, ds) { return getNotes()[`${goalId}_${ds}`] || ''; }
function saveNote(goalId, ds, txt) {
  const n = getNotes();
  if (txt.trim()) n[`${goalId}_${ds}`] = txt.trim();
  else delete n[`${goalId}_${ds}`];
  localStorage.setItem('arc_n', JSON.stringify(n));
}

function getJournals() { return JSON.parse(localStorage.getItem('arc_j') || '{}'); }
function getJournal(ds) { return getJournals()[ds] || ''; }
function saveJournal(ds, txt) {
  const j = getJournals();
  if (txt.trim()) j[ds] = txt.trim();
  else delete j[ds];
  localStorage.setItem('arc_j', JSON.stringify(j));
}

// =====================================================================
// GOAL MODAL
// =====================================================================
function newGoalModal(dc, prefillParentId) { goalModal(null, dc, prefillParentId); }
function editGoalModal(id) {
  const g = Arc.Goals.getAll().find(x => x.id === id);
  if (g) { setUrlParam('gid', id); goalModal(g); }
}

function goalModal(goal, dc, prefillParentId) {
  const ie    = !!goal;
  const today = Arc.today();
  const g     = goal || { title:'', description:'', category:dc||'', label:'', labelColor:Arc.COLORS[0], dateFrom:today, dateTo:today, status:'not_started', projectId:PS.pid, parentId: prefillParentId||'', labelIds:[] };

  const existCats = [...new Set(PS.allGoals.map(x => x.category).filter(Boolean))];
  const catOpts   = existCats.map(c => `<option value="${Arc.esc(c)}">`).join('');
  const cSw       = Arc.COLORS.map(c => `<div class="cswatch ${c===g.labelColor?'sel':''}" style="background:${c}" onclick="pgc(this,'${c}')"></div>`).join('');
  const stOpts    = Arc.STATUSES.map(s => `<div class="status-opt ${g.status===s.val?'sel':''}" style="--oc:${s.color}" onclick="pst(this,'${s.val}')"><span class="st-dot" style="background:${s.color}"></span>${s.label}</div>`).join('');

  // Global label chips
  const allLabels = Arc.Labels.getAll();
  const selLabelIds = g.labelIds || [];
  const labelChipsHtml = allLabels.length === 0
    ? `<span style="font-size:11px;color:var(--dim)">No labels yet</span>`
    : allLabels.map(l => `<span class="gl-chip${selLabelIds.includes(l.id)?' sel':''}" style="--lc:${l.color}" onclick="toggleGoalLabel('${l.id}')" data-lid="${l.id}">${Arc.esc(l.name)}</span>`).join('');
  const allProjs  = Arc.Projects.getAll();
  const projOpts  = allProjs.map(p => `<option value="${Arc.esc(p.id)}" ${p.id===(g.projectId||PS.pid)?'selected':''}>${Arc.esc(p.name)}</option>`).join('');

  // Parent goal selector — goals in same project excluding self and descendants
  const resolvedProjId = g.projectId || PS.pid || (allProjs.length ? allProjs[0].id : '');
  const allGoalsAll    = Arc.Goals.getAll();
  const forbidAsParent = new Set(); // goals that would create circular deps
  if (g.id) {
    // Everything that descends from g cannot be g's parent
    const q = [g.id]; const vis = new Set();
    while (q.length) { const cur = q.shift(); if (vis.has(cur)) continue; vis.add(cur); allGoalsAll.filter(x => x.parentId === cur).forEach(x => q.push(x.id)); }
    vis.forEach(id => forbidAsParent.add(id));
  }
  const parentCandidates = allGoalsAll.filter(x => x.id !== g.id && x.projectId === resolvedProjId && !forbidAsParent.has(x.id) && !x.parentId);
  const parentOpts = `<option value="">None (top-level goal)</option>` +
    parentCandidates.map(p => `<option value="${p.id}" ${(g.parentId||'')=== p.id?'selected':''}>${Arc.esc(p.title)}</option>`).join('');

  // Dependencies: other goals in the same project, excluding circular refs
  // Resolve project ID — fall back to first project so new-goal-all-projects view works
  const projId     = g.projectId || PS.pid || (allProjs.length ? allProjs[0].id : '');
  const allGoalsForDep = Arc.Goals.getAll();
  // Find every goal that (transitively) depends on g — these cannot be listed as options
  const forbidden = new Set();
  if (g.id) {
    const queue = [g.id];
    while (queue.length) {
      const cur = queue.shift();
      if (forbidden.has(cur)) continue;
      forbidden.add(cur);
      allGoalsForDep.forEach(x => { if ((x.dependsOn || []).includes(cur) && !forbidden.has(x.id)) queue.push(x.id); });
    }
    forbidden.delete(g.id); // g itself is already excluded by x.id !== g.id below
  }
  const currentDeps = g.dependsOn || [];
  // Always show goals that are already saved as deps (so existing links are always visible
  // and editable), plus other same-project goals that don't create a circular reference.
  const otherGoals = allGoalsForDep.filter(x =>
    x.id !== g.id &&
    (currentDeps.includes(x.id) || (x.projectId === projId && !forbidden.has(x.id)))
  );
  let depsInner = '';
  if (otherGoals.length === 0) {
    depsInner = `<div style="font-size:11px;color:var(--dim);padding:8px 10px">No other goals in this project yet.</div>`;
  } else {
    depsInner = otherGoals.map(og => {
      const chk = currentDeps.includes(og.id);
      const ost = Arc.Goals.statusInfo(og.status);
      return `<label class="dep-row">
        <input type="checkbox" class="dep-chk" value="${og.id}" ${chk?'checked':''}>
        <span class="dep-title">${Arc.esc(og.title)}</span>
        <span class="dep-st" style="background:${ost.color}20;color:${ost.color}">${ost.label}</span>
      </label>`;
    }).join('');
  }
  const depsHtml = `<div class="dep-list" id="gm-dep-list">${depsInner}</div>`;

  showModal(`<div class="modal ${ie ? 'modal-split' : 'wide'}">
    <div class="modal-hdr">
      <div><div class="modal-title">${ie ? 'Edit Goal' : 'New Goal'}</div><div class="modal-sub">${ie ? 'Update goal details' : 'Add a goal to your project timeline'}</div></div>
      ${ie ? `<button class="btn btn-ghost btn-sm" onclick="addSubGoalFromModal('${g.id}')" style="margin-left:auto;margin-right:8px;white-space:nowrap">＋ Sub-goal</button>` : ''}
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    ${ie ? `<div class="split-body"><div class="split-form">` : ''}
    <div class="form-group"><label class="form-lbl">Project</label>
      <select class="form-inp" id="gm-proj">${projOpts}</select>
    </div>
    <div class="form-group">
      <label class="form-lbl">Sub-goal of <span style="font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">(optional — nest under a parent goal)</span></label>
      <select class="form-inp" id="gm-parent">${parentOpts}</select>
    </div>
    <div class="form-group"><label class="form-lbl">Goal Title *</label><input class="form-inp" id="gm-title" placeholder="e.g. Launch marketing campaign" value="${Arc.esc(g.title)}" maxlength="80"></div>
    <div class="form-group"><label class="form-lbl">Description</label><textarea class="form-inp" id="gm-desc" rows="2" placeholder="What does success look like?">${Arc.esc(g.description || '')}</textarea></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-lbl">Category</label>
        <datalist id="gm-cats">${catOpts}</datalist>
        <input class="form-inp" id="gm-cat" list="gm-cats" placeholder="e.g. Marketing, Design…" value="${Arc.esc(g.category || '')}">
      </div>
      <div class="form-group">
        <label class="form-lbl">Labels <span style="font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">(global — shared with tasks)</span></label>
        <div id="gm-label-chips" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px">${labelChipsHtml}</div>
        <span class="focus-link" style="font-size:11px" onclick="openLabelMgrForGoal('${ie ? g.id : ''}')">＋ Manage Labels</span>
      </div>
    </div>
    <div class="form-group"><label class="form-lbl">Bar Color</label><div class="color-picker" id="gm-cp">${cSw}</div><input type="hidden" id="gm-color" value="${g.labelColor || Arc.COLORS[0]}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Start Date *</label><input type="date" class="form-inp" id="gm-from" value="${g.dateFrom}"></div>
      <div class="form-group"><label class="form-lbl">End Date *</label><input type="date" class="form-inp" id="gm-to" value="${g.dateTo}"></div>
    </div>
    <div class="form-group"><label class="form-lbl">Status</label><div class="status-grid" id="gm-sw">${stOpts}</div><input type="hidden" id="gm-status" value="${g.status}"></div>
    <div class="form-group">
      <label class="form-lbl">Depends On <span style="font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0;font-size:11px">(optional)</span></label>
      ${depsHtml}
    </div>
    ${ie ? `</div><div class="split-sidebar">
      <div class="split-sidebar-hdr">Updates</div>
      <div class="comments-list" id="cm-list">${renderCommentsList(g.id)}</div>
      <div class="cm-input-area">
        ${renderRTE('gm-rte','Add a note… (Ctrl+Enter to post)')}
        <div style="display:flex;justify-content:flex-end;margin-top:6px">
          <button type="button" class="btn btn-primary btn-sm" onclick="postComment(document.getElementById('gm-rte-wrap').dataset.entityId)">Post</button>
        </div>
      </div>
    </div></div>` : ''}
    <div class="modal-foot">
      ${ie ? `<button class="btn btn-ghost" style="margin-right:auto;color:var(--red)" onclick="confirmDelGoal('${g.id}')">Delete Goal</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveGoal(${ie ? `'${g.id}'` : 'null'})">${ie ? 'Save Changes' : 'Add Goal'}</button>
    </div>
  </div>`);

  if (ie) { initRTE('gm-rte', g.id); }
}

// ── Goal Comments (rich text) ─────────────────────────────────────────
function fmtCommentTime(iso) {
  const d = new Date(iso), ds = Arc.dateStr(d);
  const h = d.getHours(), m = d.getMinutes();
  const t = `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
  if (ds === Arc.today()) return `Today at ${t}`;
  const yesterday = Arc.dateStr(new Date(Date.now()-86400000));
  if (ds === yesterday) return `Yesterday at ${t}`;
  return `${MONTHS[d.getMonth()]} ${d.getDate()} at ${t}`;
}
function renderCommentsList(entityId) {
  const comments = (Arc.Comments && Arc.Comments.forEntity(entityId)) || [];
  if (!comments.length) return `<div class="comment-empty">No updates yet — add the first one below.</div>`;
  return comments.map(c => `<div class="comment-item">
    <div class="comment-meta">
      <span class="comment-time">${fmtCommentTime(c.createdAt)}</span>
      <button class="comment-del" onclick="deleteComment('${entityId}','${c.id}')" title="Delete">✕</button>
    </div>
    <div class="comment-body">${c.html || Arc.esc(c.text || '')}</div>
  </div>`).join('');
}
function postComment(entityId) {
  if (!Arc.Comments) return;
  const html = getRteHtml('gm-rte');
  const stripped = html.replace(/<br\s*\/?>/gi,'').replace(/&nbsp;/g,'').trim();
  if (!stripped) return;
  const div = document.createElement('div'); div.innerHTML = html;
  const text = div.textContent || div.innerText || '';
  Arc.Comments.add(entityId, text, html);
  clearRte('gm-rte');
  const list = document.getElementById('cm-list');
  if (list) { list.innerHTML = renderCommentsList(entityId); list.scrollTop = list.scrollHeight; }
}
function deleteComment(entityId, commentId) {
  if (!Arc.Comments) return;
  Arc.Comments.delete(entityId, commentId);
  const list = document.getElementById('cm-list');
  if (list) list.innerHTML = renderCommentsList(entityId);
}

// Extend Comments.add to support html parameter
if (Arc.Comments && !Arc.Comments._htmlPatched) {
  const _origAdd = Arc.Comments.add.bind(Arc.Comments);
  Arc.Comments.add = function(entityId, text, html) {
    if (!text || !text.trim()) return null;
    const all = this.getAll();
    if (!all[entityId]) all[entityId] = [];
    const c = { id: Arc.uid(), text: text.trim(), html: html || null, createdAt: new Date().toISOString() };
    all[entityId].push(c);
    localStorage.setItem(this._k, JSON.stringify(all));
    return c;
  };
  Arc.Comments._htmlPatched = true;
}

// renderRTE / initRTE / rte* helpers are shared — defined in data.js

// Quick-add sub-goal from within a parent goal modal
function addSubGoalFromModal(parentId) {
  closeModal();
  setTimeout(() => newGoalModal(null, parentId), 50);
}

function pgc(el, c) { el.closest('#gm-cp').querySelectorAll('.cswatch').forEach(s => s.classList.remove('sel')); el.classList.add('sel'); document.getElementById('gm-color').value = c; }
function pst(el, v) { el.closest('#gm-sw').querySelectorAll('.status-opt').forEach(s => s.classList.remove('sel')); el.classList.add('sel'); document.getElementById('gm-status').value = v; }
function toggleGoalLabel(id) {
  const chip = document.querySelector(`#gm-label-chips .gl-chip[data-lid="${id}"]`);
  if (chip) chip.classList.toggle('sel');
}
function openLabelMgrForGoal(goalId) {
  Arc.openLabelManager(() => {
    if (goalId) {
      // Re-open edit modal to refresh chips (goal data already persisted from last Save)
      editGoalModal(goalId);
    } else {
      // New goal form: refresh chips in-place preserving current selections
      const chips = document.getElementById('gm-label-chips');
      if (!chips) return;
      const selIds = [...chips.querySelectorAll('.gl-chip.sel')].map(c => c.dataset.lid);
      const allLabels = Arc.Labels.getAll();
      chips.innerHTML = allLabels.length === 0
        ? `<span style="font-size:11px;color:var(--dim)">No labels yet</span>`
        : allLabels.map(l => `<span class="gl-chip${selIds.includes(l.id)?' sel':''}" style="--lc:${l.color}" onclick="toggleGoalLabel('${l.id}')" data-lid="${l.id}">${Arc.esc(l.name)}</span>`).join('');
    }
  });
}

function saveGoal(id) {
  const title = document.getElementById('gm-title').value.trim();
  const from  = document.getElementById('gm-from').value;
  const to    = document.getElementById('gm-to').value;
  if (!title) { document.getElementById('gm-title').style.borderColor = 'var(--red)'; document.getElementById('gm-title').focus(); return; }
  if (!from || !to) { alert('Please set start and end dates.'); return; }
  if (from > to) { alert('End date must be on or after start date.'); return; }
  const existing = id ? Arc.Goals.getAll().find(x => x.id === id) : null;
  const depChecked = document.querySelectorAll('#gm-dep-list .dep-chk:checked');
  const dependsOn  = [...depChecked].map(cb => cb.value);

  // Warn if user marks a dependency-blocked goal as In Progress
  const newStatus = document.getElementById('gm-status').value;
  if (newStatus === 'in_progress' && dependsOn.length > 0) {
    const allGs = Arc.Goals.getAll();
    const blockedDeps = dependsOn
      .map(depId => allGs.find(g => g.id === depId))
      .filter(d => d && !['completed','cancelled'].includes(d.status));
    if (blockedDeps.length > 0) {
      const names = blockedDeps.map(d => `"${d.title}"`).join(', ');
      const ok = confirm(`This goal depends on ${blockedDeps.length} incomplete goal${blockedDeps.length > 1 ? 's' : ''}: ${names}.\n\nMark as In Progress anyway?`);
      if (!ok) return;
    }
  }
  const parentId = document.getElementById('gm-parent')?.value || '';
  const selChips = [...document.querySelectorAll('#gm-label-chips .gl-chip.sel')].map(el => el.dataset.lid);
  const g = {
    id: id || Arc.uid(), projectId: document.getElementById('gm-proj')?.value || PS.pid, title,
    description:  document.getElementById('gm-desc').value.trim(),
    category:     document.getElementById('gm-cat').value.trim() || 'Uncategorized',
    labelIds:     selChips,
    labelColor:   document.getElementById('gm-color').value || Arc.COLORS[0],
    dateFrom: from, dateTo: to,
    status:       document.getElementById('gm-status').value || 'not_started',
    dependsOn,
    parentId:     parentId || null,
    createdAt:    existing?.createdAt || new Date().toISOString(),
  };
  const gs = Arc.Goals.getAll();
  if (id) { Arc.Goals.save(gs.map(x => x.id === id ? g : x)); }
  else    { gs.push(g); Arc.Goals.save(gs); }
  Arc.Activity.log(id ? 'updated' : 'created', 'goal', title, g.id);
  closeModal(); render();
}

function confirmDelGoal(id) {
  const g = Arc.Goals.getAll().find(x => x.id === id);
  showModal(`<div class="modal narrow">
    <div class="modal-hdr"><div class="modal-title">Delete Goal?</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <p style="color:var(--muted);font-size:13px">Delete <strong style="color:var(--text)">${Arc.esc(g?.title)}</strong>? This cannot be undone.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDelGoal('${id}')">Delete</button></div>
  </div>`);
}
function doDelGoal(id) {
  const _delG = Arc.Goals.getAll().find(g => g.id === id);
  if (_delG) Arc.Activity.log('deleted', 'goal', _delG.title, id);
  Arc.Goals.save(Arc.Goals.getAll().filter(g => g.id !== id));
  closeModal(); render();
}

// =====================================================================
// DAY NOTE MODAL
// =====================================================================
function openDayNote(goalId, ds) {
  const goal = Arc.Goals.getAll().find(g => g.id === goalId); if (!goal) return;
  const d    = new Date(ds + 'T00:00:00');
  const ex   = getNote(goalId, ds);
  const st   = Arc.Goals.statusInfo(goal.status);
  const od   = Arc.Goals.isOverdue(goal);
  const clr  = goal.labelColor || '#7b79f7';

  showModal(`<div class="modal">
    <div class="modal-hdr">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}</div>
        <div style="font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px">
          <span style="width:10px;height:10px;border-radius:50%;background:${clr};display:inline-block;flex-shrink:0"></span>
          ${Arc.esc(goal.title)}
        </div>
        <div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap">
          <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${st.color}20;color:${st.color};font-weight:600">${st.label}</span>
          ${goal.label ? `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${clr}20;color:${clr};font-weight:600">${Arc.esc(goal.label)}</span>` : ''}
          ${od ? `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(240,111,111,.15);color:var(--red);font-weight:600">⚠ Overdue since ${goal.dateTo}</span>` : ''}
        </div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-lbl">Notes / Progress</label><textarea class="form-inp" id="dn-txt" rows="6" placeholder="What did you work on? Any progress, blockers, or reflections…">${Arc.esc(ex)}</textarea></div>
    <div class="modal-foot">
      ${ex ? `<button class="btn btn-ghost" style="color:var(--red);margin-right:auto" onclick="clearNote('${goalId}','${ds}')">Clear Note</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDayNote('${goalId}','${ds}')">Save Note</button>
    </div>
  </div>`);
}

function saveDayNote(goalId, ds) { saveNote(goalId, ds, document.getElementById('dn-txt').value); closeModal(); render(); }
function clearNote(goalId, ds)   { saveNote(goalId, ds, ''); closeModal(); render(); }

// =====================================================================
// JOURNAL MODAL
// =====================================================================
function openJournal(ds) {
  const d  = new Date(ds + 'T00:00:00');
  const ex = getJournal(ds);
  const td = isToday(d);

  showModal(`<div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title">Daily Journal</div>
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-top:4px;color:${td ? 'var(--accent)' : 'var(--text)'}">
          ${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}${td ? ' · Today' : ''}
        </div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label class="form-lbl">Journal Entry</label><textarea class="form-inp" id="jn-txt" rows="8" placeholder="Thoughts, progress, reflections, what you're grateful for…">${Arc.esc(ex)}</textarea></div>
    <div class="modal-foot">
      ${ex ? `<button class="btn btn-ghost" style="color:var(--red);margin-right:auto" onclick="clearJournal('${ds}')">Clear Entry</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doSaveJournal('${ds}')">Save Entry</button>
    </div>
  </div>`);
}

function doSaveJournal(ds) { saveJournal(ds, document.getElementById('jn-txt').value); closeModal(); }
function clearJournal(ds)  { saveJournal(ds, ''); closeModal(); }

// =====================================================================
// HOOKS & INIT
// =====================================================================
function onProfileSaved() {
  document.getElementById('nav-container').innerHTML = Arc.navHtml('projects');
}

// Override Arc.Goals.save to also trigger render
const _origGoalsSave = Arc.Goals.getAll; // just a ref, doesn't need override

function init() {
  Arc.Settings.load();
  Arc.applyTheme(Arc.Settings.get('theme', 'dark'));
  document.getElementById('nav-container').innerHTML = Arc.navHtml('projects');
  loadPlannerFilters();

  if (PS.pid) {
    const proj = PS.project;
    if (!proj) { location.href = 'projects.html'; return; }
    document.title = `Arcus — ${proj.name}`;
  } else {
    document.title = 'Arcus — Planner';
  }

  render();

  document.addEventListener('click', e => {
    if (!e.target.closest('.ms-wrap')) {
      document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
    }
  });

  const gid = new URLSearchParams(location.search).get('gid');
  if (gid) setTimeout(() => editGoalModal(gid), 200);
}

window.closeModal = (orig => () => { orig(); setUrlParam('gid', null); })(window.closeModal);

init();
